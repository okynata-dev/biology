<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* =========================================================================
     /look — the showcase / vitrine page.

     Aesthetic: a Sotheby's catalogue photographed in a dark room. One
     piece is in the spotlight; the others stand in the wings, blurred,
     waiting their turn. The room itself has the soft grain of medium-
     format film — never sterile, never bright.

     Architecture:
       .stage        — 3D perspective container (perspective: 1600px)
       .spotlight    — radial-gradient cone from above, multiply-blended
       .carousel     — holds the cards; rotates the focus index, not itself
       .card[i]      — placed by JS via transform: translateX/Z + rotateY +
                       scale + filter:blur, based on its signed distance
                       from currentIndex. The active card (i=0) gets full
                       opacity, no blur, and a cursor-driven tilt layer.
       .noise        — fixed grain overlay, mix-blend-mode: overlay

     The page is dark on purpose — a counterpart to the cream Single-mode
     viewer. The Lab is dark for ritual; /look is dark for display.
     ========================================================================= */

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #080604;
    color: #e8e3d6;
    font-family: 'Georgia', 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    position: relative;
    /* Subtle room ambience — a deeper warmth bleeds in from below, as
       if the floor catches a sliver of the spotlight. */
    background:
      radial-gradient(ellipse 80% 50% at 50% 110%, rgba(56, 34, 18, 0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% -20%, rgba(80, 60, 40, 0.25) 0%, transparent 60%),
      #080604;
  }

  /* ----- The spotlight cone -----
     A column of warm light dropping from above the active card. We fade
     it sharply at the bottom to leave the floor in shadow. Multiply
     blend with everything beneath so dark surfaces stay dark — only
     the card catches it. */
  .spotlight {
    position: fixed;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 60vw;
    height: 120vh;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(
      ellipse 50% 70% at 50% 30%,
      rgba(255, 240, 220, 0.18) 0%,
      rgba(255, 230, 200, 0.08) 30%,
      rgba(255, 220, 180, 0.02) 55%,
      transparent 75%
    );
    mix-blend-mode: screen;
    filter: blur(6px);
  }

  /* A second, tighter beam — the "key light" hitting just the active
     card. Independently positioned to track the stage centre. */
  .spotlight::after {
    content: '';
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    width: 28vw;
    height: 60vh;
    background: radial-gradient(
      ellipse 60% 60% at 50% 30%,
      rgba(255, 248, 232, 0.20) 0%,
      rgba(255, 240, 215, 0.08) 30%,
      transparent 70%
    );
    filter: blur(12px);
  }

  /* ----- Film grain overlay -----
     SVG turbulence baked into a data: URL. Repeating texture, mix-blend
     overlay so dark and light areas both get the same grain weight. The
     opacity is intentional — too light and it's invisible, too heavy and
     it reads as JPEG artefact. */
  .noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    opacity: 0.45;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.8  0 0 0 0 0.8  0 0 0 0 0.8  0 0 0 0.5 0'/></filter><rect width='320' height='320' filter='url(%23n)'/></svg>");
  }

  /* ----- Subtle vignette at the edges of the frame ----- */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 150;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(0, 0, 0, 0.45) 100%
    );
  }

  /* ----- Top chrome — minimal, just the brand mark + a back link ----- */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }
  .topbar a, .topbar .brand {
    pointer-events: auto;
    color: rgba(232, 227, 214, 0.7);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.25s ease;
  }
  .topbar a:hover { color: rgba(232, 227, 214, 1); }
  .brand { font-weight: 500; }

  /* ----- The stage. The 3D container that gives the carousel depth. ----- */
  .stage {
    position: absolute;
    inset: 0;
    z-index: 10;
    perspective: 1600px;
    perspective-origin: 50% 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }

  .carousel {
    position: relative;
    width: 380px;
    height: 540px;
    transform-style: preserve-3d;
  }

  /* ----- The card.
     position: absolute so its transform is independent of layout. The
     transform is fully owned by JS (positionCards()); CSS only sets the
     animation curve and base styling. */
  .card {
    position: absolute;
    inset: 0;
    cursor: pointer;
    will-change: transform, filter, opacity;
    transition:
      transform 0.65s cubic-bezier(0.22, 0.8, 0.26, 1),
      filter   0.45s cubic-bezier(0.22, 0.8, 0.26, 1),
      opacity  0.45s linear;
    transform-style: preserve-3d;
  }
  /* The visual glass — separate from .card so parallax tilt can apply
     to the inner layer without fighting the carousel transform. */
  .card-glass {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 50%, rgba(0,0,0,0.10) 100%),
      linear-gradient(135deg, rgba(255,240,220,0.04) 0%, rgba(120,100,80,0.02) 100%);
    border: 1px solid rgba(255, 240, 220, 0.08);
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.7),
      0 8px 24px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 240, 220, 0.06),
      inset 0 -1px 0 rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px) saturate(1.1);
    -webkit-backdrop-filter: blur(10px) saturate(1.1);
    overflow: hidden;
    transition: transform 0.18s cubic-bezier(0.22, 0.61, 0.36, 1);
    transform-style: preserve-3d;
  }

  /* Edge glow when the card is in the spotlight. Activated via JS by
     toggling .is-active on the card root. */
  .card.is-active .card-glass {
    box-shadow:
      0 50px 100px rgba(0, 0, 0, 0.8),
      0 10px 30px rgba(0, 0, 0, 0.5),
      0 0 60px rgba(255, 230, 190, 0.12),
      inset 0 1px 0 rgba(255, 240, 220, 0.12),
      inset 0 -1px 0 rgba(0, 0, 0, 0.3);
    border-color: rgba(255, 240, 220, 0.16);
  }

  /* Top sheen — a thin highlight, like glass catching the spotlight. */
  .card-glass::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(180deg, rgba(255, 248, 230, 0.08) 0%, transparent 100%);
    pointer-events: none;
    border-radius: 24px 24px 0 0;
  }

  .card-biom {
    position: absolute;
    top: 5%;
    left: 5%;
    width: 90%;
    height: 70%;
    object-fit: contain;
    pointer-events: none;
    /* Bioms were rendered as transparent cutouts, but their glass-look
       was tuned against a cream background. On dark we add a faint
       drop shadow to keep them grounded. */
    filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.5));
    transition: opacity 0.4s ease;
  }

  /* The live render iframe — same preview.html that OpenSea iframes as
     animation_url. ?cutout=1 makes its body transparent so the biom sits
     on our dark card without a cream chrome of its own. Only the active
     card gets one mounted; side cards stay as static cutouts.

     Sized to inset:0 to cover the card, but preview.html's internal
     comp-scale (0.62 in cutout mode) keeps the biom centred within
     roughly the same area the static cutout-img occupied — so the
     transition from static→live is positionally consistent. */
  .card-iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: transparent;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    border-radius: 24px;
    /* Force GPU compositing — without this, the iframe's internal
       backdrop-filter glass renders fight our carousel transforms. */
    transform: translateZ(0);
  }
  .card-iframe.loaded {
    opacity: 1;
    pointer-events: auto;
  }
  /* Hide the static cutout once the iframe takes over — both visible
     at once produces a faint double-image during cursor parallax. */
  .card.is-active .card-iframe.loaded ~ .card-meta,
  .card.is-active .card-iframe.loaded {
    /* keep meta visible above the iframe */
  }
  .card.is-active .card-biom.dimmed { opacity: 0; }

  .card-meta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: left;
  }
  .card-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(232, 227, 214, 0.55);
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .card-name {
    font-size: 18px;
    color: rgba(232, 227, 214, 0.92);
    letter-spacing: 0.02em;
    font-style: italic;
  }

  /* ----- Bottom hint + controls ----- */
  .footer {
    position: fixed;
    bottom: 32px; left: 0; right: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    pointer-events: none;
  }
  .hint {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(232, 227, 214, 0.4);
    font-family: 'SF Mono', 'Menlo', monospace;
    transition: opacity 0.4s ease;
  }
  .hint.faded { opacity: 0; }
  .ctas {
    display: flex;
    gap: 16px;
    pointer-events: auto;
  }
  .cta {
    pointer-events: auto;
    background: rgba(232, 227, 214, 0.06);
    border: 1px solid rgba(232, 227, 214, 0.16);
    color: rgba(232, 227, 214, 0.85);
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }
  .cta:hover {
    background: rgba(232, 227, 214, 0.12);
    border-color: rgba(232, 227, 214, 0.32);
    color: rgba(232, 227, 214, 1);
  }
  .cta:focus-visible {
    outline: 1px solid rgba(232, 227, 214, 0.6);
    outline-offset: 2px;
  }

  /* ----- Counter — bottom right, the "n of N" indicator ----- */
  .counter {
    position: fixed;
    bottom: 32px;
    right: 36px;
    z-index: 100;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(232, 227, 214, 0.45);
    font-family: 'SF Mono', 'Menlo', monospace;
    pointer-events: none;
  }
  .counter .now { color: rgba(232, 227, 214, 0.95); }

  /* ----- Mobile — squash carousel scale, hide cursor hint ----- */
  @media (max-width: 720px) {
    .carousel { width: 280px; height: 400px; }
    .card-meta { padding: 16px 18px 18px; }
    .card-name { font-size: 16px; }
    .topbar { padding: 16px 18px; }
    .footer { bottom: 18px; gap: 10px; }
    .counter { bottom: 18px; right: 18px; }
  }

  /* ----- Prefers-reduced-motion: no auto-rotate, snap transitions ----- */
  @media (prefers-reduced-motion: reduce) {
    .card { transition-duration: 0s; }
    .card-glass { transition-duration: 0s; }
  }
</style>
</head>
<body>

<div class="spotlight" aria-hidden="true"></div>

<header class="topbar">
  <a class="brand" href="/">Bioms</a>
  <a href="/" aria-label="Back to home">←  back</a>
</header>

<main class="stage" id="stage">
  <div class="carousel" id="carousel" role="region" aria-label="Series I — sample bioms">
    <!-- Cards populated by JS -->
  </div>
</main>

<div class="counter" id="counter"><span class="now">01</span> / <span id="counterTotal">12</span></div>

<footer class="footer">
  <div class="hint" id="hint">scroll · arrows · drag · click to open</div>
  <div class="ctas">
    <button class="cta" id="shuffleBtn">Shuffle</button>
    <button class="cta" id="autoBtn" data-on="true">Pause</button>
  </div>
</footer>

<div class="noise" aria-hidden="true"></div>

<script>
// =========================================================================
// /look — showcase carousel
//
// 12 Bioms displayed on a 3D arc. The active card sits in the spotlight,
// catches the cursor, and links to /preview.html?seed=N. Side cards are
// pushed back in Z, blurred, and dim. Wheel / arrows / drag / autorotate
// all rotate the same currentIndex value; positionCards() reapplies the
// transforms in one place.
//
// Memory note: each card is a single <img> sourced from /cutout-sm/
// (the 384px transparent variant we baked for /make collages). That keeps
// total decoded pixel memory under ~80MB even at 12 cards, vs ~70MB for
// the same images at /cutout/'s 1200×1200 source.
// =========================================================================

const PNG_BASE = 'https://pngs.thebioms.com';
const CUTOUT_V = 5;

// Default selection — distributed across the 3000-seed space so the
// shuffled palette spans the visual diversity of Series I.
const DEFAULT_SEEDS = [44, 287, 512, 731, 1024, 1247, 1542, 1763, 2014, 2298, 2517, 2750];

const carousel  = document.getElementById('carousel');
const counter   = document.getElementById('counter');
const counterTotal = document.getElementById('counterTotal');
const hintEl    = document.getElementById('hint');
const autoBtn   = document.getElementById('autoBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

let seeds = DEFAULT_SEEDS.slice();
let currentIndex = 0;
let cardEls = [];
let autoTimer = null;
let autoOn = true;
let lastInteraction = 0;
const AUTO_DELAY_MS = 5500;

// ----- Build cards from the seed list -----
function rebuildCards() {
  carousel.innerHTML = '';
  cardEls = [];
  seeds.forEach((seed, i) => {
    const padded = String(seed).padStart(5, '0');
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.seed = String(seed);
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '-1');
    card.setAttribute('aria-label', `Biom number ${seed}`);
    card.innerHTML = `
      <div class="card-glass">
        <img class="card-biom" src="${PNG_BASE}/cutout-sm/${padded}.webp?v=${CUTOUT_V}" alt="" decoding="async" loading="${i < 4 ? 'eager' : 'lazy'}">
        <iframe class="card-iframe" src="about:blank" title="Biom #${padded} live preview" tabindex="-1" loading="lazy"></iframe>
        <div class="card-meta">
          <div class="card-label">Biom · #${padded}</div>
          <div class="card-name">Series I</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => {
      // If the user clicked a non-centre card, snap focus to it first.
      // A second click on the centred card opens the full preview.
      const i = cardEls.indexOf(card);
      if (i !== currentIndex) {
        currentIndex = i;
        positionCards();
        bumpInteraction();
      } else {
        window.open(`/preview.html?seed=${seed}`, '_blank', 'noopener');
      }
    });
    carousel.appendChild(card);
    cardEls.push(card);
  });
  counterTotal.textContent = String(seeds.length).padStart(2, '0');
  positionCards();
}

// ----- Live iframe management -----
// Only the active card gets a live preview.html iframe. Side cards stay
// as static cutouts — 12 simultaneous engine instances would burn
// laptops the same way explore.html's iframe grid did before we baked
// it to PNGs. The iframe is the SAME page OpenSea uses as animation_url,
// so what the user sees on /look is byte-identical to what they'll get
// on the marketplace.
//
// Lifecycle per navigation:
//   1. Old active card: src ← 'about:blank' → engine document unloaded,
//      memory released, .loaded class removed → fades back to 0 opacity.
//      The static cutout underneath remains, so the card never goes blank.
//   2. New active card: src ← /preview.html?seed=N&cutout=1.
//      ?cutout=1 makes its body transparent (matches the dark card).
//      Cursor parallax is built into preview.html (line 1761 there) and
//      activates because we don't pass ?static or ?nointeract.
//   3. On iframe.onload: add .loaded → opacity transitions to 1, the
//      static cutout fades out (.dimmed on .card-biom). The hand-off is
//      ~500ms — slow enough to read as a deliberate reveal, fast enough
//      to feel responsive.
function mountActiveIframe() {
  cardEls.forEach((card, i) => {
    const iframe = card.querySelector('.card-iframe');
    const biom   = card.querySelector('.card-biom');
    if (!iframe) return;
    if (i === currentIndex) {
      const seed = seeds[i];
      const padded = String(seed).padStart(5, '0');
      const desired = `/preview.html?seed=${seed}&cutout=1`;
      if (iframe.dataset.src !== desired) {
        iframe.dataset.src = desired;
        iframe.classList.remove('loaded');
        if (biom) biom.classList.remove('dimmed');
        // Detach old onload handler before reassigning to avoid leaks
        iframe.onload = () => {
          // Only honor this load if we're still pointed at the same seed —
          // the user might have navigated past during the load.
          if (iframe.dataset.src === desired) {
            iframe.classList.add('loaded');
            if (biom) biom.classList.add('dimmed');
          }
        };
        iframe.src = desired;
      } else {
        // Same seed, already loaded — just re-reveal.
        iframe.classList.add('loaded');
        if (biom) biom.classList.add('dimmed');
      }
    } else {
      // Inactive — unmount, free memory, restore static cutout
      if (iframe.dataset.src) {
        iframe.classList.remove('loaded');
        iframe.src = 'about:blank';
        delete iframe.dataset.src;
        iframe.onload = null;
      }
      if (biom) biom.classList.remove('dimmed');
    }
  });
}

// ----- Position every card based on its signed distance from current -----
// Distance 0 = active centre. Distance 1/-1 = adjacent. |distance|>3 hidden.
function positionCards() {
  const total = cardEls.length;
  cardEls.forEach((card, i) => {
    // Signed shortest distance on the line (we don't wrap visually — the
    // line of cards extends left/right rather than forming a closed loop.
    // A closed wheel made the "blur trail" inconsistent at the edges).
    const distance = i - currentIndex;
    const absD = Math.abs(distance);
    const sign = Math.sign(distance);

    if (absD > 3) {
      card.style.opacity = '0';
      card.style.pointerEvents = 'none';
      card.style.transform = `translateX(${sign * 800}px) translateZ(-600px)`;
      card.classList.remove('is-active');
      return;
    }

    // Geometry: spread horizontally, recede in Z, tilt outward.
    const xSpread = 220;
    const zRecede = 140;
    const yRot    = 28;     // degrees at distance=1, tapered after
    const scale   = absD === 0 ? 1.0 : Math.max(0.74, 1 - absD * 0.10);
    const blurPx  = absD === 0 ? 0 : Math.min(absD * 5, 14);
    const op      = absD === 0 ? 1 : Math.max(0.32, 1 - absD * 0.22);

    const x  = distance * xSpread;
    const z  = -absD * zRecede;
    const ry = -sign * Math.min(absD, 1.4) * yRot;

    card.style.opacity = String(op);
    card.style.pointerEvents = 'auto';
    card.style.zIndex = String(100 - absD);
    card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${ry}deg) scale(${scale})`;
    card.style.filter = blurPx ? `blur(${blurPx}px)` : 'none';
    card.classList.toggle('is-active', absD === 0);
    // Reset inner glass tilt for non-active; active card's tilt gets
    // written by the mousemove handler below.
    if (absD !== 0) {
      const glass = card.querySelector('.card-glass');
      if (glass) glass.style.transform = '';
    }
  });

  // Update counter
  const c = counter.querySelector('.now');
  if (c) c.textContent = String(currentIndex + 1).padStart(2, '0');

  // Mount the live iframe on the new active card, unmount from old.
  // Called after layout updates so the iframe inherits the right card's
  // transform and shadow chain. Defers actual src assignment by one frame
  // so the carousel scroll animation isn't interrupted by iframe load.
  requestAnimationFrame(mountActiveIframe);
}

// ----- Navigation -----
function step(delta) {
  const next = Math.max(0, Math.min(seeds.length - 1, currentIndex + delta));
  if (next === currentIndex) return;
  currentIndex = next;
  positionCards();
  bumpInteraction();
}

// ----- Active-card cursor parallax -----
// We listen on the whole stage (not just the active card) because the
// card can be small and the user often hovers near it. The signal is
// mapped to ±10deg rotateX/Y on the inner .card-glass.
const stage = document.getElementById('stage');
stage.addEventListener('mousemove', (e) => {
  const active = cardEls[currentIndex];
  if (!active) return;
  const rect = active.getBoundingClientRect();
  // Normalize cursor to card-relative -0.5..0.5
  const cx = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
  const cy = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
  // Clamp so wide screen doesn't push the parallax past natural angles.
  const cxC = Math.max(-1.4, Math.min(1.4, cx));
  const cyC = Math.max(-1.4, Math.min(1.4, cy));
  const glass = active.querySelector('.card-glass');
  if (glass) {
    glass.style.transform = `rotateY(${cxC * 8}deg) rotateX(${-cyC * 6}deg)`;
  }
});
stage.addEventListener('mouseleave', () => {
  const glass = cardEls[currentIndex]?.querySelector('.card-glass');
  if (glass) glass.style.transform = '';
});

// ----- Wheel / scroll input -----
// Vertical wheel only. We aggregate dy into a tick threshold so a single
// hardware-trackpad gesture doesn't spam dozens of steps.
let wheelAccumulator = 0;
const WHEEL_TICK = 60;
window.addEventListener('wheel', (e) => {
  // Prevent the page from trying to scroll (it's overflow:hidden anyway,
  // but Safari's rubber-band still chews a frame).
  e.preventDefault();
  wheelAccumulator += e.deltaY;
  while (wheelAccumulator >= WHEEL_TICK) {
    wheelAccumulator -= WHEEL_TICK;
    step(1);
  }
  while (wheelAccumulator <= -WHEEL_TICK) {
    wheelAccumulator += WHEEL_TICK;
    step(-1);
  }
}, { passive: false });

// ----- Keyboard -----
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    step(1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    step(-1);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const seed = seeds[currentIndex];
    window.open(`/preview.html?seed=${seed}`, '_blank', 'noopener');
  }
});

// ----- Touch / drag swipe -----
let dragStartX = null;
let dragStartIndex = 0;
stage.addEventListener('pointerdown', (e) => {
  dragStartX = e.clientX;
  dragStartIndex = currentIndex;
  stage.setPointerCapture(e.pointerId);
});
stage.addEventListener('pointermove', (e) => {
  if (dragStartX == null) return;
  const dx = e.clientX - dragStartX;
  // 120px per card — gentle enough for trackpad-as-mouse, snappy on touch.
  const k = Math.round(dx / 120);
  const next = Math.max(0, Math.min(seeds.length - 1, dragStartIndex - k));
  if (next !== currentIndex) {
    currentIndex = next;
    positionCards();
    bumpInteraction();
  }
});
stage.addEventListener('pointerup',   () => { dragStartX = null; });
stage.addEventListener('pointercancel', () => { dragStartX = null; });

// ----- Auto-rotate -----
// Pauses while the user interacts; resumes 6s after the last input. Stops
// completely if the user presses the toggle.
function bumpInteraction() {
  lastInteraction = Date.now();
  hintEl.classList.add('faded');
}
function tickAuto() {
  clearTimeout(autoTimer);
  if (!autoOn) return;
  autoTimer = setTimeout(() => {
    // Skip if user interacted recently
    if (Date.now() - lastInteraction < AUTO_DELAY_MS) {
      tickAuto();
      return;
    }
    // Loop back to start when reaching the end
    if (currentIndex >= seeds.length - 1) {
      currentIndex = 0;
    } else {
      currentIndex += 1;
    }
    positionCards();
    tickAuto();
  }, AUTO_DELAY_MS);
}

autoBtn.addEventListener('click', () => {
  autoOn = !autoOn;
  autoBtn.textContent = autoOn ? 'Pause' : 'Play';
  autoBtn.dataset.on = String(autoOn);
  if (autoOn) tickAuto();
  else clearTimeout(autoTimer);
});

// ----- Shuffle -----
// New random selection of 12 from the 3000-seed space, deduped.
shuffleBtn.addEventListener('click', () => {
  const fresh = new Set();
  while (fresh.size < 12) fresh.add(Math.floor(Math.random() * 3000));
  seeds = Array.from(fresh);
  currentIndex = 0;
  rebuildCards();
  bumpInteraction();
});

// ----- First paint -----
rebuildCards();
tickAuto();
</script>
</body>
</html>
