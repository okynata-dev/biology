<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --ink: #1a1712;
    --ink-2: #5f584d;
    --ink-3: #6b645a;
    --rule: rgba(26, 23, 18, 0.10);
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
    line-height: 1.5;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: rgba(26, 23, 18, 0.10); color: var(--ink); }

  a { color: inherit; text-decoration: none; }
  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
    border-radius: 4px;
  }

  .skip-link {
    position: absolute; left: -9999px; top: 0;
    background: var(--ink); color: var(--bg);
    padding: 12px 18px; border-radius: 0 0 8px 0;
    font-size: 14px; font-weight: 500; z-index: 9999;
  }
  .skip-link:focus { left: 0; }

  nav {
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.9);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.005em;
    transition: opacity 0.15s;
  }
  .brand:hover { opacity: 0.65; }
  .brand-mark { width: 18px; height: 18px; display: block; }
  .nav-links { display: flex; align-items: center; gap: 22px; font-size: 14px; }
  .nav-links a {
    color: var(--ink-3);
    transition: color 0.15s;
    padding: 12px 6px; margin: -12px -6px;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-x { display: inline-flex; align-items: center; color: var(--ink-3); transition: color 0.15s; margin-left: 4px; }
  .nav-x:hover { color: var(--ink); }
  .x-icon { width: 15px; height: 15px; display: block; }
  @media (max-width: 600px) {
    nav { padding: 14px 18px; }
    .nav-links { gap: 14px; font-size: 13px; }
  }

  /* === HERO — the organism, live and uncropped, and the wordmark. === */
  .hero {
    padding: clamp(40px, 8vh, 96px) 24px clamp(24px, 4vh, 48px);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .hero-stage {
    font: inherit; color: inherit; padding: 0; border: 0;
    background: transparent; -webkit-appearance: none; appearance: none;
    position: relative;
    width: min(74vw, 62vh);
    height: min(74vw, 62vh);
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @media (hover: hover) { .hero-stage:hover { transform: scale(1.02); } }
  .hero-stage:active { transform: scale(0.995); }
  .hero-stage iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0; display: block;
    background: #fff;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  .hero-stage iframe.on { opacity: 1; }
  .hero-stage:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
  .hero-word {
    font-size: clamp(44px, 7vw, 96px);
    font-weight: 500;
    letter-spacing: -0.035em;
    line-height: 1;
    margin-top: clamp(12px, 2vh, 28px);
  }

  /* === GALLERY — the collection itself, each cell a living loop. === */
  .gallery {
    padding: clamp(24px, 4vh, 48px) clamp(16px, 3vw, 40px) clamp(64px, 9vh, 120px);
    max-width: 1320px;
    margin: 0 auto;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
    gap: clamp(10px, 1.4vw, 20px);
  }
  .cell {
    position: relative;
    aspect-ratio: 1;
    display: block;
    overflow: hidden;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: #fff;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.2s;
  }
  .cell video, .cell img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    background: #fff;
  }
  .cell .id {
    position: absolute;
    bottom: 12px; left: 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink-3);
    background: rgba(255, 255, 255, 0.72);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    padding: 2px 7px;
    border-radius: 5px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  @media (hover: hover) {
    .cell:hover { transform: translateY(-3px); border-color: rgba(26, 23, 18, 0.26); }
    .cell:hover .id { opacity: 1; }
  }
  @media (hover: none) { .cell .id { opacity: 1; } }

  .all {
    display: block;
    text-align: center;
    margin-top: clamp(40px, 6vh, 72px);
    font-size: 15px;
    color: var(--ink-3);
    transition: color 0.15s;
  }
  .all:hover { color: var(--ink); }

  footer {
    padding: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 13px;
    color: var(--ink-3);
    border-top: 1px solid var(--rule);
  }
  footer a { transition: color 0.15s; }
  footer a:hover { color: var(--ink); }
  .footer-meta { display: flex; align-items: center; gap: 14px; }
  .footer-meta .sep { opacity: 0.4; }
  @media (max-width: 600px) {
    footer { padding: 24px 18px; flex-direction: column; text-align: center; gap: 12px; }
    .footer-meta { flex-wrap: wrap; justify-content: center; gap: 8px 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

    <div class="gallery-grid" id="grid"></div>
    <a class="all" href="/glass-500.html">See all 500 →</a>
  </section>
</main>

    <span class="sep">·</span>
    <a href="/bioms">Bioms</a>

    <a href="/glass-500.html">Renderer</a>
  </div>
  <div class="footer-meta">
    <a href="https://twitter.com/theBioms" target="_blank" rel="noopener">@theBioms</a>

    <a href="https://twitter.com/timsouw" target="_blank" rel="noopener">by @timsouw</a>

<script>
(function () {
  var TOTAL = 500;
  var CDN = 'https://pngs.thebioms.com';
  var pad = function (n) { return String(n).padStart(3, '0'); };

  // --- hero: the live renderer, uncropped (full=1), tap to roll ---
  var stage = document.getElementById('heroStage');
  var HERO_IDS = [134, 13, 154, 11, 44, 230, 357, 140, 171, 18];
  var current = HERO_IDS[Math.floor(Math.random() * HERO_IDS.length)];

  function mountHero(id) {
    stage.innerHTML = '';
    var f = document.createElement('iframe');
    f.src = '/glass-500.html?id=' + id + '&token=1&full=1&flat=1&z=1.1';
    f.title = 'Luom #' + id;
    f.loading = 'eager';
    f.addEventListener('load', function () { f.classList.add('on'); });
    stage.appendChild(f);
  }
  mountHero(current);
  stage.addEventListener('click', function () {
    var next;
    do { next = 1 + Math.floor(Math.random() * TOTAL); } while (next === current);
    current = next;
    mountHero(current);
  });

  // --- gallery: the seamless mp4 loops (on R2), one per cell ---
  // Each cell is a real video, not a still. Videos are loaded and played
  // only while on screen (IntersectionObserver), so scrolling never has
  // more than a handful decoding at once — light even on a fanless laptop.
  var GALLERY = [230, 423, 140, 357, 350, 362, 18, 183, 11, 191,
                 13, 154, 134, 392, 37, 44, 174, 307];
  var grid = document.getElementById('grid');

  var io = ('IntersectionObserver' in window) ? new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      var v = e.target;
      if (e.isIntersecting) {
        if (!v.src) v.src = v.dataset.src;
        var p = v.play(); if (p && p.catch) p.catch(function () {});
      } else {
        v.pause();
      }
    });
  }, { rootMargin: '200px' }) : null;

  GALLERY.forEach(function (id) {
    var a = document.createElement('a');
    a.className = 'cell';
    a.href = '/glass-500.html?id=' + id;
    a.target = '_blank';
    a.rel = 'noopener';
    a.setAttribute('aria-label', 'Luom #' + id);

    var v = document.createElement('video');
    v.muted = true; v.loop = true; v.playsInline = true;
    v.setAttribute('muted', ''); v.setAttribute('playsinline', '');
    v.preload = 'none';
    v.poster = CDN + '/glass-img/' + pad(id) + '.jpg';
    v.dataset.src = CDN + '/glass/' + pad(id) + '.mp4';
    a.appendChild(v);

    var tag = document.createElement('span');
    tag.className = 'id';
    tag.textContent = '#' + pad(id);
    a.appendChild(tag);

    grid.appendChild(a);
    if (io) io.observe(v);
    else { v.autoplay = true; v.src = v.dataset.src; }
  });
})();
</script>
