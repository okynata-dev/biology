# Bioms Lab — Cloudflare Worker config.
# Deploys to api.thebioms.com (route configured in Cloudflare dashboard).
#
# First-time setup:
#   1. wrangler login
#   2. wrangler d1 create bioms-lab
#      → copy the database_id printed and paste below
#   3. wrangler d1 execute bioms-lab --file=schema.sql --remote
#   4. echo "<alchemy-key>" | wrangler secret put ALCHEMY_KEY
#   5. (post-mint) echo "<contract-addr>" | wrangler secret put CONTRACT_ADDRESS
#      OR set [vars].CONTRACT_ADDRESS below — secrets are preferred.
#   6. (optional) echo "<opensea-key>" | wrangler secret put OPENSEA_API_KEY
#   7. wrangler deploy
#
# After deploy, in Cloudflare dashboard:
#   - Workers & Pages → bioms-api → Settings → Triggers → Custom Domains
#   - Add api.thebioms.com (DNS auto-configures if domain is on Cloudflare)
#
# Updating CONTRACT_ADDRESS post-mint:
#   echo "0xYourContract" | wrangler secret put CONTRACT_ADDRESS
#   (no redeploy needed; worker picks up env on next request)

name = "bioms-api"
main = "worker.js"
compatibility_date = "2026-05-17"
# nodejs_compat — required by @cloudflare/puppeteer which imports
# node:buffer for screenshot byte handling. Safe addition: only enables
# the standard node:* modules under explicit import.
compatibility_flags = ["nodejs_compat"]

# ------------------------------------------------------------
# Share-card route on the MAIN zone. thebioms.com is a CF Pages
# project; Workers routes take precedence over Pages for matching
# paths, so this narrow /b/* pattern sends ONLY the tweet share-card
# URLs to the worker (handleShareBurn) and leaves every other path
# to Pages. Do NOT widen this pattern — a broad match would shadow
# the live site. The api.thebioms.com custom domain (dashboard-
# configured) is unaffected.
# ------------------------------------------------------------
routes = [
  { pattern = "thebioms.com/b/*", zone_name = "thebioms.com" }
]

# ------------------------------------------------------------
# D1 binding — REQUIRED. The database_id below is intentionally a
# do-not-deploy placeholder; replace it with the UUID printed by
# `wrangler d1 create bioms-lab` BEFORE the first `wrangler deploy`.
#
# `scripts_deploy_check.sh` (run as part of the deploy workflow) refuses
# to proceed while this placeholder is still present, so a clean clone
# can't accidentally ship a worker pointed at a dead D1.
# ------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "bioms-lab"
database_id = "3f0dd6bd-c62d-4fe8-a0db-e351d410ebfa"

# ------------------------------------------------------------
# R2 bucket — used by the post-mutation re-render pipeline.
# After a successful conjugate/burn, the Worker takes a headless
# screenshot of preview.html (with the new state encoded in URL
# force-* params) and uploads the result here, overwriting the
# token's master PNG. The bucket is also served publicly at
# pngs.thebioms.com (custom-domain mapping in CF dashboard).
# ------------------------------------------------------------
[[r2_buckets]]
binding = "PNGS"
bucket_name = "bioms-pngs"

# ------------------------------------------------------------
# Browser Rendering — headless Chromium for re-rendering tokens
# after mutation. Requires the Cloudflare Workers Paid plan (the
# free tier doesn't include Browser Rendering binding).
# Pricing: ~$0.0001 per second of browser usage. Each render is
# 2-5s; 50 burns/day → ~$0.03/day operating cost.
#
# IMPORTANT: this MUST be its own [browser] table header. The
# previous inline `browser = { binding = "BROWSER" }` form looked
# top-level but TOML actually treats every key after a [[r2_buckets]]
# header as part of that array entry until the next section header
# appears — so wrangler was logging "Unexpected fields found in
# r2_buckets[0] field: browser" on every deploy AND env.BROWSER was
# silently undefined in the worker, which would have meant
# renderTokenMaster failing with no_browser_binding the first time
# anyone burnt.
# ------------------------------------------------------------
[browser]
binding = "BROWSER"

# ------------------------------------------------------------
# Cron triggers — the X auto-poster (worker.js scheduled()).
#   */5  — drip out untweeted burns from D1 (2 per tick, oldest first)
#   Mon 09:00 UTC — weekly colony report (skipped when 0 burns/week)
# Needs the four X_* secrets; without them scheduled() is a no-op.
# ------------------------------------------------------------
[triggers]
crons = ["*/5 * * * *", "0 9 * * 1"]

[vars]
# Public config — fine to commit. Secrets go via `wrangler secret put`.
CHAIN_ID = "1"
COOLDOWN_SECONDS = "2592000"   # 30 days
REJECTION_RATE = "0.15"
CONJUGATE_RATE_PER_MIN = "5"   # max accepted conjugates per signer per minute
# MAX_TOKEN_ID = "2999"        # uncomment to override the default 0..2999 supply

# Secrets (set via wrangler secret put — DO NOT commit values here):
# - ALCHEMY_KEY        — Alchemy NFT API key, required for ownership checks
# - CONTRACT_ADDRESS   — launch contract address, set after mint
# - OPENSEA_API_KEY    — optional, enables auto metadata-refresh after each conjugation
# - WAITLIST_IP_SALT   — optional, rotates IP-hash key for the waitlist rate-limiter
