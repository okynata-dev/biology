<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Bioms">
  <title>Bioms</title>
  <!--
    v3 (2026-05): user feedback on v2 was "ещё чёрный круг" — v2's
    near-circular cell (24×20, rx=10) read as a generic record-button
    eye at favicon size. Losing the elongated silhouette and reducing
    to one centered organelle made the mark look schematic instead of
    biological.

    v3 brings back the rod-bacterium pill silhouette (26×12, rx=6) and
    restores three organelles of varying sizes in an asymmetric layout:
    one big nucleoid on the left + a smaller pair on the right. All at
    full opacity (v1's bug was 0.5–0.82 opacity dissolving at favicon
    size; v2's bug was over-simplifying to one shape). The asymmetry is
    what makes the eye read "alive" instead of "schematic".

    Glass treatment stays: bloom highlight upper-left, sheen top fade,
    crisp membrane stroke. The pill shape + three internal dots + glass
    = recognisable as "bacterium under a microscope" at any size.

    Brand alignment: same dark warm body (#3d3a32 → #16140f) on cream
    organelles (#fdf6e3 / #f4ead4) used everywhere on the site. The
    nav brand-mark loads this exact file so favicon and logo stay
    byte-identical. See favicon-dark.svg for the prefers-color-scheme:
    dark variant.
  -->
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#3d3a32"/>
      <stop offset="0.55" stop-color="#211e18"/>
      <stop offset="1"    stop-color="#0e0c08"/>
    </linearGradient>
    <radialGradient id="bloom" cx="0.22" cy="0.18" r="0.65">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="0.5"  stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.22" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nuc" cx="0.38" cy="0.32" r="0.7">
      <stop offset="0"    stop-color="#fff5dc"/>
      <stop offset="0.65" stop-color="#f4ead4"/>
      <stop offset="1"    stop-color="#dec99c"/>
    </radialGradient>
  </defs>

  <!-- Body — proper rod-bacterium pill. Wider and flatter than v2 so the
       silhouette reads as "bacterium" not "eye/circle". -->
  <rect x="3" y="10" width="26" height="12" rx="6" fill="url(#body)"/>

  <!-- Nucleoid — big, off-centre left, full opacity. Subtle radial
       gradient gives it 3D depth (the highlight on the upper-left
       mirrors the cell's bloom). At 16px favicon size this organelle
       is ~1.4px — small but distinctly cream against dark, visible. -->
  <circle cx="9.8" cy="15.6" r="2.9" fill="url(#nuc)"/>

  <!-- Ribosomes — smaller pair on the right, both opaque so they
       survive at favicon size. Slight size variance avoids "two equal
       dots" looking too symmetric/intentional. -->
  <circle cx="17.6" cy="14.2" r="1.5" fill="#f4ead4"/>
  <circle cx="22.4" cy="17.8" r="1.1" fill="#f4ead4"/>
  <!-- One tiny accent so the right-side cluster has a triangular
       composition (rule of three). Reads only at logo size — at 16px
       this dot is sub-pixel and falls away, which is fine. -->
  <circle cx="24.6" cy="14.6" r="0.55" fill="#f4ead4" fill-opacity="0.85"/>

  <!-- Glass overlays — layered OVER the contents so it feels like real
       glass with stuff sealed inside. Bloom upper-left is the signature
       wet-and-alive cue. -->
  <rect x="3" y="10" width="26" height="12" rx="6" fill="url(#bloom)"/>
  <rect x="3" y="10" width="26" height="12" rx="6" fill="url(#sheen)"/>

  <!-- Membrane edge — 1.0 stroke width at 70% opacity. Keeps the
       silhouette crisp at 16×16 while not feeling like a hard outline. -->
  <rect x="3" y="10" width="26" height="12" rx="6"
        fill="none" stroke="#0b0a07" stroke-width="1.0" stroke-opacity="0.7"/>
</svg>
