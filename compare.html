<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="bioms-reveal" content="true">
<meta name="robots" content="noindex">
<title>Bioms — render compare (internal)</title>
<link rel="stylesheet" href="/design.css?v=4">
<style>
  /* INTERNAL TOOL — not linked, not indexed. One token at a time:
     current vs a "+1 tier" candidate (rank bumped AND body density tied
     to the new tier, since rank alone is invisible in the art). Both
     sides are preview.html iframes via URL params — nothing live is
     touched. Only two frames mounted at once, so the PC stays smooth. */
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { padding: 18px clamp(14px,3vw,34px) 14px; border-bottom: 1px solid var(--rule); }
  header h1 { margin: 0 0 4px; font-size: 18px; font-weight: 650; }
  header p { margin: 0; font-size: 12.5px; color: var(--ink-3); }
  .controls { display: flex; align-items: center; gap: 12px; justify-content: center;
    padding: 16px; flex-wrap: wrap; }
  .controls button { font: inherit; font-size: 14px; padding: 9px 18px; border-radius: 999px;
    border: 1px solid var(--rule); background: var(--paper); color: var(--ink); cursor: pointer; }
  .controls button:hover { border-color: var(--ink); }
  .controls .jump { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-3); }
  .controls input { width: 64px; font: inherit; padding: 7px 10px; border-radius: 10px;
    border: 1px solid var(--rule); background: var(--paper); color: var(--ink); text-align: center; }
  .stage { max-width: 1000px; margin: 0 auto; padding: 0 16px 60px; }
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .side { background: var(--paper); border: 1px solid var(--rule); border-radius: 18px; overflow: hidden; }
  .side.cand { border-color: color-mix(in srgb, var(--burn) 40%, var(--rule)); }
  .side-head { padding: 11px 14px; border-bottom: 1px solid var(--rule); }
  .side-head .k { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
  .side.cand .side-head .k { color: var(--burn); }
  .side-head .v { font-size: 13.5px; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .frame { position: relative; aspect-ratio: 1/1; background: var(--paper); }
  .frame iframe { width: 100%; height: 100%; border: 0; display: block; }
  .frame .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--ink-3); font-size: 12px; }
  .title { text-align: center; padding: 10px 0 2px; }
  .title .id { font-size: 22px; font-weight: 650; }
  .title .sp { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-top: 2px; }
  @media (max-width: 680px) { .pair { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>Render compare — current vs +1 tier candidate</h1>
  <p>Internal preview. Both sides are <code>preview.html</code> via URL params — nothing live is touched. Rank alone doesn't change the art, so the candidate also scales body density to the new tier.</p>
</header>

<div class="controls">
  <button id="prev">← Prev</button>
  <span class="jump">token <input id="jump" type="number" min="1" max="165" value="1"> / 165</span>
  <button id="next">Next →</button>
</div>

<div class="stage">
  <div class="title"><div class="id" id="tId">#1</div><div class="sp" id="tSp"></div></div>
  <div class="pair">
    <div class="side">
      <div class="side-head"><div class="k">now</div><div class="v" id="nowV">—</div></div>
      <div class="frame" id="nowF"><span class="ph">…</span></div>
    </div>
    <div class="side cand">
      <div class="side-head"><div class="k">candidate · +1 tier</div><div class="v" id="candV">—</div></div>
      <div class="frame" id="candF"><span class="ph">…</span></div>
    </div>
  </div>
</div>

<script src="/specimen-engine.js?v=2"></script>
<script>
(function () {
  'use strict';
  const API = 'https://api.thebioms.com';
  const MAX = 165;
  const E = window.BiomEngine;
  const TIERS = ['Genesis', 'Hybrid', 'Chimera', 'Phoenix', 'Superorganism', 'Biome'];
  const tierOf = r => TIERS[Math.min(Math.max(r, 1), 6) - 1];

  // A "+1 tier" in Bioms means absorbing another organism — the survivor
  // gains the donor's stain (blended), its organelles, and bulk. So the
  // candidate SIMULATES that absorption (not just +cells on the same
  // token, which is why the first attempt looked identical).
  const CELL_CAP = 9;
  function candCells(curCells, newRank) {
    return Math.min(CELL_CAP, Math.max(curCells + 2, 2 + newRank * 2));
  }
  // Vivid donor stains to blend in — deterministic by seed so a token's
  // candidate is stable each view.
  const DONOR_STAINS = ['iridescent_aurora', 'fluorescent', 'congo_red', 'nile_blue', 'malachite'];
  const EXTRA_ORGS = ['flagellum', 'eyespot', 'pili', 'plasmid', 'inclusion'];

  let seed = 1;
  const $ = id => document.getElementById(id);

  function forceParamsFromMutations(m) {
    let s = '';
    if (!m) return s;
    if (m.palette) s += '&forceStain=' + encodeURIComponent(m.palette);
    if (Array.isArray(m.organelles) && m.organelles.length) s += '&forceOrganelles=' + encodeURIComponent(m.organelles.join(','));
    const a = m.anomalies || [];
    if (a.includes('phageAttached')) s += '&forcePhage=1';
    if (a.includes('endosymbiont')) s += '&forceEndo=1';
    if (a.includes('biofilmHalo')) s += '&forceBiofilm=1';
    return s;
  }

  async function show(n) {
    seed = Math.max(1, Math.min(MAX, n));
    $('jump').value = seed;
    $('tId').textContent = '#' + seed;
    try { $('tSp').textContent = E.species(seed); } catch (_) { $('tSp').textContent = ''; }
    $('nowF').innerHTML = '<span class="ph">…</span>';
    $('candF').innerHTML = '<span class="ph">…</span>';
    $('nowV').textContent = '—'; $('candV').textContent = '—';

    // Pull this token's real state: rank + cells from metadata, raw
    // mutation keys from state (for accurate force-params).
    let rank = 1, cells = 0, mut = null;
    try {
      const [meta, st] = await Promise.all([
        fetch(`${API}/api/metadata/${seed}`).then(r => r.json()),
        fetch(`${API}/api/state/${seed}`).then(r => r.json()).catch(() => ({})),
      ]);
      for (const a of (meta.attributes || [])) {
        if (a.trait_type === 'Rank') rank = a.value;
        if (a.trait_type === 'Cell count') cells = a.value;
      }
      mut = st.mutations || null;
    } catch (_) {}

    const newRank = Math.min(6, rank + 1);
    const newCells = candCells(cells, newRank);
    const base = forceParamsFromMutations(mut);
    const nowUrl = `/preview.html?seed=${seed}&static=1&fit=1&lite=1${base}`;

    // Candidate = simulate absorbing another organism (what a real tier-up
    // does): blend in a donor stain, union extra organelles, add a biofilm
    // halo, scale density. Built from the token's effective traits.
    let effPalette = mut && mut.palette ? mut.palette : null;
    const effOrgs = new Set();
    try {
      const bs = E.applyPremint(E.generateState(seed));
      if (!effPalette) effPalette = bs.palette;
      (bs.organelles || []).forEach(o => effOrgs.add(o));
    } catch (_) {}
    if (mut && Array.isArray(mut.organelles)) mut.organelles.forEach(o => effOrgs.add(o));
    const donor = DONOR_STAINS[seed % DONOR_STAINS.length];
    const candStain = (effPalette ? effPalette + '+' : '') + donor;
    for (const o of EXTRA_ORGS) { if (!effOrgs.has(o)) { effOrgs.add(o); if (effOrgs.size >= 6) break; } }
    const candParams =
      `&forceStain=${encodeURIComponent(candStain)}` +
      `&forceOrganelles=${encodeURIComponent([...effOrgs].join(','))}` +
      `&forceBiofilm=1&forceCells=${newCells}`;
    const candUrl = `/preview.html?seed=${seed}&static=1&fit=1&lite=1${candParams}`;

    $('nowV').textContent = `${tierOf(rank)} · rank ${rank} · ${cells} cells`;
    $('candV').textContent = `${tierOf(newRank)} · rank ${newRank} · ${newCells} cells`;

    mountFrame('nowF', nowUrl);
    mountFrame('candF', candUrl);
  }

  function mountFrame(id, url) {
    const host = $(id);
    const f = document.createElement('iframe');
    f.scrolling = 'no'; f.src = url;
    f.addEventListener('load', () => { const p = host.querySelector('.ph'); if (p) p.remove(); });
    host.appendChild(f);
  }

  $('prev').addEventListener('click', () => show(seed - 1));
  $('next').addEventListener('click', () => show(seed + 1));
  $('jump').addEventListener('change', () => show(parseInt($('jump').value, 10) || 1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') show(seed - 1);
    else if (e.key === 'ArrowRight') show(seed + 1);
  });

  show(1);
})();
</script>
</body>
</html>
