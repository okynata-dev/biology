<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>View a Biom — Bioms</title>
<meta name="description" content="A Biom, exactly as it appears on-chain. Draw another at random.">
<link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml">
<link rel="stylesheet" href="/design.css?v=4">
<style>
  /* One Biom, shown exactly as the NFT renders on OpenSea (its own cream
     card), floated on black so the artwork sits in a clean frame. The
     preview.html iframe carries the real render + cursor tilt. The only
     control is "Another Biom". */
  html, body { height: 100%; }
  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #000;          /* black AROUND the Biom card */
    color: #f4f1e8;
  }

  /* Nav recoloured for the black canvas. */
  nav {
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border-bottom: 1px solid rgba(244, 241, 232, 0.12);
  }
  nav .brand span { color: #f4f1e8; }
  nav .nav-links a { color: rgba(244, 241, 232, 0.72); }
  nav .nav-links a:hover { color: #f4f1e8; }

  .viewer {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    padding: 16px 18px 44px;
    min-height: 0;
  }

  /* The card is the NFT itself (cream, as on OpenSea). Square, capped to
     the smaller viewport axis; black page shows all around it. */
  .stage {
    position: relative;
    width: min(74vh, 92vw, 680px);
    aspect-ratio: 1 / 1;
    border-radius: 22px;
    overflow: hidden;
    transition: opacity 0.4s ease;
  }
  .stage.loading { opacity: 0.2; }
  .stage iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    /* pointer events MUST reach the iframe — that feeds the cursor tilt. */
  }

  /* Sole control. Light pill so it reads on black. */
  #anotherBtn {
    appearance: none;
    background: transparent;
    color: #f4f1e8;
    border: 1px solid rgba(244, 241, 232, 0.34);
    border-radius: 999px;
    padding: 11px 24px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  #anotherBtn:hover { background: rgba(244, 241, 232, 0.10); border-color: rgba(244, 241, 232, 0.6); }
  #anotherBtn:active { transform: scale(0.985); }
</style>
</head>
<body>

<nav>
  <a class="brand" href="/" aria-label="Bioms — home">
    <img class="brand-mark" src="/favicon-dark.svg" alt="" width="18" height="18" decoding="async">
    <span>Bioms</span>
  </a>
  <div class="nav-links">
    <a href="/lab">Lab</a>
    <a href="https://twitter.com/theBioms" class="nav-x" aria-label="Follow Bioms on X" target="_blank" rel="noopener">
      <svg class="x-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="16" height="16">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
  </div>
</nav>

<main class="viewer">
  <div class="stage" id="stage">
    <iframe id="biomFrame" title="A Biom" scrolling="no" loading="eager"></iframe>
  </div>
  <button type="button" id="anotherBtn">Another Biom</button>
</main>

<script>
  const stage = document.getElementById('stage');
  const frame = document.getElementById('biomFrame');
  const btn   = document.getElementById('anotherBtn');

  // Tokens are 1..8000.
  function randSeed() { return 1 + Math.floor(Math.random() * 8000); }

  function load(seed) {
    stage.classList.add('loading');
    frame.onload = () => stage.classList.remove('loading');
    // The exact NFT render (cream card, default framing). tilt=5 keeps the
    // cursor parallax; nodl=1 hides the download chrome. No cutout — we
    // want the real OpenSea look, with the black coming from the page.
    frame.src = `/preview.html?seed=${seed}&tilt=5&nodl=1`;
  }

  btn.addEventListener('click', () => load(randSeed()));

  // Random Biom on every visit.
  load(randSeed());
</script>

</body>
</html>
