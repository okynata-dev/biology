<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>View a Biom — Bioms</title>
<meta name="description" content="Turn a living Biom in your hand. Move your cursor to tilt it; draw another at random.">
<link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml">
<link rel="stylesheet" href="/design.css?v=4">
<style>
  /* A single Biom, centred, alive. The preview.html iframe carries the
     render + cursor-tilt (amplified via ?tilt). This page is just the
     stage + a "draw another" control — no chrome competing with the
     organism. */
  html, body { height: 100%; }
  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .viewer {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 12px 18px 40px;
    min-height: 0;            /* let the stage shrink inside the flex column */
  }

  /* The stage holds the iframe. Square, capped to the smaller viewport
     axis so the whole organism is always in frame. */
  .stage {
    position: relative;
    width: min(76vh, 92vw, 720px);
    aspect-ratio: 1 / 1;
    /* Dark viewing chamber — the Biom renders on cream in the NFT, but a
       pale specimen on cream loses its edges. On near-black the silhouette
       and membrane read clearly. Same warm-ink as the Lab's dark room. */
    background: #0e0c08;
    border-radius: 24px;
    overflow: hidden;
    transition: opacity 0.4s var(--ease, ease);
  }
  .stage.loading { opacity: 0.18; }
  .stage iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: transparent;
    /* pointer events MUST reach the iframe — that's what feeds the
       cursor tilt. No overlay here (unlike the homepage hero). */
  }

  .meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
  }
  .biom-no {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .hint {
    font-size: 12px;
    color: var(--ink-3);
    opacity: 0.7;
    letter-spacing: 0.01em;
  }
  /* Touch devices steer by dragging, not hovering — say so. */
  @media (hover: none) {
    .hint::after { content: "Drag the Biom to turn it."; }
    .hint .desk { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a class="brand" href="/" aria-label="Bioms — home">
    <img class="brand-mark" src="/favicon.svg?v=3" alt="" width="18" height="18" decoding="async">
    <span>Bioms</span>
  </a>
  <div class="nav-links">
    <a href="/lab">Lab</a>
    <a href="https://twitter.com/theBioms" class="nav-x" aria-label="Follow Bioms on X" target="_blank" rel="noopener">
      <svg class="x-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="16" height="16">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
  </div>
</nav>

<main class="viewer">
  <div class="stage" id="stage">
    <iframe id="biomFrame" title="A living Biom — move your cursor to turn it" scrolling="no" loading="eager"></iframe>
  </div>
  <div class="meta">
    <span class="biom-no">Biom #<span id="biomNo">—</span></span>
    <button type="button" class="btn ghost" id="anotherBtn">Another Biom</button>
    <span class="hint"><span class="desk">Move your cursor to turn it.</span></span>
  </div>
</main>

<script>
  const stage   = document.getElementById('stage');
  const frame   = document.getElementById('biomFrame');
  const noEl     = document.getElementById('biomNo');
  const btn     = document.getElementById('anotherBtn');

  // Tokens are 1..8000.
  function randSeed() { return 1 + Math.floor(Math.random() * 8000); }

  function load(seed) {
    stage.classList.add('loading');
    frame.onload = () => stage.classList.remove('loading');
    // The Biom render is the EXACT NFT render — same engine, same default
    // framing (no fit reframe). cutout=1 only drops the cream card +
    // download CTA so the organism floats on the dark stage and its edges
    // read. tilt=5 amplifies the cursor parallax — "turn it in your hand".
    frame.src = `/preview.html?seed=${seed}&cutout=1&tilt=5`;
    noEl.textContent = seed;
  }

  btn.addEventListener('click', () => load(randSeed()));

  // First Biom is random on every visit — no two arrivals see the same one.
  load(randSeed());
</script>

</body>
</html>
