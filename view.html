<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>View a Biom · Bioms</title>
<meta name="description" content="A Biom, exactly as it appears on-chain. Draw another at random.">
<link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml">
<link rel="stylesheet" href="/design.css?v=4">
<style>
  /* One Biom, shown exactly as the NFT renders on OpenSea (its own cream
     card), floated on black so the artwork sits in a clean frame. The
     preview.html iframe carries the real render + cursor tilt. The only
     control is "Another Biom". */
  html, body { height: 100%; margin: 0; }
  /* design.css sets a cream page background brand-wide. This page is the
     one with a BLACK body, so the default 8px body margin let that cream
     peek through as a thin frame around every edge. Zero the margin and
     paint html black too, so nothing cream shows at the viewport edges. */
  html { background: #000; }
  body {
    min-height: 100dvh;
    margin: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #000;          /* black AROUND the Biom card */
    color: #f4f1e8;
  }

  /* Nav recoloured for the black canvas. */
  nav {
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border-bottom: 1px solid rgba(244, 241, 232, 0.12);
  }
  nav .brand span { color: #f4f1e8; }
  nav .nav-links a { color: rgba(244, 241, 232, 0.72); }
  nav .nav-links a:hover { color: #f4f1e8; }

  .viewer {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 14px 18px 28px;
    min-height: 0;
  }

  /* The card is the NFT itself (cream, as on OpenSea). Square, sized to the
     smaller viewport axis so it fills the screen instead of floating small.
     No fixed px cap — a hard 680px ceiling pinned it tiny on large displays,
     which read as "a small thing in a dumb frame". It now scales with the
     viewport; black page shows all around it. */
  .stage {
    position: relative;
    /* Fill the viewport minus the nav + actions chrome (~168px), so the card
       is as large as it can be while the button row stays visible. Scales up
       on big displays instead of stalling at a small fixed size. */
    width: min(calc(100dvh - 168px), 94vw);
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    overflow: hidden;
    transition: opacity 0.4s ease;
  }
  .stage.loading { opacity: 0.2; }
  .stage iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    /* pointer events MUST reach the iframe — that feeds the cursor tilt. */
  }

  /* Controls row — "Another Biom" + "Save as MP4", side by side. */
  .view-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  /* Light pills so they read on black. Shared by the button and the
     download link so they sit identically in the row. */
  .view-pill {
    appearance: none;
    background: transparent;
    color: #f4f1e8;
    border: 1px solid rgba(244, 241, 232, 0.34);
    border-radius: 999px;
    padding: 11px 24px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1;
    letter-spacing: 0.01em;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  .view-pill:hover { background: rgba(244, 241, 232, 0.10); border-color: rgba(244, 241, 232, 0.6); }
  .view-pill:active { transform: scale(0.985); }
</style>
</head>
<body>

<nav>
  <a class="brand" href="/" aria-label="Bioms home">
    <img class="brand-mark" src="/favicon-dark.svg" alt="" width="18" height="18" decoding="async">
    <span>Bioms</span>
  </a>
  <div class="nav-links">
    <a href="/lab">Lab</a>
    <a href="https://twitter.com/theBioms" class="nav-x" aria-label="Follow Bioms on X" target="_blank" rel="noopener">
      <svg class="x-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="16" height="16">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
  </div>
</nav>

<main class="viewer">
  <div class="stage" id="stage">
    <iframe id="biomFrame" title="A Biom" scrolling="no" loading="eager"></iframe>
  </div>
  <div class="view-actions">
    <button type="button" id="anotherBtn" class="view-pill">Another Biom</button>
    <a id="saveMp4Btn" class="view-pill" download>Save as MP4</a>
  </div>
</main>

<script>
  const stage   = document.getElementById('stage');
  const frame   = document.getElementById('biomFrame');
  const btn     = document.getElementById('anotherBtn');
  const saveMp4 = document.getElementById('saveMp4Btn');

  // Tokens are 1..8000.
  function randSeed() { return 1 + Math.floor(Math.random() * 8000); }

  function load(seed) {
    stage.classList.add('loading');
    frame.onload = () => stage.classList.remove('loading');
    // The exact NFT render (cream card, default framing). tilt=5 keeps the
    // cursor parallax; nodl=1 hides the download chrome. No cutout — we
    // want the real OpenSea look, with the black coming from the page.
    frame.src = `/preview.html?seed=${seed}&tilt=5&nodl=1`;
    // Point the explicit Save button at this Biom's pre-rendered MP4. The
    // worker sends Content-Disposition: attachment, so the click saves the
    // file (no inline playback, no new tab needed). Kept in sync per seed.
    saveMp4.href = `https://api.thebioms.com/api/video/${seed}`;
    saveMp4.setAttribute('download', `BIOM-${seed}.mp4`);
  }

  btn.addEventListener('click', () => load(randSeed()));

  // Random Biom on every visit.
  load(randSeed());
</script>

</body>
</html>
