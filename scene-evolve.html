<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="bioms-reveal" content="true">
<title>Bioms — before/after scene (internal)</title>
<link rel="stylesheet" href="/design.css?v=4">
<style>
  /* Internal capture scene for the before→after showcase MP4. Renders one
     pair per ?seed=N: the original mint (left) and the evolved form
     (right) in Apple-squircle tiles with a frosted-glass arrow between.
     Screenshotted by scripts/make-evolve-reel.py, not a live page. */
  html, body { margin: 0; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background:
      radial-gradient(120% 90% at 50% 0%, #f6f3ec 0%, #ece7dc 60%, #e4ded1 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1c1a16;
  }
  .wordmark {
    position: absolute; top: 54px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px;
    font-size: 26px; font-weight: 600; letter-spacing: -0.01em; opacity: 0.9;
  }
  .wordmark img { width: 30px; height: 30px; }

  .row { display: flex; align-items: center; gap: 70px; margin-top: 20px; }

  .cell { display: flex; flex-direction: column; align-items: center; gap: 26px; }
  .lbl {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 19px; letter-spacing: 0.32em; text-transform: uppercase;
    color: #8a8478;
  }
  .cell.after .lbl { color: #b8492c; }

  /* Apple-icon squircle tile. */
  .tile {
    width: 540px; height: 540px; position: relative;
    border-radius: 23%;
    background: linear-gradient(180deg, #faf8f3 0%, #efeadf 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.7),
      0 2px 6px rgba(0,0,0,0.05),
      0 40px 80px rgba(0,0,0,0.13);
    overflow: hidden;
  }
  .tile iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* Frosted-glass arrow capsule. */
  .arrow {
    width: 132px; height: 132px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow:
      inset 0 1px 2px rgba(255,255,255,0.9),
      inset 0 -8px 18px rgba(180,170,150,0.18),
      0 18px 40px rgba(0,0,0,0.12);
    backdrop-filter: blur(9px) saturate(1.2);
    -webkit-backdrop-filter: blur(9px) saturate(1.2);
    position: relative; flex: 0 0 auto;
  }
  .arrow svg { width: 58px; height: 58px; }
  .arrow svg path { stroke: #b8492c; }

  .caption {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 22px; color: #5b554a; letter-spacing: 0.01em;
  }
  .caption b { color: #1c1a16; font-weight: 600; }
</style>
</head>
<body>
  <div class="wordmark"><img src="/favicon.svg?v=3" alt=""><span>Bioms</span></div>

  <div class="row">
    <div class="cell before">
      <span class="lbl">Now</span>
      <div class="tile"><iframe id="fBefore" scrolling="no"></iframe></div>
    </div>
    <div class="arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12h15M13 6l6 6-6 6"/>
      </svg>
    </div>
    <div class="cell after">
      <span class="lbl">Evolved</span>
      <div class="tile"><iframe id="fAfter" scrolling="no"></iframe></div>
    </div>
  </div>

  <div class="caption" id="caption"></div>

<script src="/specimen-engine.js?v=2"></script>
<script>
(function () {
  'use strict';
  const E = window.BiomEngine;
  const q = new URLSearchParams(location.search);
  const seed = parseInt(q.get('seed') || '1', 10);

  // Same evolution transform as the live event / compare page.
  const DONOR = ['iridescent_aurora', 'fluorescent', 'congo_red', 'nile_blue', 'malachite'];
  const EXTRA = ['flagellum', 'eyespot', 'pili', 'plasmid', 'inclusion'];
  const TIERS = ['Genesis', 'Hybrid', 'Chimera', 'Phoenix', 'Superorganism', 'Biome'];

  const base = E.applyPremint(E.generateState(seed));
  const orgs = new Set(base.organelles || []);
  let donor = DONOR[seed % DONOR.length];
  if (donor === base.palette) donor = DONOR[(seed + 1) % DONOR.length];
  const palette = (base.palette ? base.palette + '+' : '') + donor;
  for (const o of EXTRA) { if (!orgs.has(o)) { orgs.add(o); if (orgs.size >= 6) break; } }
  const cells = Math.min(9, (base.cellCount || 4) + 2);

  const beforeUrl = `/preview.html?seed=${seed}&cutout=1&static=1&fit=1`;
  const afterUrl = `/preview.html?seed=${seed}&cutout=1&static=1&fit=1` +
    `&forceStain=${encodeURIComponent(palette)}` +
    `&forceOrganelles=${encodeURIComponent([...orgs].join(','))}` +
    `&forceBiofilm=1&forceCells=${cells}`;

  document.getElementById('fBefore').src = beforeUrl;
  document.getElementById('fAfter').src = afterUrl;

  const cap = document.getElementById('caption');
  let sp = ''; try { sp = E.species(seed); } catch (_) {}
  cap.innerHTML = `<b>${sp}</b> — #${seed}`;

  // Signal readiness once both frames have loaded (capture waits on this).
  let loaded = 0;
  ['fBefore', 'fAfter'].forEach(id => {
    document.getElementById(id).addEventListener('load', () => {
      if (++loaded === 2) setTimeout(() => { window.__sceneReady = true; }, 900);
    });
  });
  setTimeout(() => { window.__sceneReady = true; }, 6000);  // hard fallback
})();
</script>
</body>
</html>
