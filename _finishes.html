<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  :root{ --paper:#faf8f3; }
  body{margin:0;background:#15110d;font:12px ui-monospace,Menlo,monospace;color:#cbb;padding:22px}
  h1{color:#eee;font:600 16px -apple-system,sans-serif;margin:2px 0 4px}
  .sub{color:#998;margin:0 0 18px;font:12px -apple-system,sans-serif}
  .grid{display:grid;grid-template-columns:repeat(4,250px);gap:16px}
  .tile{width:250px}
  .card{position:relative;width:250px;height:250px;border-radius:20px;overflow:hidden;
        background:var(--paper);box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .base{position:absolute;inset:8%;width:84%;height:84%;object-fit:contain;display:block}
  .fx{position:absolute;inset:0;pointer-events:none}
  .lab{text-align:center;margin-top:8px;color:#bba;font:12px -apple-system,sans-serif}
  .lab b{color:#eee;font-weight:600}
  .lab span{color:#998}
</style></head><body>
<h1>Finishes — artist-inspired surface traits</h1>
<p class="sub">Base biom #855 · CSS/SVG look-mockups masked to the silhouette. Chosen ones get real engine integration.</p>
<div class="grid" id="grid"></div>
<script>
const CUT = 'https://pngs.thebioms.com/cutout/00855.webp';
// NOTE: a cross-origin R2 webp used as mask-image is CORS-blocked and hides
// the whole overlay. Use a same-origin radial-gradient mask instead — it
// concentrates the finish over the central biom and fades out at the edges.
const maskCss = el => {
  const m='radial-gradient(circle at 50% 46%, #000 24%, rgba(0,0,0,.65) 36%, transparent 46%)';
  el.style.webkitMaskImage=m; el.style.maskImage=m;
};
function radiolarian(){
  const c=50, spokes=16, rings=[11,21,31,39]; let s='';
  for(let i=0;i<spokes;i++){const a=i/spokes*2*Math.PI;const x=c+39*Math.cos(a),y=c+39*Math.sin(a);
    s+=`<line x1="${c}" y1="${c}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"/>`;}
  for(const r of rings) s+=`<circle cx="${c}" cy="${c}" r="${r}" fill="none"/>`;
  for(const r of rings) for(let i=0;i<spokes;i++){const a=i/spokes*2*Math.PI;
    s+=`<circle cx="${(c+r*Math.cos(a)).toFixed(1)}" cy="${(c+r*Math.sin(a)).toFixed(1)}" r="1.2" fill="rgba(45,28,16,.92)" stroke="none"/>`;}
  return `<svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"
    stroke="rgba(45,28,16,.85)" stroke-width="0.6">${s}</svg>`;
}
function schematic(){
  const c=50; let s='';
  for(const r of [9,17,25,33]) s+=`<circle cx="${c}" cy="${c}" r="${r}" fill="none"/>`;
  s+=`<line x1="8" y1="${c}" x2="92" y2="${c}"/><line x1="${c}" y1="8" x2="${c}" y2="92"/>`;
  for(let i=0;i<24;i++){const a=i/24*2*Math.PI;const x1=c+33*Math.cos(a),y1=c+33*Math.sin(a),x2=c+36*Math.cos(a),y2=c+36*Math.sin(a);
    s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;}
  return `<svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"
    stroke="rgba(35,50,95,.82)" stroke-width="0.55">${s}</svg>`;
}
const FINISHES = [
  {a:'—',                 n:'Original',     build:el=>{}},
  {a:'Ernst Haeckel',     n:'Radiolarian',  svg:radiolarian, mask:true, blend:'multiply', op:1},
  {a:'James Turrell',     n:'Luminous core',css:'background:radial-gradient(circle at 50% 47%, rgba(255,247,212,.85), rgba(255,240,190,.25) 50%, transparent 70%)', mask:true, blend:'screen', glow:true},
  {a:'Jony Ive',          n:'Specular',     css:'background:linear-gradient(122deg, transparent 40%, rgba(255,255,255,.72) 48%, rgba(255,255,255,0) 57%)', mask:true, blend:'screen'},
  {a:'Agnes Martin',      n:'Graphite grid',css:'background-image:repeating-linear-gradient(0deg, rgba(25,18,10,.5) 0 1px, transparent 1px 8px), repeating-linear-gradient(90deg, rgba(25,18,10,.5) 0 1px, transparent 1px 8px)', mask:true, blend:'multiply'},
  {a:'Bridget Riley',     n:'Interference', css:'background:repeating-radial-gradient(circle at 50% 46%, rgba(70,35,100,.6) 0 2px, transparent 2px 7px)', mask:true, blend:'multiply'},
  {a:'Olafur Eliasson',   n:'Prismatic halo',halo:true},
  {a:'Anish Kapoor',      n:'Void core',    css:'background:radial-gradient(circle at 50% 50%, rgba(2,2,8,.97) 0 12%, rgba(2,2,8,.6) 20%, transparent 34%)', mask:true, blend:'multiply'},
  {a:'Hilma af Klint',    n:'Schematic',    svg:schematic, mask:true, blend:'multiply', op:1},
  {a:'Mark Rothko',       n:'Field bloom',  css:'background:linear-gradient(165deg, rgba(220,80,130,.55) 0%, rgba(120,90,200,.28) 50%, rgba(70,150,200,.5) 100%)', mask:true, blend:'overlay'},
  {a:'Sol LeWitt',        n:'Line system',  css:'background:repeating-linear-gradient(40deg, rgba(20,14,8,.62) 0 1.5px, transparent 1.5px 11px)', mask:true, blend:'multiply'},
  {a:'Yayoi Kusama',      n:'Granular field',css:'background-image:radial-gradient(rgba(20,14,8,.68) 1.6px, transparent 1.9px); background-size:8px 8px', mask:true, blend:'multiply'},
  {a:'Hiroshi Sugimoto',  n:'Fog',          css:'background:linear-gradient(0deg, transparent 26%, rgba(248,246,240,.82) 50%, transparent 74%); filter:blur(2px)', mask:true, blend:'screen'},
];
const grid=document.getElementById('grid');
for(const f of FINISHES){
  const tile=document.createElement('div'); tile.className='tile';
  const card=document.createElement('div'); card.className='card';
  const img=document.createElement('img'); img.className='base'; img.src=CUT; card.appendChild(img);
  if(f.glow) card.style.boxShadow='0 8px 22px rgba(0,0,0,.4), 0 0 36px rgba(255,240,200,.28)';
  if(f.svg){ const fx=document.createElement('div'); fx.className='fx'; fx.innerHTML=f.svg();
    if(f.mask) maskCss(fx); fx.style.mixBlendMode=f.blend||'normal'; if(f.op) fx.style.opacity=f.op; card.appendChild(fx); }
  else if(f.halo){
    const ring=document.createElement('div'); ring.className='fx';
    ring.style.cssText='inset:14%;border-radius:50%;background:conic-gradient(from 0deg,#ff4d4d,#ffb84d,#fff24d,#7dff7d,#4dffd2,#4db8ff,#b84dff,#ff4d8f,#ff4d4d);filter:blur(4px);mix-blend-mode:screen;opacity:.85';
    ring.style.webkitMaskImage='radial-gradient(circle, transparent 58%, #000 64%, #000 74%, transparent 80%)';
    ring.style.maskImage='radial-gradient(circle, transparent 58%, #000 64%, #000 74%, transparent 80%)';
    card.appendChild(ring);
  }
  else if(f.css){ const fx=document.createElement('div'); fx.className='fx'; fx.style.cssText=f.css;
    if(f.mask) maskCss(fx); fx.style.mixBlendMode=f.blend||'normal'; card.appendChild(fx); }
  tile.appendChild(card);
  const lab=document.createElement('div'); lab.className='lab';
  lab.innerHTML=`<b>${f.n}</b><br><span>${f.a}</span>`; tile.appendChild(lab);
  grid.appendChild(tile);
}
</script></body></html>
