<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioms — Admin</title>
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
<link rel="icon" type="image/svg+xml" href="/favicon-dark.svg?v=3" media="(prefers-color-scheme: dark)">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ece9e0;
    --paper: #f4f1e8;
    --ink: #1c1a16;
    --ink-2: #5b554a;
    --ink-3: #686356;
    --rule: rgba(28, 26, 22, 0.12);
    --ok: #2d6a4f;
    --bad: #9a4a2e;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
    line-height: 1.5;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  /* === HEADER === */
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none;
    color: var(--ink);
    font-weight: 500;
  }
  .brand img { width: 20px; height: 20px; }
  .brand .label { font-size: 16px; }
  .brand .sep { color: var(--ink-3); font-weight: 400; margin: 0 4px; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 8px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.danger:hover { background: var(--bad); border-color: var(--bad); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* === MAIN === */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px;
  }

  /* === AUTH GATE === */
  .auth {
    max-width: 420px;
    margin: 80px auto 0;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 32px;
    text-align: center;
  }
  .auth h2 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.015em;
  }
  .auth p {
    color: var(--ink-2);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .auth input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .auth input:focus { border-color: var(--ink); outline: none; box-shadow: 0 0 0 3px rgba(28,26,22,0.08); }
  .auth .btn-primary {
    width: 100%;
    background: var(--ink);
    color: var(--bg);
    padding: 12px;
    border-radius: 8px;
    border: 0;
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .auth .btn-primary:hover { opacity: 0.92; }
  .auth .error {
    color: var(--bad);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }

  /* === STATS BAR === */
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: var(--ink-3);
  }
  .stats strong {
    color: var(--ink);
    font-weight: 500;
    font-size: 16px;
    margin-right: 6px;
  }

  /* === SEARCH === */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .search {
    flex: 1;
    min-width: 200px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: var(--ink);
  }
  .search:focus { border-color: var(--ink); outline: none; box-shadow: 0 0 0 2px rgba(28,26,22,0.08); }

  /* === TABLE === */
  .wrap-table {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 10px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead {
    background: var(--bg);
    border-bottom: 1px solid var(--rule);
  }
  th {
    text-align: left;
    padding: 10px 16px;
    font-weight: 500;
    color: var(--ink-3);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  tbody tr {
    border-bottom: 1px solid var(--rule);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: 0; }
  tbody tr:hover { background: rgba(28, 26, 22, 0.03); }
  td {
    padding: 12px 16px;
    vertical-align: middle;
  }
  td.id { color: var(--ink-3); font-variant-numeric: tabular-nums; width: 60px; }
  td.addr {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ink);
  }
  td.addr a { color: inherit; text-decoration: none; }
  td.addr a:hover { color: var(--bad); text-decoration: underline; text-underline-offset: 3px; }
  td.date {
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
    width: 200px;
    white-space: nowrap;
  }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-3);
  }
  .loading {
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-3);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
  }

  /* === TABS === */
  .tabs { display: flex; gap: 8px; margin-bottom: 22px; }
  .tab {
    background: var(--paper); border: 1px solid var(--rule); color: var(--ink-2);
    padding: 8px 16px; border-radius: 8px; font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* === PARTNER APPLICATIONS === */
  .papp-list { display: flex; flex-direction: column; gap: 14px; }
  .papp {
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 12px; padding: 18px 20px;
  }
  .papp-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .papp-head-l { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .papp-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .papp-title a { color: inherit; text-decoration: none; }
  .papp-title a:hover { text-decoration: underline; text-underline-offset: 3px; }
  .papp-meta { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; white-space: nowrap; }
  /* Mark applications to export their wallets (client-side selection, persisted in localStorage). */
  .papp.marked { border-color: var(--ok); box-shadow: inset 0 0 0 1px rgba(45,106,79,0.5); }
  .papp-sel { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-3); cursor: pointer; user-select: none; }
  .papp-sel input { width: 15px; height: 15px; cursor: pointer; accent-color: var(--ink); margin: 0; }
  .badge {
    font-size: 10.5px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--rule);
    color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    background: rgba(28,26,22,0.05);
  }
  .badge.approved { color: var(--ok); border-color: rgba(45,106,79,0.4); background: rgba(45,106,79,0.08); }
  .badge.rejected { color: var(--bad); border-color: rgba(154,74,46,0.4); background: rgba(154,74,46,0.08); }
  .papp-grid { display: grid; grid-template-columns: 116px 1fr; gap: 7px 14px; font-size: 13px; align-items: start; }
  .papp-grid dt { color: var(--ink-3); }
  .papp-grid dd { color: var(--ink); word-break: break-word; }
  .papp-grid dd a { color: inherit; text-decoration: underline; text-decoration-color: var(--rule); text-underline-offset: 3px; }
  .papp-grid dd a:hover { text-decoration-color: var(--ink); }
  .mono-block {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
    background: var(--bg); border: 1px solid var(--rule); border-radius: 8px;
    padding: 8px 10px; max-height: 130px; overflow: auto; white-space: pre-wrap; word-break: break-all;
  }
  .mini-copy {
    background: transparent; border: 1px solid var(--rule); color: var(--ink-3);
    border-radius: 6px; padding: 2px 7px; font: inherit; font-size: 11px; cursor: pointer; margin-left: 6px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .mini-copy:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .mini-copy.copied { color: var(--ok); border-color: var(--ok); }

  /* === MOBILE === */
  @media (max-width: 700px) {
    .papp-grid { grid-template-columns: 1fr; gap: 2px 0; }
    .papp-grid dt { margin-top: 8px; }
    header { padding: 16px 18px; }
    main { padding: 18px; }
    td.id, th:nth-child(1) { display: none; }
    td.addr { word-break: break-all; }
    td.date { width: auto; font-size: 11px; }
    .auth { margin: 32px auto; padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <a class="brand" href="/" aria-label="Bioms — home">
    <img src="/favicon.svg?v=3" alt="">
    <span class="label">Bioms</span>
    <span class="sep">·</span>
    <span class="label">Admin</span>
  </a>
  <div class="actions" id="actions" hidden>
    <button class="btn" id="refresh-btn">Refresh</button>
    <button class="btn" id="download-btn">Download CSV</button>
    <button class="btn" id="dl-selected-btn" hidden>Selected addresses</button>
    <button class="btn danger" id="logout-btn">Forget token</button>
  </div>
</header>

<main>
  <!-- AUTH GATE — visible if no token in localStorage and none in URL hash -->
  <div class="auth" id="auth-screen" hidden>
    <h2>Enter admin token</h2>
    <p>Paste the value you set via <code>wrangler secret put ADMIN_TOKEN</code>. It stays in this browser only — never sent in a URL.</p>
    <input type="password" id="token-input" placeholder="64 hex characters…" autocomplete="off">
    <button class="btn-primary" id="auth-submit">Continue</button>
    <div class="error" id="auth-error"></div>
  </div>

  <!-- CONTENT — visible when authenticated -->
  <div id="content" hidden>
    <div class="tabs">
      <button class="tab active" data-view="waitlist" type="button">Waitlist</button>
      <button class="tab" data-view="partners" type="button">Partners</button>
    </div>

    <!-- WAITLIST VIEW -->
    <div id="view-waitlist">
      <div class="stats">
        <span><strong id="total">—</strong>signups</span>
        <span>last <strong id="last-ago">—</strong></span>
      </div>
      <div class="toolbar">
        <input class="search" id="search" placeholder="Filter by address…" autocomplete="off">
        <button class="tab" id="luoms-toggle" type="button" aria-pressed="false"
                title="Only signups after the Bioms list closed (the Luoms wave)">Luoms wave</button>
      </div>
      <div class="wrap-table">
        <table>
          <thead>
            <tr><th>#</th><th>Address</th><th>Saved</th></tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="3" class="loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PARTNERS VIEW -->
    <div id="view-partners" hidden>
      <div class="stats">
        <span><strong id="p-total">—</strong>applications</span>
        <span><strong id="p-pending">—</strong>pending</span>
      </div>
      <div class="toolbar">
        <input class="search" id="p-search" placeholder="Filter by community or X handle…" autocomplete="off">
      </div>
      <div class="papp-list" id="p-list">
        <div class="loading">Loading…</div>
      </div>
    </div>
  </div>
</main>

<script>
// =============================================================
// Bioms admin — waitlist viewer
//
// Token flow:
//   1. URL hash (#token=…) — bookmark format. Read on load, copy to
//      localStorage, then clean the hash so it doesn't show in the
//      browser address bar after page settles.
//   2. localStorage — persistent across sessions for this browser.
//   3. Auth gate — if neither, ask for paste once.
//
// Token never appears in:
//   - HTTP Referer (meta name=referrer set to no-referrer)
//   - URL after first load (hash cleared via history.replaceState)
//   - Server access logs from THIS page (we use query-string only on
//     the fetch, not on the HTML URL)
//
// Token DOES appear in:
//   - This browser's localStorage (use "Forget token" to wipe)
//   - The fetch URL to /api/admin/waitlist (HTTPS, but visible in
//     CF Worker logs if those are enabled — that's the same account
//     that owns the token, so not a leak)
// =============================================================
const WORKER_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:8787'
  : 'https://api.thebioms.com';

const LS_KEY = 'bioms-admin-token';

const authScreen  = document.getElementById('auth-screen');
const contentEl   = document.getElementById('content');
const actionsEl   = document.getElementById('actions');
const tokenInput  = document.getElementById('token-input');
const authSubmit  = document.getElementById('auth-submit');
const authError   = document.getElementById('auth-error');
const totalEl     = document.getElementById('total');
const lastAgoEl   = document.getElementById('last-ago');
const searchEl    = document.getElementById('search');
const rowsEl      = document.getElementById('rows');
const refreshBtn  = document.getElementById('refresh-btn');
const downloadBtn = document.getElementById('download-btn');
const logoutBtn   = document.getElementById('logout-btn');

let allRows = [];
let allPartners = [];
let currentView = 'waitlist';

const viewWaitlist = document.getElementById('view-waitlist');
const viewPartners = document.getElementById('view-partners');
const pTotalEl   = document.getElementById('p-total');
const pPendingEl = document.getElementById('p-pending');
const pSearchEl  = document.getElementById('p-search');
const pListEl    = document.getElementById('p-list');
const dlSelectedBtn = document.getElementById('dl-selected-btn');

// ===== Partner selection (mark apps → export their wallets) =====
// Purely client-side: a Set of partner ids, persisted in localStorage so the
// marks survive reloads. No worker write, no D1 — this is review-and-export
// only, it never mutates the application or the waitlist.
const SEL_KEY = 'bioms-admin-marked-partners';
function loadSelected() { try { return new Set(JSON.parse(localStorage.getItem(SEL_KEY) || '[]')); } catch (_) { return new Set(); } }
function saveSelected() { try { localStorage.setItem(SEL_KEY, JSON.stringify([...selectedPartners])); } catch (_) {} }
let selectedPartners = loadSelected();
function updateSelectedBtn() {
  const n = selectedPartners.size;
  dlSelectedBtn.textContent = n ? `Selected addresses (${n})` : 'Selected addresses';
  dlSelectedBtn.disabled = n === 0;
}

// ===== Token handling =====
function getToken() {
  // Check URL hash first (bookmark format)
  if (location.hash.startsWith('#token=')) {
    const t = decodeURIComponent(location.hash.slice('#token='.length));
    if (t) {
      try { localStorage.setItem(LS_KEY, t); } catch (_) {}
      // Clean URL — drop the hash so future copies of the URL bar
      // don't expose the token
      history.replaceState(null, '', location.pathname);
      return t;
    }
  }
  try { return localStorage.getItem(LS_KEY) || ''; } catch (_) { return ''; }
}

function setToken(t) {
  try { localStorage.setItem(LS_KEY, t); } catch (_) {}
}

function clearToken() {
  try { localStorage.removeItem(LS_KEY); } catch (_) {}
}

// ===== Formatting helpers =====
function shortAddr(s) {
  if (!s || s.length < 12) return s || '';
  return s.slice(0, 6) + '…' + s.slice(-4);
}
function timeAgo(ms) {
  const sec = Math.floor((Date.now() - ms) / 1000);
  if (sec < 60) return sec + 's ago';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  return Math.floor(sec / 86400) + 'd ago';
}
function fmtDate(ms) {
  if (!ms) return '—';
  try {
    const d = new Date(ms);
    const dateStr = d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
    const timeStr = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    return dateStr + ' · ' + timeStr;
  } catch (_) { return String(ms); }
}

// ===== Render =====
function renderRows(rows) {
  if (rows.length === 0) {
    rowsEl.innerHTML = '<tr><td colspan="3" class="empty">No signups yet.</td></tr>';
    return;
  }
  // Cap the rendered rows — the full list is tens of thousands; building
  // every <tr> freezes the page (was rendering 14k+ rows, ~900ms block →
  // blank screen). The count + Download CSV use the full set; narrow with
  // search.
  const MAX = 1000;
  const html = rows.slice(0, MAX).map(r => `
    <tr>
      <td class="id">#${r.id}</td>
      <td class="addr">
        <a href="https://etherscan.io/address/${r.value}" target="_blank" rel="noopener" title="View on Etherscan">${r.value}</a>
      </td>
      <td class="date" title="${new Date(r.signedUpMs).toISOString()}">${fmtDate(r.signedUpMs)}</td>
    </tr>
  `).join('');
  rowsEl.innerHTML = html + (rows.length > MAX
    ? `<tr><td colspan="3" class="empty">Showing the first ${MAX.toLocaleString()} of ${rows.length.toLocaleString()}. Use search to find an address, or Download CSV for the full list.</td></tr>`
    : '');
}

// The Bioms waitlist closed 2026-06-08 17:00 GMT+7; everything after is the
// Luoms phase-two wave. The toggle narrows the table, the visible count and
// the CSV export to just that wave.
const LUOMS_EPOCH = new Date('2026-06-09T00:00:00+07:00').getTime();
let luomsOnly = false;

function waveRows() {
  return luomsOnly ? allRows.filter(r => r.signedUpMs > LUOMS_EPOCH) : allRows;
}

function applyFilter() {
  const base = waveRows();
  totalEl.textContent = String(base.length);
  const q = (searchEl.value || '').trim().toLowerCase();
  if (!q) return renderRows(base);
  renderRows(base.filter(r => r.value.toLowerCase().includes(q)));
}

// ===== Fetch =====
async function loadList() {
  const token = getToken();
  if (!token) return showAuth();
  rowsEl.innerHTML = '<tr><td colspan="3" class="loading">Loading…</td></tr>';
  try {
    // Token goes in x-admin-token HEADER (not query string) so it
    // doesn't land in Cloudflare access logs or browser history.
    const r = await fetch(`${WORKER_URL}/api/admin/waitlist`, {
      headers: { 'x-admin-token': token },
    });
    if (r.status === 403 || r.status === 401) {
      clearToken();
      showAuth('Wrong token. Try again.');
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allRows = data.waitlist || [];
    totalEl.textContent = String(data.total || 0);
    lastAgoEl.textContent = allRows.length > 0 ? timeAgo(allRows[0].signedUpMs) : '—';
    applyFilter();
    showContent();
  } catch (err) {
    // Network / CORS failure (not an auth error — 401/403 is handled above).
    // Reveal the content chrome so the message is actually visible and the
    // user can hit Refresh, instead of leaving the page in its hidden default
    // state (which read as a mysterious blank screen).
    showContent();
    rowsEl.innerHTML = `<tr><td colspan="3" class="empty">Failed to load: ${err.message || err}. The API may be unreachable — check your connection and hit Refresh.</td></tr>`;
  }
}

function showAuth(msg) {
  authScreen.hidden = false;
  contentEl.hidden = true;
  actionsEl.hidden = true;
  if (msg) authError.textContent = msg;
  setTimeout(() => tokenInput.focus(), 50);
}
function showContent() {
  authScreen.hidden = true;
  contentEl.hidden = false;
  actionsEl.hidden = false;
}

// ===== Wiring =====
authSubmit.addEventListener('click', () => {
  const t = (tokenInput.value || '').trim();
  if (!t) { authError.textContent = 'Token required.'; return; }
  setToken(t);
  authError.textContent = '';
  tokenInput.value = '';
  loadList();
});
tokenInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') authSubmit.click(); });

refreshBtn.addEventListener('click', () => currentView === 'partners' ? loadPartners() : loadList());

downloadBtn.addEventListener('click', async () => {
  const token = getToken();
  if (!token) return showAuth();
  // Token must travel in header, not URL — anchor href can't carry
  // custom headers, so we fetch the CSV, wrap the response as a Blob,
  // and trigger download from a Blob URL. Filename mirrors the
  // Content-Disposition the worker would have set.
  const originalLabel = downloadBtn.textContent;
  downloadBtn.disabled = true;
  downloadBtn.textContent = 'Preparing…';
  try {
    // Luoms wave active: the rows are already in memory — build the CSV
    // client-side instead of pulling the full 188k+ export.
    if (currentView !== 'partners' && luomsOnly) {
      const rows = waveRows();
      const csv = 'id,address,signed_up\n' + rows.map(r =>
        `${r.id},${r.value},${new Date(r.signedUpMs).toISOString()}`
      ).join('\n');
      const blob0 = new Blob([csv], { type: 'text/csv' });
      const url0 = URL.createObjectURL(blob0);
      const a0 = document.createElement('a');
      a0.href = url0;
      a0.download = `luoms-wave-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a0);
      a0.click();
      document.body.removeChild(a0);
      setTimeout(() => URL.revokeObjectURL(url0), 1000);
      return;
    }
    // Download the CSV for whichever tab is active.
    const kind = currentView === 'partners' ? 'partners' : 'waitlist';
    const r = await fetch(`${WORKER_URL}/api/admin/${kind}?format=csv`, {
      headers: { 'x-admin-token': token },
    });
    if (r.status === 403 || r.status === 401) {
      clearToken();
      showAuth('Wrong token. Try again.');
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bioms-${kind}-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Release the Blob URL on next tick so the download starts cleanly.
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (err) {
    alert('Download failed: ' + (err.message || err));
  } finally {
    downloadBtn.disabled = false;
    downloadBtn.textContent = originalLabel;
  }
});

logoutBtn.addEventListener('click', () => {
  if (confirm('Forget the saved admin token? You will need to paste it again next time.')) {
    clearToken();
    showAuth('Token cleared.');
  }
});

searchEl.addEventListener('input', applyFilter);

const luomsToggle = document.getElementById('luoms-toggle');
luomsToggle.addEventListener('click', () => {
  luomsOnly = !luomsOnly;
  luomsToggle.classList.toggle('active', luomsOnly);
  luomsToggle.setAttribute('aria-pressed', String(luomsOnly));
  applyFilter();
});

// ===== Partners (community applications) =====
// Data is user-submitted free text → ESCAPE everything before injecting.
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function twUrl(t) {
  t = String(t || '').trim();
  if (/^https?:\/\//i.test(t)) return t;
  const h = t.replace(/^@/, '').replace(/[^A-Za-z0-9_]/g, '');
  return h ? ('https://x.com/' + h) : '';
}

async function loadPartners() {
  const token = getToken();
  if (!token) return showAuth();
  pListEl.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const r = await fetch(`${WORKER_URL}/api/admin/partners`, { headers: { 'x-admin-token': token } });
    if (r.status === 403 || r.status === 401) { clearToken(); showAuth('Wrong token. Try again.'); return; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allPartners = data.partners || [];
    pTotalEl.textContent = String(allPartners.length);
    pPendingEl.textContent = String(allPartners.filter(p => (p.status || 'pending') === 'pending').length);
    applyPartnerFilter();
  } catch (err) {
    showContent();
    pListEl.innerHTML = `<div class="empty">Failed to load: ${esc(err.message || err)}. The API may be unreachable — check your connection and hit Refresh.</div>`;
  }
}

function renderPartners(list) {
  if (!list.length) { pListEl.innerHTML = '<div class="empty">No applications yet.</div>'; return; }
  pListEl.innerHTML = list.map(p => {
    const status = p.status || 'pending';
    const tw = twUrl(p.twitter);
    const titleTxt = p.community ? esc(p.community) : (p.twitter ? esc(p.twitter) : '—');
    const titleHtml = tw ? `<a href="${esc(tw)}" target="_blank" rel="noopener">${titleTxt}</a>` : titleTxt;
    const date = p.submittedMs ? fmtDate(p.submittedMs) : '';
    const rows = [];
    if (p.twitter) rows.push(['X', tw ? `<a href="${esc(tw)}" target="_blank" rel="noopener">${esc(p.twitter)}</a>` : esc(p.twitter)]);
    // Contact now equals the X handle (we DM on X); only show it if a legacy
    // entry left a distinct contact, so we don't print the handle twice.
    if (p.contact && p.contact !== p.twitter) rows.push(['Contact', `${esc(p.contact)} <button class="mini-copy" data-copy="${esc(p.contact)}">Copy</button>`]);
    if (p.requestedSpots) rows.push(['Spots wanted', esc(p.requestedSpots)]);
    if (p.audienceSize) rows.push(['Audience', esc(p.audienceSize)]);
    if (p.discord) rows.push(['Discord/TG', esc(p.discord)]);
    if (p.links) rows.push(['Collection/site', esc(p.links)]);
    if (p.about) rows.push(['Notes', esc(p.about)]);
    if (p.memberAddrs) rows.push(['Wallets / contract', `<div class="mono-block">${esc(p.memberAddrs)}</div><button class="mini-copy" data-copy="${esc(p.memberAddrs)}">Copy all</button>`]);
    const grid = rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');
    const pid = esc(String(p.id));
    const marked = selectedPartners.has(String(p.id));
    return `<div class="papp${marked ? ' marked' : ''}">
      <div class="papp-head">
        <div class="papp-head-l"><label class="papp-sel"><input type="checkbox" class="papp-check" data-id="${pid}" ${marked ? 'checked' : ''}>Mark</label><span class="papp-title">${titleHtml}</span><span class="badge ${esc(status)}">${esc(status)}</span></div>
        <span class="papp-meta">#${esc(p.id)} · ${esc(date)}</span>
      </div>
      <dl class="papp-grid">${grid}</dl>
    </div>`;
  }).join('');
  pListEl.querySelectorAll('.mini-copy').forEach(b => b.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(b.dataset.copy);
      const o = b.textContent; b.textContent = 'Copied'; b.classList.add('copied');
      setTimeout(() => { b.textContent = o; b.classList.remove('copied'); }, 1300);
    } catch (_) {}
  }));
  pListEl.querySelectorAll('.papp-check').forEach(cb => cb.addEventListener('change', () => {
    const id = cb.dataset.id;
    if (cb.checked) selectedPartners.add(id); else selectedPartners.delete(id);
    saveSelected();
    updateSelectedBtn();
    const card = cb.closest('.papp');
    if (card) card.classList.toggle('marked', cb.checked);
  }));
  updateSelectedBtn();
}

// Gather every wallet / ENS / contract from the marked applications, dedupe
// case-insensitively, and download one CSV — addresses only, one per line,
// nothing else. Client-side; uses the already-loaded partner data.
function downloadSelectedAddresses() {
  const picked = allPartners.filter(p => selectedPartners.has(String(p.id)));
  if (!picked.length) { alert('Nothing marked. Tick "Mark" on the applications you want, then try again.'); return; }
  const seen = new Set();
  const out = [];
  picked.forEach(p => {
    const toks = String(p.memberAddrs || '').match(/0x[a-fA-F0-9]{40}|[A-Za-z0-9-]+\.eth/gi) || [];
    toks.forEach(t => {
      const k = t.toLowerCase();
      if (!seen.has(k)) { seen.add(k); out.push(t.trim()); }
    });
  });
  if (!out.length) { alert('The marked applications have no wallet addresses yet (blank, or a contract still pending a holder snapshot).'); return; }
  const blob = new Blob([out.join('\n') + '\n'], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bioms-partner-addresses-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
dlSelectedBtn.addEventListener('click', downloadSelectedAddresses);

function applyPartnerFilter() {
  const q = (pSearchEl.value || '').trim().toLowerCase();
  const f = !q ? allPartners
    : allPartners.filter(p => [p.community, p.twitter, p.contact, p.links, p.discord, p.about]
        .some(x => String(x || '').toLowerCase().includes(q)));
  renderPartners(f);
}
pSearchEl.addEventListener('input', applyPartnerFilter);

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  viewWaitlist.hidden = view !== 'waitlist';
  viewPartners.hidden = view !== 'partners';
  dlSelectedBtn.hidden = view !== 'partners';
  if (view === 'partners') updateSelectedBtn();
  if (view === 'partners' && allPartners.length === 0) loadPartners();
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchView(t.dataset.view)));

// Boot
loadList();
</script>
</body>
