<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Bioms">
  <title>Bioms</title>
  <!--
    Dark-mode favicon — served via:
      <link rel="icon" media="(prefers-color-scheme: dark)" href="/favicon-dark.svg">
    Same composition as v3 favicon.svg, inverted: cream cell body on
    dark chrome with a dark nucleoid as focal point. Coordinates match
    the light version exactly so a user toggling OS theme mid-session
    sees the same mark, just inverted.
  -->
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8efd6"/>
      <stop offset="1" stop-color="#d0c39e"/>
    </linearGradient>
    <radialGradient id="bloom" cx="0.22" cy="0.18" r="0.65">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="0.5"  stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.22" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nuc" cx="0.38" cy="0.32" r="0.7">
      <stop offset="0"   stop-color="#3d3a32"/>
      <stop offset="0.7" stop-color="#16140f"/>
      <stop offset="1"   stop-color="#0b0a07"/>
    </radialGradient>
  </defs>

  <rect x="3" y="10" width="26" height="12" rx="6" fill="url(#body)"/>
  <circle cx="9.8" cy="15.6" r="2.9" fill="url(#nuc)"/>
  <circle cx="17.6" cy="14.2" r="1.5" fill="#16140f" fill-opacity="0.82"/>
  <circle cx="22.4" cy="17.8" r="1.1" fill="#16140f" fill-opacity="0.75"/>
  <circle cx="24.6" cy="14.6" r="0.55" fill="#16140f" fill-opacity="0.6"/>
  <rect x="3" y="10" width="26" height="12" rx="6" fill="url(#bloom)"/>
  <rect x="3" y="10" width="26" height="12" rx="6" fill="url(#sheen)"/>
  <rect x="3" y="10" width="26" height="12" rx="6"
        fill="none" stroke="#0b0a07" stroke-width="0.9" stroke-opacity="0.5"/>
</svg>
