<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>Glass · grid 9</title>
<style>
  html,body{margin:0;height:100%;background:#fff;overflow:hidden;}
  /* one tight 3×3 board — cells touch, each cell is a full token render so
     nothing gets cropped (the biom frames itself inside its own cell) */
  #board{position:absolute;top:0;left:0;display:grid;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:0;}
  #board iframe{display:block;width:100%;height:100%;border:0;}
</style>
</head>
<body>
<div id="board"></div>
<script>
const Q=new URLSearchParams(location.search);
const ids=(Q.get('ids')||'1,2,3,4,5,6,7,8,9').split(',').map(s=>parseInt(s,10)).slice(0,9);
const cell=parseInt(Q.get('cell')||'420',10);
const z=Q.get('z')||'1.06';
const board=document.getElementById('board');
board.style.width=board.style.height=(cell*3)+'px';
const frames=[];
ids.forEach(id=>{const f=document.createElement('iframe');
  f.src=`/glass-500.html?id=${id}&token=1&still=1&z=${z}`;
  board.appendChild(f);frames.push(f);});
// synchronous drivers for the capture script — one seamless clock for all 9
window.__readyAll=()=>frames.every(f=>{try{return f.contentWindow.__biomReady===true;}catch(e){return false;}});
window.__seekAll=t=>frames.forEach(f=>{try{f.contentWindow.__seek&&f.contentWindow.__seek(t);}catch(e){}});
Object.defineProperty(window,'__LOOP',{get(){try{return frames[0].contentWindow.__LOOP||16;}catch(e){return 16;}}});
</script>
</body>
</html>
