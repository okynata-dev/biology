function generateMorphology(type, count) {
  const panels = [];
  switch (type) {
    case 'coccus': {
      const positions = clusterPositions(count);
      positions.forEach((p, i) => {
        panels.push({
          cx: p.x, cy: p.y, w: 24, h: 24, r: 50, z: 80 + i * 8, color: 'body',
        });
      });
      break;
    }
    case 'bacillus': {
      for (let i = 0; i < count; i++) {
        const y = 30 + i * (45 / Math.max(count, 1));
        panels.push({
          cx: 48 + (i % 2 === 0 ? -3 : 3),
          cy: y, w: 36, h: 18, r: 30,
          z: 80 + i * 10, color: 'body',
          rot: i % 2 === 0 ? -4 : 4,
        });
      }
      break;
    }
    case 'vibrio': {
      const bulges = Math.min(count, 3);
      for (let i = 0; i < bulges; i++) {
        const t = bulges === 1 ? 0.5 : i / (bulges - 1);
        const yOff = 28 + t * 50;
        const xOff = 48 + Math.sin(t * Math.PI) * 8;
        panels.push({
          cx: xOff, cy: yOff,
          w: 44 - i * 4, h: 30, r: 40,
          z: 70 + i * 15, color: 'body',
          rot: -10 + t * 30,
        });
      }
      break;
    }
    case 'spirillum': {
      for (let i = 0; i < count; i++) {
        const t = i / Math.max(count - 1, 1);
        const y = 22 + t * 64;
        const xOff = 48 + Math.sin(t * Math.PI * 1.8) * 9;
        panels.push({
          cx: xOff, cy: y, w: 26, h: 18, r: 40,
          z: 60 + i * 12, color: 'body',
          rot: i % 2 === 0 ? 18 : -18,
        });
      }
      break;
    }
    case 'filament': {
      for (let i = 0; i < count; i++) {
        const t = i / Math.max(count - 1, 1);
        const y = 25 + t * 55;
        panels.push({
          cx: 48, cy: y, w: 16, h: 16, r: 50,
          z: 80 + i * 4, color: 'body',
        });
      }
      break;
    }
    case 'cluster': {
      const positions = grapeCluster(count, mulberry32(state.seed));
      positions.forEach((p, i) => {
        panels.push({
          cx: p.x, cy: p.y, w: p.r * 2, h: p.r * 2, r: 50,
          z: 80 + i * 6, color: 'body',
        });
      });
      break;
    }
    case 'diplo': {
      const pairs = Math.max(1, Math.floor(count / 2));
      for (let i = 0; i < pairs; i++) {
        const y = 32 + i * (40 / Math.max(pairs, 1));
        panels.push({ cx: 38, cy: y, w: 26, h: 26, r: 50, z: 80 + i * 10, color: 'body' });
        panels.push({ cx: 58, cy: y, w: 26, h: 26, r: 50, z: 80 + i * 10, color: 'body' });
      }
      break;
    }
    // Sarcina ventriculi — 8 cells in 2×2×2 cube (division in 3 planes).
    // Front 4 cells full size, back 4 smaller and darker to give 3D effect.
    case 'sarcina': {
      const back = [
        { x: 42, y: 36 }, { x: 56, y: 36 },
        { x: 42, y: 54 }, { x: 56, y: 54 },
      ];
      back.forEach((p, i) => {
        panels.push({
          cx: p.x, cy: p.y, w: 17, h: 17, r: 50,
          z: 40 + i * 3, color: 'bodyDark',
        });
      });
      const front = [
        { x: 38, y: 38 }, { x: 60, y: 38 },
        { x: 38, y: 60 }, { x: 60, y: 60 },
      ];
      front.forEach((p, i) => {
        panels.push({
          cx: p.x, cy: p.y, w: 22, h: 22, r: 50,
          z: 100 + i * 5, color: 'body',
        });
      });
      break;
    }
    // Tetrad — 4 cells in 2×2 square (Micrococcus, division in 2 planes).
    case 'tetrad': {
      const positions = [
        { x: 40, y: 42 }, { x: 58, y: 42 },
        { x: 40, y: 60 }, { x: 58, y: 60 },
      ];
      positions.forEach((p, i) => {
        panels.push({
          cx: p.x, cy: p.y, w: 22, h: 22, r: 50,
          z: 80 + i * 6, color: 'body',
        });
      });
      break;
    }
    // Streptobacillus — chain of 5-8 rods stacked end-to-end.
    case 'streptobacillus': {
      const chainLen = 5 + Math.min(count, 3);  // 5-8 cells
      const totalH = 60;
      for (let i = 0; i < chainLen; i++) {
        const y = 22 + (i + 0.5) * (totalH / chainLen);
        panels.push({
          cx: 48 + (i % 2 === 0 ? -1.5 : 1.5),
          cy: y,
          w: 26,
          h: (totalH / chainLen) - 1,
          r: 35,
          z: 80 + i * 5,
          color: 'body',
          rot: i % 2 === 0 ? -2 : 2,
        });
      }
      break;
    }
    // Mycelium — branching hyphae (Actinomyces, Streptomyces).
    // Uses an isolated RNG instance so the main rng cursor stays in sync
    // with Python (positions diverge per platform, but the trait extraction
    // sequence is preserved).
    case 'mycelium': {
      const branchRng = mulberry32(state.seed * 7919 + 1);
      function grow(x, y, angle, length, depth) {
        if (depth > 4 || length < 5) return;
        const segs = 3 + Math.floor(branchRng() * 3);
        let cx = x, cy = y;
        for (let s = 0; s < segs; s++) {
          const segLen = length / segs;
          cx += Math.cos(angle) * segLen;
          cy += Math.sin(angle) * segLen;
          if (cx < 8 || cx > 92 || cy < 8 || cy > 92) return;
          const cellSize = Math.max(3, 8 - depth * 1.3);
          panels.push({
            cx: cx, cy: cy,
            w: cellSize, h: cellSize, r: 50,
            z: 90 - depth * 12,
            color: depth === 0 ? 'body' : (depth === 1 ? 'bodyDark' : 'bodyDeep'),
          });
          angle += (branchRng() - 0.5) * 0.4;
        }
        if (depth < 3 && branchRng() < 0.65) {
          grow(cx, cy, angle + Math.PI / 4 + (branchRng() - 0.5) * 0.3, length * 0.7, depth + 1);
          grow(cx, cy, angle - Math.PI / 4 + (branchRng() - 0.5) * 0.3, length * 0.7, depth + 1);
        }
      }
      const startDirs = 3 + Math.floor(branchRng() * 2);
      for (let i = 0; i < startDirs; i++) {
        grow(48, 50, (i / startDirs) * Math.PI * 2 + branchRng() * 0.5, 20, 0);
      }
      break;
    }
  }
  return panels;
}

function clusterPositions(count) {
  const layouts = {
    1: [{ x: 48, y: 50 }],
    2: [{ x: 36, y: 44 }, { x: 60, y: 58 }],
    3: [{ x: 36, y: 38 }, { x: 60, y: 48 }, { x: 42, y: 64 }],
    4: [{ x: 42, y: 34 }, { x: 60, y: 48 }, { x: 38, y: 62 }, { x: 56, y: 78 }],
    5: [{ x: 38, y: 32 }, { x: 58, y: 38 }, { x: 48, y: 52 }, { x: 36, y: 68 }, { x: 60, y: 74 }],
    6: [{ x: 36, y: 30 }, { x: 56, y: 34 }, { x: 44, y: 48 }, { x: 60, y: 56 }, { x: 36, y: 66 }, { x: 56, y: 78 }],
  };
  return layouts[count] || layouts[4];
}

function grapeCluster(count, rng) {
  const result = [];
  const cx = 48, cy = 50;
  for (let i = 0; i < count; i++) {
    const angle = rng() * Math.PI * 2;
    const dist = 8 + rng() * 8;
    result.push({
      x: cx + Math.cos(angle) * dist,
      y: cy + Math.sin(angle) * dist,
      r: 7 + rng() * 4,
    });
  }
  return result;
}

function generateOrganelles(state, cells, rng) {
  const result = [];

  if (state.organelles.has('capsule')) {
    const bbox = computeBbox(cells);
    let capCy, capW, capH;
    if (IS_FIT_MODE) {
      // Smaller envelope in fit mode so it stays inside the card.
      capCy = bbox.cy + bbox.h * 0.05;
      capW = Math.max(bbox.w * 1.15 + 6, 48);
      capH = Math.max(bbox.h * 1.15 + 8, 52);
    } else {
      // PFP mode — envelope deliberately oversized for close-up crop.
      capCy = Math.max(bbox.cy + bbox.h * 0.3, 65);
      capW = Math.max(bbox.w * 1.4 + 20, 60);
      capH = Math.max(bbox.h * 1.4 + 24, 70);
    }
    result.push({
      cx: bbox.cx, cy: capCy,
      w: capW, h: capH,
      r: 50, z: 0, color: 'capsule',
    });
    // Inner cell wall — tighter envelope (between outer capsule and cells)
    result.push({
      cx: bbox.cx, cy: bbox.cy + (bbox.h * 0.15),
      w: bbox.w * 1.15 + 8, h: bbox.h * 1.15 + 10,
      r: 50, z: 20, color: 'cellWall',
    });
  }

  if (state.organelles.has('nucleoid')) {
    cells.forEach((cell, i) => {
      result.push({
        cx: cell.cx, cy: cell.cy,
        w: cell.w * 0.4, h: cell.h * 0.4,
        r: 50, z: cell.z + 50,
        color: 'bodyDeep',
      });
    });
  }

  if (state.organelles.has('ribosomes')) {
    cells.forEach(cell => {
      const count = 2 + Math.floor(rng() * 3);
      for (let i = 0; i < count; i++) {
        const a = rng() * Math.PI * 2;
        const r = (cell.w * 0.25) * rng();
        result.push({
          cx: cell.cx + Math.cos(a) * r,
          cy: cell.cy + Math.sin(a) * r,
          w: 2.4, h: 2.4, r: 50,
          z: cell.z + 60,
          color: 'organelle',
        });
      }
    });
  }

  if (state.organelles.has('pili')) {
    const bbox = computeBbox(cells);
    const cx = bbox.cx, cy = bbox.cy;
    const r = Math.max(bbox.w, bbox.h) * 0.5 + 4;
    const count = 14;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      if (angle > Math.PI * 0.6 && angle < Math.PI * 1.4) continue;
      const px = cx + Math.cos(angle - Math.PI / 2) * r;
      const py = cy + Math.sin(angle - Math.PI / 2) * r * 0.9;
      result.push({
        cx: px, cy: py,
        w: 6, h: 1.8, r: 1,
        z: 50, color: 'organelle',
        rot: (angle - Math.PI / 2) * 180 / Math.PI,
      });
    }
  }

  if (state.organelles.has('flagellum')) {
    const startX = 70, startY = 18;
    const segs = 5;
    for (let i = 0; i < segs; i++) {
      const t = i / (segs - 1);
      const px = startX + t * 18;
      const py = startY - t * 8 + Math.sin(i * 1.2) * 4;
      result.push({
        cx: px, cy: py, w: 8, h: 2.2, r: 2,
        z: 30, color: 'organelle',
        rot: 30 + Math.sin(i * 1.2) * 30,
      });
    }
  }

  if (state.organelles.has('plasmid')) {
    result.push({
      cx: 80, cy: 28, w: 9, h: 8, r: 50,
      z: 200, color: 'accent',
    });
  }

  if (state.organelles.has('endospore')) {
    const c = cells[Math.floor(cells.length / 2)] || cells[0];
    if (c) {
      result.push({
        cx: c.cx, cy: c.cy,
        w: c.w * 0.5, h: c.h * 0.32,
        r: 50, z: c.z + 45,
        color: 'accentB', rot: -15,
      });
    }
  }

  if (state.organelles.has('inclusion')) {
    cells.slice(0, Math.min(2, cells.length)).forEach((cell) => {
      result.push({
        cx: cell.cx + cell.w * 0.15,
        cy: cell.cy - cell.h * 0.15,
        w: cell.w * 0.18, h: cell.w * 0.18,
        r: 50, z: cell.z + 65,
        color: 'bodyDeep',
      });
    });
  }

  if (state.organelles.has('eyespot')) {
    const cell = cells[0] || { cx: 48, cy: 40, w: 28, h: 28, z: 100 };
    result.push({
      cx: cell.cx + cell.w * 0.2,
      cy: cell.cy - cell.h * 0.18,
      w: 10, h: 10, r: 50,
      z: cell.z + 75,
      color: 'bodyDeep',
    });
    result.push({
      cx: cell.cx + cell.w * 0.2 + 1,
      cy: cell.cy - cell.h * 0.18 - 1,
      w: 4, h: 4, r: 50,
      z: cell.z + 120,
      color: 'capsule',
    });
  }

  if (state.organelles.has('axial')) {
    const bbox = computeBbox(cells);
    result.push({
      cx: bbox.cx, cy: bbox.cy,
      w: 4, h: bbox.h * 1.0,
      r: 2, z: 130,
      color: 'bodyDeep',
    });
  }

  // === RESERVE GRANULES (mutually exclusive — drawn inside each cell) ===
  // Uses an isolated RNG instance so positions are deterministic per seed
  // but DO NOT consume calls from the main rng (preserves Python parity).
  if (state.reserveGranule && state.reserveGranule !== 'none') {
    const grng = mulberry32(state.seed * 31337 + 7);
    cells.forEach((cell) => {
      const cellR = (cell.w + cell.h) / 4;
      if (state.reserveGranule === 'phb') {
        // 2-3 light spheres — polyhydroxybutyrate carbon storage
        const n = 2 + Math.floor(grng() * 2);
        for (let i = 0; i < n; i++) {
          const a = grng() * Math.PI * 2;
          const d = cellR * 0.3 * grng();
          result.push({
            cx: cell.cx + Math.cos(a) * d, cy: cell.cy + Math.sin(a) * d,
            w: cell.w * 0.25, h: cell.h * 0.25, r: 50,
            z: cell.z + 55, color: 'organelle',
          });
        }
      } else if (state.reserveGranule === 'volutin') {
        // 2-3 dark purple metachromatic granules — polyphosphate
        const n = 2 + Math.floor(grng() * 2);
        for (let i = 0; i < n; i++) {
          const a = grng() * Math.PI * 2;
          const d = cellR * 0.35 * grng();
          result.push({
            cx: cell.cx + Math.cos(a) * d, cy: cell.cy + Math.sin(a) * d,
            w: cell.w * 0.15, h: cell.h * 0.15, r: 50,
            z: cell.z + 58, color: 'bodyDeep',
          });
        }
      } else if (state.reserveGranule === 'magnetosomes') {
        // Chain of 5-8 dark dots along major axis — Magnetospirillum
        const n = 5 + Math.floor(grng() * 4);
        for (let i = 0; i < n; i++) {
          const t = (i / Math.max(n - 1, 1) - 0.5) * 0.6;
          result.push({
            cx: cell.cx + t * cell.w, cy: cell.cy,
            w: cell.w * 0.10, h: cell.h * 0.10, r: 50,
            z: cell.z + 60, color: 'bodyDeep',
          });
        }
      } else if (state.reserveGranule === 'sulfur') {
        // 1-2 bright yellow spheres — Beggiatoa, Thiomargarita
        const n = 1 + Math.floor(grng() * 2);
        for (let i = 0; i < n; i++) {
          const a = grng() * Math.PI * 2;
          const d = cellR * 0.25 * grng();
          result.push({
            cx: cell.cx + Math.cos(a) * d, cy: cell.cy + Math.sin(a) * d,
            w: cell.w * 0.35, h: cell.h * 0.35, r: 50,
            z: cell.z + 65, color: 'accent',
          });
        }
      } else if (state.reserveGranule === 'crystalline') {
        // Parasporal body (diamond) — Bacillus thuringiensis Cry toxin
        result.push({
          cx: cell.cx, cy: cell.cy + cell.h * 0.2,
          w: cell.w * 0.3, h: cell.w * 0.3, r: 5,
          z: cell.z + 55, color: 'bodyDeep',
          rot: 45,
        });
      }
    });
  }

  // === LIFECYCLE STATE (mutually exclusive) ===
  if (state.lifecycle === 'binary_fission') {
    // Thin constriction line in middle of first cell
    if (cells[0]) {
      result.push({
        cx: cells[0].cx, cy: cells[0].cy,
        w: cells[0].w * 0.95, h: 2, r: 1,
        z: cells[0].z + 100, color: 'bodyDeep',
      });
    }
  } else if (state.lifecycle === 'sporulating') {
    // Large endospore in central cell
    const cell = cells[Math.floor(cells.length / 2)] || cells[0];
    if (cell) {
      result.push({
        cx: cell.cx, cy: cell.cy,
        w: cell.w * 0.55, h: cell.h * 0.45, r: 50,
        z: cell.z + 70, color: 'accentB',
      });
    }
  } else if (state.lifecycle === 'heterocyst') {
    // One cell larger and accent-colored — nitrogen-fixing cell in cyanobacterial filament
    const idx = Math.floor(cells.length / 2);
    const cell = cells[idx];
    if (cell) {
      result.push({
        cx: cell.cx, cy: cell.cy,
        w: cell.w * 1.4, h: cell.h * 1.4, r: 50,
        z: cell.z - 10, color: 'accent',
      });
    }
  }

  // === ULTRA-RARE EFFECTS (independent) ===
  if (state.phageAttached && cells[0]) {
    // Bacteriophage on the surface — icosahedral head + thin tail
    const cell = cells[0];
    const sx = cell.cx + cell.w * 0.4;
    const sy = cell.cy - cell.h * 0.4;
    result.push({
      cx: sx, cy: sy,
      w: 4, h: 4, r: 30,
      z: 220, color: 'bodyDeep', rot: 30,
    });
    result.push({
      cx: sx, cy: sy + 4,
      w: 1.5, h: 5, r: 1,
      z: 218, color: 'bodyDeep',
    });
  }
  if (state.endosymbiont && cells[0]) {
    // Cell-within-cell — mitochondrion/chloroplast precursor
    const cell = cells[0];
    result.push({
      cx: cell.cx, cy: cell.cy,
      w: cell.w * 0.42, h: cell.h * 0.42, r: 50,
      z: cell.z + 88, color: 'cellWall',
    });
    result.push({
      cx: cell.cx, cy: cell.cy,
      w: cell.w * 0.35, h: cell.h * 0.35, r: 50,
      z: cell.z + 90, color: 'accent',
    });
  }
  if (state.biofilmHalo) {
    // Wide EPS matrix around the whole colony — sized smaller in fit mode.
    const bbox = computeBbox(cells);
    const haloW = IS_FIT_MODE ? bbox.w * 1.35 + 14 : bbox.w * 1.8 + 40;
    const haloH = IS_FIT_MODE ? bbox.h * 1.35 + 14 : bbox.h * 1.8 + 40;
    result.push({
      cx: bbox.cx, cy: bbox.cy,
      w: haloW, h: haloH,
      r: 50, z: -10, color: 'capsule',
    });
  }

  return result;
}

function generateAccents(count, rng) {
  const result = [];
  const positions = [{ x: 80, y: 30 }, { x: 18, y: 26 }, { x: 78, y: 14 }, { x: 14, y: 38 }];
  for (let i = 0; i < count; i++) {
    const p = positions[i % positions.length];
    const isB = i % 2 === 1;
    result.push({
      cx: p.x + (rng() - 0.5) * 6,
      cy: p.y + (rng() - 0.5) * 6,
      w: 4 + rng() * 5, h: 4 + rng() * 5,
      r: 50, z: 195 - i * 3,
      color: isB ? 'accentB' : 'accent',
    });
  }
  return result;
}

function computeBbox(cells) {
  let minX = 100, maxX = 0, minY = 100, maxY = 0;
  cells.forEach(c => {
    minX = Math.min(minX, c.cx - c.w / 2);
    maxX = Math.max(maxX, c.cx + c.w / 2);
    minY = Math.min(minY, c.cy - c.h / 2);
    maxY = Math.max(maxY, c.cy + c.h / 2);
  });
  return {
    cx: (minX + maxX) / 2,
    cy: (minY + maxY) / 2,
    w: maxX - minX,
    h: maxY - minY,
  };
}

function resolveColor(name, palette, gradientAngle, cellIdx) {
  // === Conjugation prototype: apply mutations / depletions from URL ===
  if (typeof CONJUGATION !== 'undefined') {
    if (CONJUGATION.depletions.has(name)) {
      return 'rgba(200, 195, 185, 0.35)';
    }
    if (CONJUGATION.mutations[name] !== undefined) {
      const donorSeed = CONJUGATION.mutations[name];
      const donorPaletteName = getDonorPalette(donorSeed);
      const donorPalette = PALETTES[donorPaletteName];
      if (donorPalette) {
        const ourValue = palette[name];
        const donorValue = donorPalette[name];
        const ourColor = Array.isArray(ourValue) ? ourValue[0] : ourValue;
        const donorColor = Array.isArray(donorValue) ? donorValue[0] : donorValue;
        if (ourColor && donorColor && ourColor !== '__GRAM_VARIABLE__' && donorColor !== '__GRAM_VARIABLE__') {
          const angle = gradientAngle != null ? gradientAngle : 145;
          return `linear-gradient(${angle}deg, ${ourColor} 0%, ${donorColor} 100%)`;
        }
      }
    }
  }
  // === Original logic ===
  const v = palette[name];
  if (v === '__GRAM_VARIABLE__') {
    const idx = cellIdx != null ? cellIdx : 0;
    return idx % 2 === 0 ? palette._gramPlus : palette._gramMinus;
  }
  // mixCycle (burn-mix palettes) — INTERLEAVED chimera:
  // [pure_0, grad(0→1), pure_1, grad(1→2), ..., pure_{N-1}]
  // 2N-1 stops total. Interleave guarantees every other cell is a
  // transition regardless of cell count.
  if (name === 'body' && palette._bodyMode === 'mixCycle' && Array.isArray(v) && v.length >= 2) {
    const angle = gradientAngle != null ? gradientAngle : 145;
    const cycle = [];
    for (let i = 0; i < v.length - 1; i++) {
      cycle.push(v[i]);
      cycle.push(`linear-gradient(${angle}deg, ${v[i]} 0%, ${v[i+1]} 100%)`);
    }
    cycle.push(v[v.length - 1]);
    return cycle[(cellIdx || 0) % cycle.length];
  }
  if (Array.isArray(v)) {
    const angle = gradientAngle != null ? gradientAngle : 145;
    const stops = v.map((c, i) => {
      const pct = (i / (v.length - 1)) * 100;
      return `${c} ${pct.toFixed(0)}%`;
    }).join(', ');
    return `linear-gradient(${angle}deg, ${stops})`;
  }
  return v || name;
}

function formatBorderRadius(r) {
  return `${r[0].toFixed(1)}% ${r[1].toFixed(1)}% ${r[2].toFixed(1)}% ${r[3].toFixed(1)}% / ${r[4].toFixed(1)}% ${r[5].toFixed(1)}% ${r[6].toFixed(1)}% ${r[7].toFixed(1)}%`;
}

// ============================================================
// LIVE ANIMATION LOOP — breathing border-radius + organelle drift
// Optimized: 30fps, transforms only, no layout thrashing
// Panels NodeList is cached and re-populated by buildScene() — saves a
// DOM walk every frame (mycelium specimens have 40-80 panels).
// Skips work entirely while:
//   - The tab is hidden (document.hidden) — browser-level signal.
//   - Parent posted { type: 'visibility', visible: false } via
//     IntersectionObserver — fires when the iframe is scrolled out
//     of the parent viewport. Without this an off-screen Lab
//     thumbnail keeps burning 30fps of CPU on a panel nobody sees.
// ============================================================
let animStart = performance.now();
let lastFrame = 0;
// ~60fps, jitter-free on 60 AND 120Hz. The old 30fps cap made slow drift
// read as "low fps" (the display refreshes at 60 but transforms only
// updated 30×/s, so motion stepped) — and a 33ms gate sits right on the
// rAF cadence, so timing jitter occasionally dropped a frame to ~20fps,
// adding stutter. Motion is time-parameterized (everything derives from
// `t`), so a higher sample rate is purely smoother at no amplitude/CPU-
// per-panel change. 14ms < the 16.67ms 60Hz frame → every 60Hz frame
// passes (steady, no beat), while 120Hz frames (8.33ms) halve cleanly to
// 60 so ProMotion laptops don't pay 2×. The heavy cost (blur/morph) is
// already gone, so 60fps of pure transforms is cheap.
const FRAME_INTERVAL = 14; // ms → ~60fps target (was 1000/30)
let cachedPanels = [];  // refreshed in buildScene()
let cachedAnimPanels = [];  // only the budgeted panels the liveLoop animates
let _cachedComp = null; // .composition element, cached for the cursor rotate

// Cursor parallax state. Handlers set the TARGET (_cursorTX/TY, normalized
// -1..1); the loop lerps the current value toward it and is the SOLE
// writer of the cursor transform. This kills the old stutter where the
// mousemove handler and the animation loop both wrote el.style.transform
// and overwrote each other every frame.
let _cursorTX = 0, _cursorTY = 0;   // target (from mouse/touch)
let _cursorPX = 0, _cursorPY = 0;   // current (lerped)
let _compWrittenX = NaN, _compWrittenY = NaN;  // last composition transform written

// Default: visible. Parent observer flips this to false when we
// scroll out of view, true again when we return.
let _externallyVisible = true;
window.addEventListener('message', (ev) => {
  const d = ev && ev.data;
  if (d && d.type === 'visibility' && typeof d.visible === 'boolean') {
    _externallyVisible = d.visible;
  }
}, { passive: true });

// Motion intensity multipliers — tuned up 2026-05-30 because the
// ambient motion read as too subtle ("неуловимое"). These scale the
// idle drift + breathing amplitudes ONLY (not speed), so GPU/CPU cost
// is unchanged — same number of paints per frame, just larger deltas.
// DRIFT 1.5 = 50% more float on organelles/body. BREATHE 1.25 = a bit
// more shape-morph.
//
// Overridable via ?drift= and ?breathe= URL params so motion can be
// A/B-compared live without re-rendering (the compare page passes
// ?drift=1&breathe=1 for the "before" iframe). The video pipeline
// renders against the DEFAULTS below, so whatever default ships here
// is what the baked MP4s capture.
// Defaults overridable via ?drift= / ?breathe=. NOTE on breathe: above
// ~3 the border-radius morph amplitude slams every radius into the clamp
// rails simultaneously, making all corners uniform → the biom reads as a
// rounded SQUARE/circle (that's the "squaring" at breathe 6 — it's the
// physics of morphing a clip shape, not a bug). If you want breathe-6
// LIVELINESS without the squaring, the right tool is a scale-pulse (the
// biom expands/contracts like lungs, silhouette untouched) — ask and
// it's a small add. Default kept at 6 per request.
const _mp = new URLSearchParams(window.location.search);
const MOTION_DRIFT   = parseFloat(_mp.get('drift'))   || 3.5;
// breathe default 0 — the border-radius morph is OFF by default. It was
// both the most expensive motion (clip-shape change = full backdrop-filter
// reblur) AND the thing that squared the silhouette at high amplitude.
// Breathing now comes from the scale-pulse (cheaper, never squares). Set
// ?breathe=1-2 if you want a touch of gentle outline shimmer back.
const MOTION_BREATHE = (_mp.has('breathe') ? parseFloat(_mp.get('breathe')) : 0) || 0;
// Scale-breath, PER PANEL. Each feature (cell, organelle, body envelope)
// pulses its own size on its own rhythm — phase from driftPhaseX, rate
// from morphSpeed (0.3-0.7), both already random per panel. So nothing
// pulses in lock-step; the biom reads as many independent little breaths,
// not one uniform zoom. Size has no clamp walls, so it never squares the
// silhouette. ?pulse=1 ≈ ±3% per panel. Default 0 = off (current behavior
// untouched). Recipe for "breathe-6 liveliness, no square": modest
// breathe (2-3) + pulse (1-1.5).
const MOTION_PULSE = (_mp.has('pulse') ? parseFloat(_mp.get('pulse')) : 2.5) || 0;
// === LOOP-RENDER MODE (video pipeline only) ===
// ?loop=N snaps every motion angular frequency to a whole number of cycles
// per N seconds, so the idle motion becomes EXACTLY N-second periodic — the
// frame at t=N is pixel-identical to t=0, giving a seamless looping clip.
// ?render=1 suppresses the rAF loop and exposes window.__seek(t) so a
// recorder can step frames deterministically (perfect, jitter-free loop).
// The live token (no params) is unaffected: _qFreq is a no-op when _LOOP=0,
// so its motion stays infinite and non-quantized exactly as now.
const _LOOP   = parseFloat(_mp.get('loop')) || 0;   // seconds, 0 = live/infinite
const _RENDER = _mp.get('render') === '1';
const _W0 = _LOOP > 0 ? (2 * Math.PI / _LOOP) : 0;
function _qFreq(w) { return _LOOP > 0 ? Math.max(1, Math.round(w / _W0)) * _W0 : w; }
const _DRIFT_FX = _qFreq(0.3);   // drift X angular freq (0.3 live)
const _DRIFT_FY = _qFreq(0.25);  // drift Y angular freq (0.25 live)

function liveLoop(now) {
  requestAnimationFrame(liveLoop);
  if (document.hidden || !_externallyVisible) { lastFrame = now; return; }
  if (now - lastFrame < FRAME_INTERVAL) return;
  lastFrame = now;

  const t = (now - animStart) / 1000;
  const panels = cachedAnimPanels;

  // Smoothly chase the cursor target (lerp). 0.14 = buttery but responsive.
  // This is what makes the parallax glide instead of stutter — the loop is
  // the single writer, the mouse handler only nudges the target.
  _cursorPX += (_cursorTX - _cursorPX) * 0.14;
  _cursorPY += (_cursorTY - _cursorPY) * 0.14;
  // Whole-composition tilt from the lerped cursor (separate element, no
  // conflict with per-panel transforms).
  if (!_cachedComp) _cachedComp = document.getElementById('comp');
  // Only write when the lerped cursor actually moved. Re-writing the same
  // transform every idle frame still invalidates this preserve-3d ancestor,
  // and combined with the per-panel writes that was the single biggest
  // per-frame cost (measured: baseline 83ms/frame vs 16.7ms with this skip).
  // When idle the cursor settles to 0 and we stop touching the composition.
  if (_cachedComp
      && !(Math.abs(_cursorPX - _compWrittenX) < 0.0008 && Math.abs(_cursorPY - _compWrittenY) < 0.0008)) {
    _cachedComp.style.transform = `rotateY(${_cursorPX * 2.2}deg) rotateX(${-_cursorPY * 1.8}deg)`;
    _compWrittenX = _cursorPX; _compWrittenY = _cursorPY;
  }

  _paintPanels(t);
}

// Per-panel transform update — extracted so window.__seek(t) (loop-render
// mode) can drive frames deterministically with the SAME math the live loop
// uses, so recorded video motion always matches the live token exactly.
function _paintPanels(t) {
  cachedAnimPanels.forEach(el => {
    // already only the budgeted set — no per-frame "is this animated?" check
    // and no iteration over the hundreds of static panels on dense bioms.
    // All per-panel inputs are numeric props (el._*) set in buildScene — no
    // dataset string parsing in the hot loop.

    // === Border-radius morph — gentle outline life ===
    // Cheap now (no live blur to recompute on a clip change). Gated on
    // breathe>0, kept moderate so radii don't slam the clamp rails (which
    // would average the corners into a rounded square).
    if (el._morphing && MOTION_BREATHE > 0.05 && !window.__BIOMS_LITE_MODE && el._baseRadii) {
      const baseRadii = el._baseRadii;
      const phase = el._mPhase;
      const speed = el._spQ;
      const A = 8 * MOTION_BREATHE;
      const RFLOOR = Math.min(40, 15 + (MOTION_BREATHE - 1) * 3);
      const r0 = clamp(baseRadii[0] + Math.sin(t * speed + phase) * A, RFLOOR, 85);
      const r1 = clamp(baseRadii[1] + Math.sin(t * speed + phase + 0.7) * A, RFLOOR, 85);
      const r2 = clamp(baseRadii[2] + Math.sin(t * speed + phase + 1.4) * A, RFLOOR, 85);
      const r3 = clamp(baseRadii[3] + Math.sin(t * speed + phase + 2.1) * A, RFLOOR, 85);
      const r4 = clamp(baseRadii[4] + Math.sin(t * speed + phase + 2.8) * A, RFLOOR, 85);
      const r5 = clamp(baseRadii[5] + Math.sin(t * speed + phase + 3.5) * A, RFLOOR, 85);
      const r6 = clamp(baseRadii[6] + Math.sin(t * speed + phase + 4.2) * A, RFLOOR, 85);
      const r7 = clamp(baseRadii[7] + Math.sin(t * speed + phase + 4.9) * A, RFLOOR, 85);
      el.style.borderRadius = `${r0.toFixed(1)}% ${r1.toFixed(1)}% ${r2.toFixed(1)}% ${r3.toFixed(1)}% / ${r4.toFixed(1)}% ${r5.toFixed(1)}% ${r6.toFixed(1)}% ${r7.toFixed(1)}%`;
    }

    // === ONE unified transform per panel: drift + size-breath + cursor ===
    // Single writer → the cursor parallax composes with the idle motion
    // instead of fighting it. No live blur anymore, so animating every
    // panel (incl. the body) is cheap.
    const z = el._z;
    const baseRot = el._baseRot;
    const ps = z / 200;

    // drift — non-anchor panels float (the body holds position).
    // wob = rotation-wobble degrees: small details (pili, dots) gently
    // rock/spin so the motion reads on the fine features, not just the
    // big back fields. Pure transform → free.
    let driftX = 0, driftY = 0, rotWob = 0;
    if (el._drifts) {
      const phx = el._phx;
      const phy = el._phy;
      const ampScale = el._driftScale;
      driftX = Math.sin(t * _DRIFT_FX + phx) * 1.4 * ampScale * MOTION_DRIFT;
      driftY = Math.cos(t * _DRIFT_FY + phy) * 1.4 * ampScale * MOTION_DRIFT;
      const wob = el._wob;
      if (wob) rotWob = Math.sin(t * el._spQ + phy) * wob;
    }

    // size-breath — ANISOTROPIC scale (X and Y on offset phases) so each
    // feature gently squishes/stretches. This is the "alive shape" the
    // border-radius morph used to give, but done with a TRANSFORM instead
    // of a clip change — transforms are GPU-composited (no re-raster), so
    // unlike the morph it costs the same at any DPR. The morph re-rastered
    // every frame and halved the framerate on retina; this doesn't.
    let psx = 1, psy = 1;
    if (MOTION_PULSE > 0) {
      const sp = el._spQ, ph = el._phx;
      psx = 1 + Math.sin(t * sp + ph)        * 0.03 * MOTION_PULSE;
      psy = 1 + Math.sin(t * sp + ph + 1.7)  * 0.03 * MOTION_PULSE;  // offset → squish
    }

    // cursor parallax — depth-based, deeper panels shift more
    const pxOff = _cursorPX * ps * 2.0;
    const pyOff = _cursorPY * ps * 1.5;

    // Write to the bare wrapper (see buildScene) — animating the wrapper
    // instead of the heavy panel is what keeps this off the main-thread
    // style-recalc path and holds 60fps. Falls back to el if unwrapped.
    (el._wrap || el).style.transform =
      `translate(${driftX}%, ${driftY}%) translate(${pxOff}px, ${pyOff}px) ` +
      `translateZ(${z}px) rotate(${baseRot + rotWob}deg) scale(${psx}, ${psy})`;
  });
}

function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

// Loop-render hook: paint a deterministic frame at time t with no cursor.
// The recorder steps t = frame/fps from 0 to LOOP and screenshots each —
// because the motion is exactly LOOP-periodic, the clip loops seamlessly.
window.__seek = function (t) { _cursorPX = 0; _cursorPY = 0; _paintPanels(t); };

// Animation loop runs unless in static mode (R2 master) or render mode
// (?render=1 — frames are driven deterministically via __seek instead).
if (!getStaticFromURL() && !_RENDER) {
  requestAnimationFrame(liveLoop);
}

// ============================================================
// BUILD SCENE — pure divs with border-radius + backdrop-filter
// ============================================================
// Blur drop-threshold (panels narrower than this lose backdrop-filter).
// Default 12; ?blurthresh=N overrides for perf testing.
const _BLUR_THRESH = (() => {
  const v = parseFloat(new URLSearchParams(window.location.search).get('blurthresh'));
  return Number.isFinite(v) ? v : 12;
})();

function buildScene() {
  const root = document.getElementById('comp');
  root.innerHTML = '';

  const rng = mulberry32(state.seed);
  // Guard against a crafted/invalid forceStain or forceMorph on the
  // animation_url (anyone can append URL params to an NFT renderer): an
  // unknown palette key makes resolveColor throw → blank render, and an
  // unknown morphology yields zero cells. Fall back to the seed-derived
  // value so a bad param degrades to the canonical Biom instead of breaking.
  if (!PALETTES[state.palette]) state.palette = pickWeightedPalette(mulberry32(state.seed));
  const palette = PALETTES[state.palette];

  const VALID_MORPHS = ['coccus','bacillus','vibrio','spirillum','filament','cluster','diplo','sarcina','tetrad','streptobacillus','mycelium'];
  if (!VALID_MORPHS.includes(state.morphology)) state.morphology = pickWeightedMorph(mulberry32(state.seed));
  const cells = generateMorphology(state.morphology, parseInt(state.cellCount));
  cells.forEach((c, i) => { c.cellIndex = i; });
  const organelles = generateOrganelles(state, cells, rng);
  const accents = generateAccents(parseInt(state.accentCount), rng);

  const all = [...cells, ...organelles, ...accents].sort((a, b) => a.z - b.z);

  all.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'panel';
    // Capsule/cell wall use minimal blur (heavy blur on huge panel would obscure cells beneath)
    if (item.color === 'capsule' || item.color === 'cellWall') {
      el.classList.add('capsule-layer');
    }
    // Small panels — no backdrop-filter (the 18px blur is imperceptible
    // at this size but costs a full blur layer that re-blurs every frame
    // when the panel drifts at full amplitude). Threshold raised 6 → 12
    // (2026-05-30): on a typical biom this drops ~8-10 of ~16 blur layers
    // with no visible change (verified by static render diff) — the big
    // cells + body envelope keep their glass, which is all the eye reads.
    // This is the main GPU-cost reduction: fewer moving blur layers.
    if (item.w < _BLUR_THRESH) {
      el.classList.add('lite');
    }
    // Vertical offset: default 15% (bust crop). With ?fit=1 → 0 (full centered specimen for downloads)
    const fitMode = new URLSearchParams(window.location.search).get('fit') === '1';
    const vOffset = fitMode ? 0 : 15;
    el.style.left = (item.cx - item.w / 2) + '%';
    el.style.top = ((item.cy + vOffset) - item.h / 2) + '%';
    el.style.width = item.w + '%';
    el.style.height = item.h + '%';

    // Store base position and size for drift animation
    el.dataset.baseCx = item.cx;
    el.dataset.baseCy = item.cy + vOffset;
    el.dataset.baseW = item.w;
    el.dataset.baseH = item.h;

    // Per-panel animation seeds (deterministic from global seed).
    // Also stored as numeric props (el._*) — the liveLoop reads those
    // every frame; property access avoids the per-frame dataset
    // string-parse (parseFloat + DOM attr lookup) that dominated CPU on
    // dense bioms. dataset.* kept for any external readers.
    const seedNum = state.seed + idx * 37;
    const sr = mulberry32(seedNum);
    const _mPhase = sr() * Math.PI * 2;
    const _mSpeed = 0.3 + sr() * 0.4;     // 0.3 - 0.7
    const _dphx = sr() * Math.PI * 2;
    const _dphy = sr() * Math.PI * 2;
    el.dataset.morphPhase = String(_mPhase);
    el.dataset.morphSpeed = String(_mSpeed);
    el.dataset.driftPhaseX = String(_dphx);
    el.dataset.driftPhaseY = String(_dphy);
    el._mPhase = _mPhase; el._sp = _mSpeed; el._phx = _dphx; el._phy = _dphy;
    el._spQ = _qFreq(_mSpeed);  // loop-render: snap to whole cycles/period (= _sp when live)

    // === DRIFT (positional motion) — tiered by element size ===
    // Capsule + cellWall = anchor (only breathe, never drift). Everything else moves.
    const isAnchor = (item.color === 'capsule' || item.color === 'cellWall');
    el._drifts = !isAnchor;
    el._driftScale = 0; el._wob = 0;
    if (!isAnchor) {
      el.dataset.drifts = '1';
      // Tiered by size. Big forms sway gently (don't break composition);
      // small details float MORE so the motion reads across the whole
      // biom, not just the big back fields. A big shape moving 2% is very
      // visible; a tiny dot needs to move much more % to read at all —
      // hence the boosted small/tiny tiers.
      let ds, wob = 0;
      if (item.w >= 20)      { ds = 0.4; }                 // big cell bodies — gentle
      else if (item.w >= 12) { ds = 0.8; }                 // medium
      else if (item.w >= 6)  { ds = 1.6; wob = 3; }        // small organelles — lively + wobble
      else                   { ds = 2.2; wob = 6; }        // tiny accents/pili — float + spin
      el.dataset.driftScale = String(ds);
      el.dataset.wob = String(wob);   // rotation-wobble degrees (transform, cheap)
      el._driftScale = ds; el._wob = wob;
    }

    // For blob-like organic shapes, generate asymmetric border-radius from seed
    if (item.r >= 30 && item.w > 8) {
      const sr2 = mulberry32(seedNum + 1);
      const baseRadii = [];
      for (let i = 0; i < 8; i++) {
        baseRadii.push(35 + sr2() * 35); // 35-70%
      }
      el.dataset.baseRadiiNum = baseRadii; // stored as comma string but we'll reparse once
      // Attach array directly for perf (no per-frame string parsing)
      el._baseRadii = baseRadii;
      el.dataset.baseRadii = baseRadii.join(',');
      el.dataset.morphing = '1';
      el._morphing = true;
      el.style.borderRadius = formatBorderRadius(baseRadii);
    } else if (item.r >= 49) {
      el.style.borderRadius = '50%';
    } else {
      el.style.borderRadius = item.r + '%';
    }

    // Gradient angle per panel — different for each so cells look distinct under iridescent
    const gradAngle = 80 + (idx * 47) % 200; // 80-280 range deterministic
    el.style.background = resolveColor(item.color, palette, gradAngle, item.cellIndex);
    el.style.transform = `translateZ(${item.z}px) rotate(${item.rot || 0}deg)`;
    el.dataset.z = item.z;
    el.dataset.baseRot = item.rot || 0;
    el.dataset.w = item.w || 0;     // size, for the animation budget below
    el._z = item.z; el._baseRot = item.rot || 0;
    root.appendChild(el);
  });

  // Refresh the animation-loop's panel cache (only place panels mutate).
  cachedPanels = Array.from(root.querySelectorAll('.panel'));

  // === ANIMATION BUDGET ===
  // Per-frame transform writes scale with panel count. Most bioms have
  // 12-63 panels (fine), but mycelium can hit 300+ — writing 322
  // transforms every frame drops to ~5fps (measured) and makes parts
  // jump as frames are dropped. Cap the ANIMATED set to the N LARGEST
  // panels (cells, body, big organelles); the rest hold their static
  // transform but still tilt with the whole composition (one cheap
  // parent rotate). The tiny filaments don't need individual drift, so
  // it's visually indistinguishable — and every biom stays at 60fps
  // regardless of complexity.
  // Animate a MIX of big + small, not just "the N largest". The old
  // "48 largest" rule animated only the big back fields and cell bodies
  // on dense bioms (mycelium has 300+ panels) — every small organelle,
  // dot and pilus fell OUTSIDE the budget and sat dead still, so the
  // detail motion never read on exactly the bioms that have the most
  // detail. Now: a structural quota of the largest panels (the sway)
  // PLUS an even stride-sample of the smaller remainder (the detail
  // life), spread across the size range so the tiniest accents animate
  // too. Total still capped so per-frame cost stays flat and every biom
  // holds 60fps regardless of complexity. Budgets overridable via
  // ?big=N&detail=N for perf tuning (defaults are the measured-safe set).
  const _abq = new URLSearchParams(window.location.search);
  const BIG_BUDGET    = parseInt(_abq.get('big'))    || 34;  // largest → gentle sway
  const DETAIL_BUDGET = parseInt(_abq.get('detail')) || 46;  // sampled small → detail life
  const ANIM_BUDGET = BIG_BUDGET + DETAIL_BUDGET;            // 80
  if (cachedPanels.length > ANIM_BUDGET) {
    const ranked = cachedPanels.slice().sort(
      (a, b) => (parseFloat(b.dataset.w) || 0) - (parseFloat(a.dataset.w) || 0));
    // Largest BIG_BUDGET panels → the structural sway.
    for (let i = 0; i < BIG_BUDGET && i < ranked.length; i++) ranked[i].dataset.anim = '1';
    // Even stride-sample the smaller remainder so moving details spread
    // across the colony and the size range (incl. tiny accents), instead
    // of animating only the next-largest cluster. Deterministic.
    const rest = ranked.slice(BIG_BUDGET);
    if (rest.length) {
      const stride = Math.max(1, Math.floor(rest.length / DETAIL_BUDGET));
      for (let i = 0, n = 0; i < rest.length && n < DETAIL_BUDGET; i += stride, n++) {
        rest[i].dataset.anim = '1';
      }
    }
  } else {
    cachedPanels.forEach(el => { el.dataset.anim = '1'; });
  }

  // The liveLoop iterates ONLY this set — not all 322 panels. Skipping
  // the per-frame "is this animated?" check across every panel (322 DOM
  // attr reads/tick on mycelium) is most of the win; the rest is reading
  // numeric props instead of parsing dataset strings.
  cachedAnimPanels = cachedPanels.filter(el => el.dataset.anim === '1');

  // === Animate WRAPPERS, not the panels themselves ===
  // Writing transform straight to a .panel forced a full style recalc of
  // that panel every frame. The panels carry heavy paint CSS (layered
  // box-shadow, gradient, gloss/noise pseudo-elements, a backdrop-filter in
  // the cascade) that ALSO can't be GPU-composited, so recalc ran on the
  // main thread at ~13ms/frame for 80 panels — right on the 60fps cliff.
  // That is the "30fps for N seconds, then it snaps to 60" warm-up the
  // engine showed: it sat exactly at the budget and tipped over on any
  // cold-start / background load. Fix: wrap each animated panel in a BARE
  // div and animate the WRAPPER. Recomputing a bare div's style is
  // microseconds, and `transform` doesn't inherit, so the heavy panel
  // inside is never re-styled. Measured on-device: per-frame recalc drops
  // ~30× (≈6300ms → ≈240ms over 11s) and every biom holds a flat 60fps
  // from the first frame, no warm-up. The look is identical — the transform
  // just lives on an equally-sized wrapper; the panel fills it and keeps
  // all its paint. Base depth + static tilt (translateZ + baseRot) move
  // onto the wrapper; the loop writes the full transform there each frame.
  cachedAnimPanels.forEach(el => {
    const w = document.createElement('div');
    w.className = 'biom-cell';
    w.style.cssText = 'position:absolute;will-change:transform;';
    w.style.left = el.style.left;
    w.style.top = el.style.top;
    w.style.width = el.style.width;
    w.style.height = el.style.height;
    w.style.transform = el.style.transform;   // seed base translateZ()+rotate()
    el.parentNode.insertBefore(w, el);
    w.appendChild(el);
    // panel now fills its wrapper and owns no transform/position of its own
    el.style.left = '0';
    el.style.top = '0';
    el.style.width = '100%';
    el.style.height = '100%';
    el.style.transform = 'none';
    el._wrap = w;
  });

  // Update card labels — none in preview mode
}

// ============================================================
// PREVIEW MODE: random specimen on load + click to randomize
// Also reads ?seed= from URL for deterministic rendering
// ============================================================
function updateUI() { /* no UI in preview */ }

function randomize(forcedSeed) {
  state.seed = forcedSeed !== undefined ? forcedSeed : Math.floor(Math.random() * 3000);
  const rng = mulberry32(state.seed);

  state.morphology = pickWeightedMorph(rng);
  state.palette = pickWeightedPalette(rng);

  state.cellCount = 1 + Math.floor(rng() * 6);
  state.accentCount = Math.floor(rng() * 4);

  state.organelles = new Set(['capsule']);
  if (rng() < 0.85) state.organelles.add('nucleoid');
  if (rng() < 0.45) state.organelles.add('ribosomes');
  if (rng() < 0.55) state.organelles.add('pili');
  if (rng() < 0.30) state.organelles.add('flagellum');
  if (rng() < 0.40) state.organelles.add('plasmid');
  if (rng() < 0.15) state.organelles.add('endospore');
  if (rng() < 0.20) state.organelles.add('inclusion');
  if (rng() < 0.20) state.organelles.add('eyespot');
  if (rng() < 0.15) state.organelles.add('axial');

  // === NEW TRAITS (Maximalist) ===
  // RNG order is sacred — mirror this exactly in Python generate_metadata.py.
  state.reserveGranule = pickWeightedReserve(rng);
  let lc = pickWeightedLifecycle(rng);
  // Heterocyst is biologically valid only for filamentous forms.
  if (lc === 'heterocyst' && state.morphology !== 'filament' && state.morphology !== 'mycelium') {
    lc = 'vegetative';
  }
  state.lifecycle = lc;
  state.phageAttached = rng() < 0.015;
  state.endosymbiont = rng() < 0.01;
  state.biofilmHalo  = rng() < 0.02;

  buildScene();

  // Keep the a11y label in sync with the active seed (click-to-randomize path).
  const pfp = document.getElementById('pfpCard');
  if (pfp) pfp.setAttribute('aria-label', 'Generative Biom');
}

// =============================================================
// CONJUGATION MUTATIONS (prototype only — read from URL params)
// =============================================================
// trait_id → list of color names in palette that this trait controls
const TRAIT_COLOR_MAP = {
  body:      ['body'],
  nucleoid:  ['bodyDeep'],
  capsule:   ['capsule', 'cellWall'],
  pili:      ['organelle'],
  flagellum: ['organelle'],
  ribosomes: ['organelle'],
  plasmid:   ['accent', 'accentB'],
  accent:    ['accent', 'accentB'],
};

// Build mutation/depletion maps from URL params
function parseConjugationFromURL() {
  const params = new URLSearchParams(window.location.search);
  const mutations = {}; // color_name → donor_seed
  const depletions = new Set(); // color_name's that are depleted
  for (const [key, val] of params) {
    if (key.startsWith('mut_')) {
      const traitId = key.slice(4);
      const colorNames = TRAIT_COLOR_MAP[traitId] || [];
      colorNames.forEach(cn => { mutations[cn] = parseInt(val, 10); });
    } else if (key.startsWith('dep_')) {
      const traitId = key.slice(4);
      const colorNames = TRAIT_COLOR_MAP[traitId] || [];
      colorNames.forEach(cn => { depletions.add(cn); });
    }
  }
  return { mutations, depletions };
}

// Get the donor's palette (deterministic from donor seed)
function getDonorPalette(donorSeed) {
  const rng = mulberry32(donorSeed);
  // Replay enough rng calls to match what randomize() would have done:
  // randomize sequence: morphology, palette, cellCount, accentCount, ...organelle checks
  rng(); // morphology
  // pick palette via weighted
  return pickWeightedPalette(rng);
}

const CONJUGATION = parseConjugationFromURL();
function getSeedFromURL() {
  const params = new URLSearchParams(window.location.search);
  const s = params.get('seed');
  if (s !== null) {
    const n = parseInt(s, 10);
    if (!isNaN(n)) return n;
  }
  return undefined;
}

function getStaticFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('static') === '1';
}

// Click + parallax + touch — bypassed in static/embedded contexts (?nointeract=1)
// to save event-binding overhead and prevent stray cursor movements in iframes.
const urlSeed = getSeedFromURL();
const noInteract = new URLSearchParams(window.location.search).get('nointeract') === '1'
                || new URLSearchParams(window.location.search).get('static') === '1';

if (!noInteract) {
  // Click anywhere to randomize (but only if no URL seed — otherwise stay deterministic)
  if (urlSeed === undefined) {
    document.addEventListener('click', () => randomize());
  }

  // Mouse parallax — ONLY sets the cursor target. The liveLoop lerps to
  // it and writes the actual transforms (single writer = no stutter).
  document.addEventListener('mousemove', (e) => {
    const comp = document.getElementById('comp');
    const rect = comp.getBoundingClientRect();
    const x = (e.clientX - (rect.left + rect.width/2)) / (rect.width/2);
    const y = (e.clientY - (rect.top + rect.height/2)) / (rect.height/2);
    _cursorTX = Math.max(-1, Math.min(1, x));
    _cursorTY = Math.max(-1, Math.min(1, y));
  });
  // Ease back to centre when the cursor leaves.
  document.addEventListener('mouseleave', () => { _cursorTX = 0; _cursorTY = 0; });

  // Touch — single drag nudges the same cursor target.
  let dragStartX = 0, dragStartY = 0, dragging = false;
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    dragging = true;
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    e.preventDefault();
    const dx = (e.touches[0].clientX - dragStartX) / window.innerWidth;
    const dy = (e.touches[0].clientY - dragStartY) / window.innerHeight;
    _cursorTX = Math.max(-1, Math.min(1, dx * 4));
    _cursorTY = Math.max(-1, Math.min(1, dy * 4));
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    _cursorTX = 0; _cursorTY = 0;  // loop eases back to centre
  });
}

// === URL PARAM OVERRIDES ===
// Allow trait_explorer / wallpaper pages to isolate specific traits via URL:
//   ?forceMorph=sarcina           — override morphology
//   ?forceStain=acid_fast         — override palette
//   ?forceLifecycle=heterocyst    — override lifecycle (use with filament/mycelium)
//   ?forceReserve=magnetosomes    — override reserve granule
//   ?forcePhage=1, forceEndo=1, forceBiofilm=1   — ultra-rare overrides
//   ?forceOrganelles=capsule,nucleoid,pili       — replace organelle set
//   ?bg=white                     — solid white background (wallpaper mode)
//   ?noise=0                      — disable noise overlay
function applyOverridesFromURL() {
  const params = new URLSearchParams(window.location.search);
  const fm = params.get('forceMorph');
  if (fm) state.morphology = fm;
  const fs = params.get('forceStain');
  if (fs) {
    // Burn-flow N-palette blend: `forceStain=A+B+C+...` → split all parts
    // and feed every parent into mixPalettes. Synthetic palette key is
    // deterministic regardless of order. Single-stain (no '+') is passthrough.
    if (fs.includes('+')) {
      const parts = fs.split('+').filter(Boolean);
      state.palette = mixPalettes(...parts);
    } else {
      state.palette = fs;
    }
  }
  const flc = params.get('forceLifecycle');
  if (flc) state.lifecycle = flc;
  const fr = params.get('forceReserve');
  if (fr) state.reserveGranule = fr;
  // Anomaly toggles — accept both `1` (force on) and `0` (force off). The
  // off case is needed by /lab when a donor has temporarily lost an anomaly
  // it would otherwise have based on its seed.
  const fp = params.get('forcePhage');
  if (fp === '1') state.phageAttached = true; else if (fp === '0') state.phageAttached = false;
  const fe = params.get('forceEndo');
  if (fe === '1') state.endosymbiont = true; else if (fe === '0') state.endosymbiont = false;
  const fb = params.get('forceBiofilm');
  if (fb === '1') state.biofilmHalo = true; else if (fb === '0') state.biofilmHalo = false;
  const fo = params.get('forceOrganelles');
  if (fo !== null) {
    state.organelles = new Set(fo ? fo.split(',') : []);
    state.organelles.add('capsule'); // always on
  }
  const fcc = params.get('forceCells');
  if (fcc !== null) state.cellCount = parseInt(fcc, 10);
}

function applyBackgroundFromURL() {
  const params = new URLSearchParams(window.location.search);
  const bg = params.get('bg');
  const noise = params.get('noise');
  if (bg === 'white') {
    document.body.style.background = '#ffffff';
    document.documentElement.style.background = '#ffffff';
    const card = document.querySelector('.pfp-card');
    if (card) card.style.background = '#ffffff';
    const styleEl = document.createElement('style');
    styleEl.textContent = '.pfp-card::before { display: none !important; }';
    document.head.appendChild(styleEl);
  }
  if (noise === '0') {
    const styleEl = document.createElement('style');
    styleEl.textContent = '.pfp-card::before { display: none !important; } .panel::after { display: none !important; }';
    document.head.appendChild(styleEl);
  }
}

// === Scale: shrinks the .pfp-card so the specimen has whitespace around it ===
// Used by wallpaper maker and trait explorer to give breathing room.
//   --card-scale  shrinks the entire .pfp-card within its viewport (outer whitespace)
//   --comp-scale  shrinks the composition INSIDE the card so capsule + biofilm halo
//                 don't overflow the card edges. Applied automatically in fit=1 mode.
function applyScaleFromURL() {
  const params = new URLSearchParams(window.location.search);
  const scale = params.get('scale');
  if (scale) {
    document.documentElement.style.setProperty('--card-scale', scale);
  }
  // In fit mode, apply a gentle safety scale. The bulk of the fit happens
  // via smaller capsule/halo multipliers inside generateOrganelles (driven by
  // the IS_FIT_MODE flag) — this scale catches edge cases like extreme mycelium
  // branches or large cluster spreads.
  //
  // CUTOUT mode (the /make collage tiles) needs MORE margin: large specimens
  // were clipping the transparent frame. We render the SAME-size biom inside a
  // roomier frame (comp-scale 0.62 ≈ a biom on a ~1.6× bigger canvas), so even
  // the widest mycelium/cluster sits fully inside with breathing room.
  // Overridable via ?cs=. This affects ONLY the cutout render — the canonical
  // /preview/ master (rendered without ?cutout) is byte-identical to before.
  const isCutout = params.get('cutout') === '1';
  if (params.get('fit') === '1' || isCutout) {
    const cs = params.get('cs') || (isCutout ? '0.62' : '0.9');
    document.documentElement.style.setProperty('--comp-scale', cs);
  }
}

// Detect fit mode once at load — used by generateOrganelles to size capsule
// and biofilm halo so they don't overflow the card when ?fit=1 is set.
const IS_FIT_MODE = new URLSearchParams(window.location.search).get('fit') === '1';

// Bare mode — strips the inner card frame so cells sit flat on the parent
// page's background. Used by the homepage hero iframe to avoid the
// "card inside a card" visual.
if (new URLSearchParams(window.location.search).get('bare') === '1') {
  document.body.classList.add('bare');
}

// Cutout mode — body + card backgrounds go transparent, noise overlay
// hidden, download CTA hidden. Used by the offline cutout-screenshot
// pipeline (batch run + omit_background=True) to produce alpha PNGs
// of just the biom. We add the class to BOTH html and body so the
// page-background rule in line 18 ("html, body { background: #ece9e0 }")
// gets overridden on both elements.
if (new URLSearchParams(window.location.search).get('cutout') === '1') {
  document.documentElement.classList.add('cutout');
  document.body.classList.add('cutout');
}

// Lite mode — paint-containment + GPU compositing hints on the CSS side,
// JS-side borderRadius morph disabled (liveLoop checks the flag).
// Intended for embedded iframes where the host page is already heavy
// (OpenSea token detail, marketplaces). Visually near-identical to the
// full version; ~3-5× cheaper paint.
// lite=1 → no morph + paint containment + GPU compositing hints (visually identical)
// lite=2 → everything in lite=1, plus reduced blur radius + no noise overlay
//          + no mix-blend-mode (acceptable visual softening, ~5× cheaper)
{
  const liteParam = new URLSearchParams(window.location.search).get('lite');
  if (liteParam === '1' || liteParam === '2') {
    document.body.classList.add('lite');
    window.__BIOMS_LITE_MODE = true;
  }
  if (liteParam === '2') {
    document.body.classList.add('lite2');
  }
  // ===== GLASS BLUR POLICY (the perf fix, 2026-05-30) =====
  // Measured fact: a live backdrop-filter blur in an ANIMATED scene is a
  // hard wall — ANY number of blur panels (even 1) drops the frame rate
  // to ~20fps in software rendering, because the compositor re-blurs the
  // backdrop every time anything moves behind the glass. Blur radius and
  // panel count barely matter; it's binary. Zero live blur = 60fps.
  //
  // Resolution by CONTEXT:
  //  - STATIC master render (?static=1, the NFT image OpenSea shows in
  //    grids) KEEPS full glass — it's one frame, no per-frame cost, so
  //    the headline image stays maximally beautiful.
  //  - LIVE ANIMATED render (animation_url, hero, standalone) drops the
  //    live blur → smooth 60fps on EVERY machine. The glass read is
  //    carried by the gradient/sheen/noise/shadow layers (still clearly
  //    glass, just slightly crisper at overlaps).
  //
  // Overrides: ?noblur=1 forces off, ?forceblur=1 keeps glass even when
  // animating (high-end opt-in / A-B testing).
  {
    const _q = new URLSearchParams(window.location.search);
    const _isStatic = _q.get('static') === '1';
    const _forceBlur = _q.get('forceblur') === '1';
    const _noblurExplicit = _q.get('noblur') === '1';
    if (_noblurExplicit || (!_isStatic && !_forceBlur)) {
      document.body.classList.add('noblur');
    }
  }
  // ?blur=N — override glass blur radius (default 18) for perf testing.
  const blurParam = new URLSearchParams(window.location.search).get('blur');
  if (blurParam !== null && !isNaN(parseFloat(blurParam))) {
    document.documentElement.style.setProperty('--gblur', parseFloat(blurParam) + 'px');
  }
  if (new URLSearchParams(window.location.search).get('staticblur') === '1') {
    window.__BIOMS_STATICBLUR = true;
  }
}

// Init — use URL seed if given, otherwise random
applyScaleFromURL();      // Set CSS variables BEFORE first render
randomize(urlSeed);       // calls buildScene() at the end
// Only re-render if URL actually passed force-* overrides — otherwise the
// randomize() call above already built the correct scene.
const _ovParams = new URLSearchParams(window.location.search);
const _hasOverrides = ['forceMorph','forceStain','forceLifecycle','forceReserve',
  'forcePhage','forceEndo','forceBiofilm','forceOrganelles','forceCells']
  .some(k => _ovParams.has(k));
applyOverridesFromURL();
applyBackgroundFromURL();
if (_hasOverrides) buildScene();

// Ready-signal for the Browser Rendering pipeline. After mutations,
// the Worker calls puppeteer.screenshot() against this page and needs
// to know when the engine has fully painted the specimen (with all
// force-* overrides applied). We set a class on <body> AND a window
// flag so headless can either waitForSelector or waitForFunction.
// requestAnimationFrame ensures the first paint is flushed before
// we declare ready — without it, screenshot lands on a blank canvas
// in rare timing races.
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    document.body.classList.add('engine-ready');
    window.__biomReady = true;
  });
});

// Stamp the real seed into the a11y label so screen-readers get the token id.
const _pfp = document.getElementById('pfpCard');
if (_pfp) _pfp.setAttribute('aria-label', 'Generative Biom');

// === Download-CTA wiring ===
// Show only when preview.html is standalone (NOT inside an OpenSea /
// marketplace iframe). Inside an iframe `window.self !== window.top`
// — that's the signal to stay hidden so we don't overlay their UI.
// Standalone visitors typically came from "Original media" or a direct
// link, and they DO want a clear save path.
//
// Two download paths:
//   - BASE biom (no force* params)    → static R2 master via /api/download
//   - MUTATED biom (force* present)   → canvas snapshot of current render.
//     The R2 master would be wrong (it's the base version); the only
//     correct PNG for a mutated token is what's on screen right now.
(function setupDownloadCta() {
  const row = document.getElementById('downloadCtaRow');
  const cta = document.getElementById('downloadCta');
  const ctaMp4 = document.getElementById('downloadCtaMp4');
  if (!row || !cta) return;
  const inIframe = (() => { try { return window.self !== window.top; } catch (_) { return true; } })();
  if (inIframe) return;
  const params = new URLSearchParams(window.location.search);
  const seedRaw = params.get('seed');
  const seed = (seedRaw !== null && Number.isFinite(parseInt(seedRaw, 10)))
    ? parseInt(seedRaw, 10) : 0;

  // Detect any force* override — if present, the static R2 master is
  // the WRONG file and we need to render the visible state to canvas.
  const FORCE_KEYS = ['forceStain', 'forceMorph', 'forceCells',
                      'forceLifecycle', 'forceReserve', 'forceOrganelles',
                      'forcePhage', 'forceEndo', 'forceBiofilm'];
  const hasForce = FORCE_KEYS.some(k => params.has(k));

  // MP4 wiring — base bioms only. A mutated biom has no pre-rendered
  // video on R2 yet (see TODO in worker.js handleVideo), so we hide
  // the MP4 button rather than serve a stale recording of the base
  // state. Post-launch we'll wire renderTokenVideo into the burn
  // pipeline and re-enable this for mutated tokens.
  if (ctaMp4 && !hasForce) {
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    ctaMp4.href = isLocal
      ? `https://pngs.thebioms.com/video/${String(seed).padStart(5, '0')}.mp4`
      : `https://api.thebioms.com/api/video/${seed}`;
    ctaMp4.setAttribute('download', `BIOM-${seed}.mp4`);
  } else if (ctaMp4) {
    ctaMp4.remove();
  }

  if (!hasForce) {
    // Static master path — direct link to Worker download proxy
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    cta.href = isLocal
      ? `https://pngs.thebioms.com/preview/${String(seed).padStart(5, '0')}.png`
      : `https://api.thebioms.com/api/download/${seed}`;
    cta.setAttribute('download', `BIOM-${seed}.png`);
    row.classList.add('show');
    return;
  }

  // Mutated path — intercept the click, render canvas, trigger blob
  // download. Standalone tab so blob downloads aren't sandbox-blocked.
  cta.href = '#';
  cta.removeAttribute('download');
  cta.removeAttribute('target');
  row.classList.add('show');
  cta.addEventListener('click', (e) => {
    e.preventDefault();
    if (!window.BiomEngine || typeof window.BiomEngine.renderSpecimenToCanvas !== 'function') {
      console.warn('[download] engine not ready');
      return;
    }
    try {
      // Build the override state from URL params
      const override = {};
      const fs = params.get('forceStain');
      if (fs) {
        if (fs.includes('+')) {
          override.palette = window.BiomEngine.mixPalettes(...fs.split('+').filter(Boolean));
        } else {
          override.palette = fs;
        }
      }
      if (params.get('forceMorph'))     override.morphology     = params.get('forceMorph');
      if (params.get('forceCells'))     override.cellCount      = parseInt(params.get('forceCells'), 10);
      if (params.get('forceLifecycle')) override.lifecycle      = params.get('forceLifecycle');
      if (params.get('forceReserve'))   override.reserveGranule = params.get('forceReserve');
      if (params.get('forceOrganelles')) override.organelles    = new Set(params.get('forceOrganelles').split(',').filter(Boolean));
      if (params.get('forcePhage')   === '1') override.phageAttached = true;
      if (params.get('forceEndo')    === '1') override.endosymbiont  = true;
      if (params.get('forceBiofilm') === '1') override.biofilmHalo   = true;

      const size = 1500;  // half-master resolution — matches Lab right-click save
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      window.BiomEngine.renderSpecimenToCanvas(canvas, seed, {
        specSize: size, state: override,
      });
      canvas.toBlob((blob) => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `BIOM-${seed}.png`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }, 'image/png');
    } catch (err) {
      console.warn('[download] mutated render failed:', err);
    }
  });
})();

// ============================================================
// Right-click → "Save as PNG" menu. Works on the bare preview page
// AND when preview.html is embedded as an iframe (the contextmenu
// fires on the iframe's document, so the handler must live here).
// We re-resolve URL force* params through BiomEngine.mixPalettes so
// the saved PNG matches what's on screen — including the multi-
// parent gradient palettes that the lab produces.
// ============================================================
(function setupSaveAsPng() {
  if (!_pfp || !window.BiomEngine || typeof window.BiomEngine.enableSaveAsPng !== 'function') return;
  // Read overrides from the URL so the snapshot matches the visible
  // render (forceStain for blended palettes, forceCells, etc.).
  const url = new URLSearchParams(window.location.search);
  function buildSnapshotState() {
    const out = {};
    const fs = url.get('forceStain');
    if (fs) {
      if (fs.includes('+')) {
        const parts = fs.split('+').filter(Boolean);
        out.palette = window.BiomEngine.mixPalettes(...parts);
      } else {
        out.palette = fs;
      }
    }
    const fm = url.get('forceMorph');     if (fm) out.morphology = fm;
    const fc = url.get('forceCells');     if (fc) out.cellCount  = parseInt(fc, 10);
    const fl = url.get('forceLifecycle'); if (fl) out.lifecycle = fl;
    const fr = url.get('forceReserve');   if (fr) out.reserveGranule = fr;
    const fo = url.get('forceOrganelles');
    if (fo) out.organelles = new Set(fo.split(',').filter(Boolean));
    if (url.has('forcePhage'))   out.phageAttached = url.get('forcePhage') === '1';
    if (url.has('forceEndo'))    out.endosymbiont  = url.get('forceEndo') === '1';
    if (url.has('forceBiofilm')) out.biofilmHalo   = url.get('forceBiofilm') === '1';
    return Object.keys(out).length ? out : null;
  }
  // R2 master URL — used when biom has no force* overrides. The R2
  // master IS the canonical render (3000×3000 glass-effect screenshot
  // from this very page), so save-as-PNG just downloads it directly.
  const padSeed = (n) => String(n).padStart(5, '0');
  function masterUrl(seed) {
    return `https://pngs.thebioms.com/preview/${padSeed(seed)}.png`;
  }
  function videoUrl(seed) {
    return `https://pngs.thebioms.com/video/${padSeed(seed)}.mp4`;
  }
  window.BiomEngine.enableSaveAsPng(_pfp, () => {
    const overrideState = buildSnapshotState();
    return {
      seed: state.seed,
      state: overrideState,
      // masterUrl + videoUrl are only valid when there are NO force*
      // overrides — the pre-rendered R2 assets reflect base state only.
      // Mutated bioms will (post-launch) re-render their MP4 via worker
      // Browser Rendering on burn; see worker.js handleVideo TODO.
      masterUrl: overrideState ? undefined : masterUrl(state.seed),
      videoUrl:  overrideState ? undefined : videoUrl(state.seed),
    };
  });
})();
</script>

</body>
</html>
