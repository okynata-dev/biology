<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  body{margin:0;background:#15110d;font:12px ui-monospace,Menlo,monospace;color:#cbb;padding:20px}
  h1{color:#eee;font:600 16px -apple-system,sans-serif;margin:4px 0 16px}
  .row{display:flex;gap:14px;flex-wrap:nowrap;margin-bottom:18px}
  .tile{width:200px}
  .card{width:200px;height:200px;border-radius:18px;overflow:hidden;background:#faf8f3;box-shadow:0 8px 22px rgba(0,0,0,.4)}
  iframe{width:200px;height:200px;border:0;display:block}
  .lab{text-align:center;margin-top:6px;color:#a99;letter-spacing:.04em}
</style></head><body>
<h1>New stains — seed 855 (top) &amp; 1654 (bottom)</h1>
<div id="root"></div>
<script>
  const PALS = ['malachite','congo_red','carbol_fuchsin','bismarck_brown','nile_blue','eosin','toluidine'];
  const SEEDS = [855, 1654];
  const root = document.getElementById('root');
  for (const seed of SEEDS){
    const row = document.createElement('div'); row.className='row';
    for (const p of PALS){
      const t = document.createElement('div'); t.className='tile';
      const c = document.createElement('div'); c.className='card';
      const f = document.createElement('iframe');
      f.src = `preview.html?seed=${seed}&forceStain=${p}&static=1&fit=1`;
      f.loading='eager'; f.scrolling='no';
      c.appendChild(f); t.appendChild(c);
      const l = document.createElement('div'); l.className='lab'; l.textContent=p;
      t.appendChild(l); row.appendChild(t);
    }
    root.appendChild(row);
  }
</script></body></html>
