<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve</title>
<meta name="description" content="Leave a wallet address to be counted before the Luoms mint.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
<link rel="icon" type="image/svg+xml" href="/favicon-dark.svg?v=3" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="/favicon.svg?v=3">
<link rel="canonical" href="https://thebioms.com/reserve">

<meta property="og:type" content="website">
<meta property="og:site_name" content="Luoms">
<meta property="og:title" content="Reserve a spot">
<meta property="og:description" content="Leave a wallet address to be counted before the Luoms mint.">
<meta property="og:url" content="https://thebioms.com/reserve">
<meta property="og:image" content="https://thebioms.com/og-luoms.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Luoms">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@theBioms">
<meta name="twitter:image" content="https://thebioms.com/og-luoms.jpg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --ink: #1a1712;
    --ink-2: #5f584d;
    --ink-3: #837b6e;
    --rule: rgba(26, 23, 18, 0.10);
    --chip: #f4f2ec;
    --ok: #2e7d4f;
    --err: #a4442c;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
    line-height: 1.5;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: rgba(26, 23, 18, 0.10); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; cursor: pointer; }
  a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: 6px; }

  .stage {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 32px 24px;
  }

  /* Living Luom — no card, no border. Just the organism on the page. */
  .organism {
    width: min(300px, 58vw);
    aspect-ratio: 1;
    position: relative;
    opacity: 0;
    animation: rise .9s cubic-bezier(.22,.8,.24,1) .15s forwards;
  }
  .organism iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0; display: block;
    opacity: 0; transition: opacity 1.2s ease;
  }
  .organism iframe.on { opacity: 1; }

  h1 {
    margin-top: clamp(6px, 2vh, 20px);
    font-size: clamp(46px, 7vw, 88px);
    font-weight: 600;
    letter-spacing: -0.045em;
    line-height: .95;
    opacity: 0;
    animation: rise .9s cubic-bezier(.22,.8,.24,1) .3s forwards;
  }
  .sub {
    margin-top: 16px;
    max-width: 400px;
    color: var(--ink-2);
    font-size: 16px;
    text-wrap: balance;
    opacity: 0;
    animation: rise .9s cubic-bezier(.22,.8,.24,1) .42s forwards;
  }

  /* One pill: input and button live inside the same rounded container. */
  .pill {
    display: flex; align-items: center;
    width: min(520px, 100%);
    margin-top: clamp(28px, 5vh, 44px);
    padding: 6px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: var(--chip);
    transition: border-color .2s, background .2s, box-shadow .2s;
    opacity: 0;
    animation: rise .9s cubic-bezier(.22,.8,.24,1) .54s forwards;
  }
  .pill:focus-within {
    border-color: rgba(26,23,18,.28);
    background: #fff;
    box-shadow: 0 10px 40px rgba(26,23,18,.08);
  }
  .pill input {
    flex: 1; min-width: 0;
    border: 0; background: transparent;
    padding: 11px 12px 11px 18px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 14px;
    color: var(--ink);
  }
  .pill input:focus { outline: none; }
  .pill input::placeholder { color: var(--ink-3); font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; }
  .pill button {
    flex: none;
    padding: 11px 22px;
    border: 0; border-radius: 999px;
    background: var(--ink); color: #fff;
    font-size: 14.5px; font-weight: 500;
    transition: opacity .2s, transform .12s;
  }
  .pill button:hover { opacity: .85; }
  .pill button:active { transform: scale(.97); }
  .pill button[disabled] { opacity: .5; cursor: default; }
  @media (max-width: 480px) {
    .pill { flex-direction: column; padding: 8px; border-radius: 24px; gap: 8px; }
    .pill input { width: 100%; text-align: center; padding: 10px 8px; }
    .pill button { width: 100%; padding: 12px; }
  }

  .status {
    margin-top: 16px;
    font-size: 14px;
    min-height: 21px;
    color: var(--ink-2);
    transition: opacity .3s;
  }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }

  .foot {
    margin-top: clamp(28px, 6vh, 52px);
    font-size: 13px;
    color: var(--ink-3);
    opacity: 0;
    animation: rise .9s cubic-bezier(.22,.8,.24,1) .66s forwards;
  }
  .foot a { color: var(--ink-2); border-bottom: 1px solid var(--rule); transition: color .15s, border-color .15s; }
  .foot a:hover { color: var(--ink); border-color: var(--ink); }
  .foot .dot { margin: 0 8px; opacity: .5; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .organism, h1, .sub, .pill, .foot { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<main class="stage">
  <div class="organism" aria-hidden="true">
    <iframe id="vframe" title="A living Luom" loading="eager"></iframe>
  </div>

  <h1>Reserve a spot.</h1>
  <p class="sub">The mint opens July 17. Bioms holders go first, this list goes second.</p>

  <form id="rform" class="pill" novalidate>
    <input id="addr" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="0x address or ENS name" aria-label="Wallet address or ENS name">
    <button id="rbtn" type="submit">Count me in</button>
  </form>
  <p class="status" id="rstatus" role="status" aria-live="polite"></p>

  <p class="foot">
    <a href="/luoms">Luoms</a><span class="dot">·</span>500 organisms in glass<span class="dot">·</span><a href="https://opensea.io/collection/luoms/overview" target="_blank" rel="noopener">OpenSea</a>
  </p>
</main>

<script>
(function(){
  // A living Luom above the heading — random pick from a curated calm set.
  var IDS = [13, 18, 44, 134, 135, 140, 171, 230, 357];
  var id = IDS[Math.floor(Math.random() * IDS.length)];
  var f = document.getElementById('vframe');
  f.addEventListener('load', function(){ f.classList.add('on'); });
  f.src = '/glass-500.html?id=' + id + '&token=1&full=1&flat=1&z=1.16';

  var form = document.getElementById('rform');
  var input = document.getElementById('addr');
  var btn = document.getElementById('rbtn');
  var status = document.getElementById('rstatus');

  function setStatus(msg, cls){
    status.textContent = msg;
    status.className = 'status' + (cls ? ' ' + cls : '');
  }

  var MSG = {
    bad_address: 'That does not look like an address or ENS name.',
    ens_unresolvable: 'That ENS name does not resolve to an address.',
    rate_limited: 'Too many signups from this connection. Try again later.',
    waitlist_closed: 'The list is closed.',
    value_too_long: 'That does not look like an address.',
    bad_value: 'That does not look like an address.'
  };

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var v = (input.value || '').trim();
    if (!v) { setStatus('Enter a wallet address or ENS name.', 'err'); input.focus(); return; }
    btn.disabled = true;
    setStatus('Checking…');
    fetch('https://api.thebioms.com/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kind: 'address', value: v })
    }).then(function(r){ return r.json().then(function(j){ return { s: r.status, j: j }; }); })
      .then(function(res){
        if (res.j && res.j.ok) {
          if (res.j.already_in_list) {
            setStatus('Already on the list. You are counted.', 'ok');
          } else {
            setStatus('Done. You are on the list.', 'ok');
            input.value = '';
          }
        } else {
          var code = res.j && res.j.error;
          setStatus(MSG[code] || 'Something went wrong. Try again.', 'err');
        }
      })
      .catch(function(){ setStatus('Network error. Try again.', 'err'); })
      .finally(function(){ btn.disabled = false; });
  });
})();
</script>

</body>
</html>
