<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve</title>
<meta name="description" content="Leave a wallet address to be counted before the Luoms mint.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
<link rel="icon" type="image/svg+xml" href="/favicon-dark.svg?v=3" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="/favicon.svg?v=3">
<link rel="canonical" href="https://thebioms.com/reserve">

<meta property="og:type" content="website">
<meta property="og:site_name" content="Luoms">
<meta property="og:title" content="Reserve a spot">
<meta property="og:description" content="Leave a wallet address to be counted before the Luoms mint.">
<meta property="og:url" content="https://thebioms.com/reserve">
<meta property="og:image" content="https://thebioms.com/og-luoms.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Luoms">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@theBioms">
<meta name="twitter:image" content="https://thebioms.com/og-luoms.jpg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --ink: #1a1712;
    --ink-2: #5f584d;
    --ink-3: #837b6e;
    --rule: rgba(26, 23, 18, 0.10);
    --chip: #f4f2ec;
    --ok: #2e7d4f;
    --err: #a4442c;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
    line-height: 1.5;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: rgba(26, 23, 18, 0.10); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; cursor: pointer; }
  a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; border-radius: 6px; }

  .stage {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 24px;
  }
  h1 {
    font-size: clamp(44px, 7vw, 84px);
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: .95;
  }
  .form-row {
    display: flex; gap: 10px;
    width: min(560px, 100%);
    margin-top: clamp(30px, 5vh, 48px);
  }
  @media (max-width: 520px){ .form-row{ flex-direction: column; } }
  .addr-input {
    flex: 1; min-width: 0;
    padding: 15px 20px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: var(--chip);
    font-family: ui-monospace,"SF Mono",Menlo,monospace;
    font-size: 14px;
    color: var(--ink);
    text-align: center;
    transition: border-color .15s, background .15s;
  }
  .addr-input::placeholder { color: var(--ink-3); font-family: -apple-system,"SF Pro Text",system-ui,sans-serif; }
  .addr-input:focus { outline: none; border-color: var(--ink-3); background: #fff; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 14px 28px; border-radius: 999px;
    background: var(--ink); color: #fff;
    font-size: 15px; font-weight: 500;
    border: 1px solid var(--ink);
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.98); }
  .btn[disabled] { opacity: .5; cursor: default; }
  .status { margin-top: 16px; font-size: 14px; min-height: 21px; color: var(--ink-2); }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }
</style>
</head>
<body>

<main class="stage">
  <h1>Reserve a spot.</h1>
  <form id="rform" class="form-row" novalidate>
    <input class="addr-input" id="addr" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="0x address or ENS name" aria-label="Wallet address or ENS name">
    <button class="btn" id="rbtn" type="submit">Count me in</button>
  </form>
  <p class="status" id="rstatus" role="status" aria-live="polite"></p>
</main>

<script>
(function(){
  var form = document.getElementById('rform');
  var input = document.getElementById('addr');
  var btn = document.getElementById('rbtn');
  var status = document.getElementById('rstatus');

  function setStatus(msg, cls){
    status.textContent = msg;
    status.className = 'status' + (cls ? ' ' + cls : '');
  }

  var MSG = {
    bad_address: 'That does not look like an address or ENS name.',
    ens_unresolvable: 'That ENS name does not resolve to an address.',
    rate_limited: 'Too many signups from this connection. Try again later.',
    waitlist_closed: 'The list is closed.',
    value_too_long: 'That does not look like an address.',
    bad_value: 'That does not look like an address.'
  };

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var v = (input.value || '').trim();
    if (!v) { setStatus('Enter a wallet address or ENS name.', 'err'); input.focus(); return; }
    btn.disabled = true;
    setStatus('Checking…');
    fetch('https://api.thebioms.com/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kind: 'address', value: v })
    }).then(function(r){ return r.json().then(function(j){ return { s: r.status, j: j }; }); })
      .then(function(res){
        if (res.j && res.j.ok) {
          if (res.j.already_in_list) {
            setStatus('Already on the list. You are counted.', 'ok');
          } else {
            setStatus('Done. You are on the list.', 'ok');
            input.value = '';
          }
        } else {
          var code = res.j && res.j.error;
          setStatus(MSG[code] || 'Something went wrong. Try again.', 'err');
        }
      })
      .catch(function(){ setStatus('Network error. Try again.', 'err'); })
      .finally(function(){ btn.disabled = false; });
  });
})();
</script>

</body>
</html>
