# Re-render every master after the one-time evolution event.
#
# Fires on repository_dispatch (event_type: evolve-rerender) sent by the
# worker's /api/admin/evolve apply step, or manually via workflow_dispatch.
# Loops the existing admin regen endpoint for every minted token — which
# re-renders the master from the now-evolved token_state and refreshes
# OpenSea metadata. Sequential with a small gap so Browser Rendering and
# the OpenSea refresh aren't hammered.
#
# Requires repo secret ADMIN_TOKEN (same value as the worker's ADMIN_TOKEN
# secret). Add it before firing: Settings -> Secrets and variables ->
# Actions -> New repository secret.

name: Evolve re-render

on:
  repository_dispatch:
    types: [evolve-rerender]
  workflow_dispatch:
    inputs:
      ceiling:
        description: 'Highest token id to re-render (minted count).'
        default: '165'
        type: string
      ids:
        description: 'Optional comma-separated id list — re-render only these (overrides ceiling).'
        default: ''
        type: string

concurrency:
  group: evolve-rerender
  cancel-in-progress: false

jobs:
  rerender:
    runs-on: ubuntu-latest
    steps:
      - name: Re-render masters via admin regen
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          ids="${{ github.event.client_payload.ids || github.event.inputs.ids || '' }}"
          ceiling="${{ github.event.client_payload.ceiling || github.event.inputs.ceiling || '165' }}"
          if [ -z "$ADMIN_TOKEN" ]; then echo "ADMIN_TOKEN secret not set"; exit 1; fi
          if [ -n "$ids" ]; then
            list=$(echo "$ids" | tr ',' ' ')
            echo "Re-rendering specific ids: $list"
          else
            list=$(seq 1 "$ceiling")
            echo "Re-rendering masters 1..$ceiling"
          fi
          ok=0; fail=0
          for id in $list; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://api.thebioms.com/api/admin/regen/$id" \
              -H "x-admin-token: $ADMIN_TOKEN")
            if [ "$code" = "200" ]; then ok=$((ok+1)); else fail=$((fail+1)); echo "  #$id -> $code"; fi
            sleep 1.5
          done
          echo "Done. ok=$ok fail=$fail"
