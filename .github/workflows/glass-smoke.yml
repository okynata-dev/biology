# Smoke test: render a few glass loop mp4s on a GPU-less Ubuntu runner to
# check (a) software WebGL (SwiftShader) renders the transmission glass
# correctly, and (b) how long one token takes → how many chunks the full
# run needs. Uploads the clips as an artifact (no R2 secrets required).
#
# Trigger: Actions tab -> "Glass loops (smoke)" -> Run workflow -> download
# the "glass-smoke" artifact and eyeball the mp4s.

name: Glass loops (smoke)

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'Token ids to render (comma-separated).'
        default: '1,25,46,250,500'
        type: string
      size:
        description: 'Square px.'
        default: '1600'
        type: string
      fps:
        description: 'Output fps.'
        default: '18'
        type: string
      crf:
        description: 'x264 CRF (lower = bigger/better).'
        default: '21'
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Render (timed)
        run: |
          start=$(date +%s)
          python scripts/make-glass-loops.py \
            --only "${{ github.event.inputs.ids }}" \
            --res ${{ github.event.inputs.size }} \
            --fps ${{ github.event.inputs.fps }} \
            --crf ${{ github.event.inputs.crf }}
          end=$(date +%s)
          n=$(ls loops/glass-*.mp4 2>/dev/null | wc -l)
          echo "----"
          echo "rendered $n token(s) in $((end-start))s  (~$(( (end-start) / (n>0?n:1) ))s / token)"
          ls -lh loops/
      - uses: actions/upload-artifact@v4
        with:
          name: glass-smoke
          path: loops/*.mp4
          retention-days: 7
