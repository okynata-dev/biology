# Re-render transparent cutouts for the evolved colony (Banner Maker).
#
# make-cutouts.py --mutated bakes each seed's evolved state into the
# transparent PNG/WebP the /make collage uses. Chunked; uploads to R2.
# Reuses CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID repo secrets.

name: Evolve cutouts

on:
  repository_dispatch:
    types: [evolve-cutouts]
  workflow_dispatch:
    inputs:
      chunks:
        description: 'Parallel chunks (1-20).'
        default: '10'
        type: string
      ceiling:
        description: 'Highest token id (minted count).'
        default: '165'
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          n="${{ github.event.inputs.chunks || '10' }}"
          matrix=$(python3 -c "import json; n=int('$n'); print(json.dumps({'include':[{'chunk':i,'total':n} for i in range(n)]}))")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  render:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install Playwright + Pillow + certifi
        run: |
          pip install playwright pillow certifi
          python -m playwright install --with-deps chromium
      - name: Install wrangler
        run: npm install -g wrangler@4
      - name: Compute seeds for this chunk
        id: seeds
        run: |
          chunk=${{ matrix.chunk }}; total=${{ matrix.total }}
          ceiling="${{ github.event.client_payload.ceiling || github.event.inputs.ceiling || '165' }}"
          read seeds <<< "$(python3 -c "
          chunk, total, hi = $chunk, $total, $ceiling + 1
          n = hi - 1
          per = (n + total - 1) // total
          s = 1 + chunk * per
          e = min(s + per, hi)
          print(','.join(str(i) for i in range(s, e)))
          ")"
          echo "seeds=$seeds" >> "$GITHUB_OUTPUT"
      - name: Render mutated cutouts
        run: |
          mkdir -p pngs/cutout
          [ -z "${{ steps.seeds.outputs.seeds }}" ] && { echo "empty chunk"; exit 0; }
          python scripts/make-cutouts.py --only "${{ steps.seeds.outputs.seeds }}" --mutated --workers 3
          ls pngs/cutout/ | wc -l
      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in pngs/cutout/*.webp; do
            [ -e "$f" ] || continue
            id=$(basename "$f" .webp)
            wrangler r2 object put "bioms-pngs/cutout/${id}.webp" --file "$f" --content-type image/webp --remote >/dev/null 2>&1 || echo "  ${id}.webp failed"
          done
          for f in pngs/cutout/*.png; do
            [ -e "$f" ] || continue
            id=$(basename "$f" .png)
            wrangler r2 object put "bioms-pngs/cutout/${id}.png" --file "$f" --content-type image/png --remote >/dev/null 2>&1 || echo "  ${id}.png failed"
          done
          echo "chunk uploaded"
