# Re-derive thumbnails from the evolved masters.
#
# Thumbs are just downsized masters (pngs/thumb/<id>.webp ← pngs/preview/
# <id>.webp). After the evolution event re-renders the masters in R2
# (evolve-rerender.yml), run this to pull each evolved master, resize it,
# and re-upload the thumb — so the gallery, activity feed, and Lab picker
# show the evolved art, not the pre-event thumbs.
#
# Run AFTER evolve-rerender finishes. Reuses the CLOUDFLARE_API_TOKEN /
# CLOUDFLARE_ACCOUNT_ID repo secrets (same ones render-videos.yml uses).

name: Evolve thumbs

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'Comma list of token ids to re-thumb (e.g. 32,39,81). Empty = all 1..ceiling.'
        default: ''
        type: string
      ceiling:
        description: 'Highest token id to re-thumb (minted count). Ignored when ids is set.'
        default: '165'
        type: string
      size:
        description: 'Thumb size px (square).'
        default: '600'
        type: string

concurrency:
  group: evolve-thumbs
  cancel-in-progress: false

jobs:
  thumbs:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python + Pillow
        run: pip install pillow

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Re-derive and upload thumbs from evolved masters
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ceiling="${{ github.event.inputs.ceiling || '165' }}"
          size="${{ github.event.inputs.size || '600' }}"
          ids="${{ github.event.inputs.ids || '' }}"
          # Build the id list: explicit comma list, or 1..ceiling.
          if [ -n "$ids" ]; then
            list=$(echo "$ids" | tr ',' ' ')
          else
            list=$(seq 1 "$ceiling")
          fi
          mkdir -p masters out
          # Pull each master DIRECTLY FROM R2 ORIGIN (wrangler), never via the
          # pngs.thebioms.com edge. The edge ignores the query string in its
          # cache key, so a ?v= cache-bust does nothing — a re-derive run after
          # a master re-render would silently downsize the STALE edge-cached
          # master. This bit the 5 collision-fix tokens on 2026-06-15; reading
          # the origin is the only reliable source.
          for i in $list; do
            p=$(printf "%05d" "$i")
            wrangler r2 object get "bioms-pngs/preview/${p}.webp" --file "masters/${p}.webp" --remote >/dev/null 2>&1 \
              || echo "  master ${p} fetch failed"
          done
          python3 - "$size" <<'PY'
          import sys, glob, os
          from PIL import Image
          size = int(sys.argv[1])
          ok = 0; miss = 0
          for path in sorted(glob.glob("masters/*.webp")):
              p = os.path.splitext(os.path.basename(path))[0]
              try:
                  im = Image.open(path).convert("RGBA")
                  im.thumbnail((size, size), Image.LANCZOS)
                  im.save(f"out/{p}.webp", "WEBP", quality=82, method=6)
                  im.convert("RGB").save(f"out/{p}.png", "PNG")
                  ok += 1
              except Exception as e:
                  miss += 1
                  print(f"  #{p}: {e}")
          print(f"derived ok={ok} miss={miss}")
          PY
          echo "Uploading thumbs to R2…"
          for f in out/*.webp; do
            id=$(basename "$f" .webp)
            wrangler r2 object put "bioms-pngs/thumb/${id}.webp" --file "$f" --content-type image/webp --remote >/dev/null 2>&1 || echo "  webp ${id} upload failed"
            wrangler r2 object put "bioms-pngs/thumb/${id}.png" --file "out/${id}.png" --content-type image/png --remote >/dev/null 2>&1 || echo "  png ${id} upload failed"
          done
          echo "Done. NOTE: thumbs are served via the pngs.thebioms.com edge"
          echo "(max-age 14400). Purge the changed thumb URLs to show them now,"
          echo "or wait out the 4h TTL."
