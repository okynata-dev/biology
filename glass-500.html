<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">

<link rel="apple-touch-icon" href="/favicon.svg?v=3">
<style>
  :root{ --bg:#ffffff; --ink:#1a1712; --ink2:#6b645a; }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,"SF Pro Text","Inter",system-ui,sans-serif;overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;}
  .tag{position:fixed;top:calc(14px + env(safe-area-inset-top));left:0;right:0;text-align:center;font-size:10px;letter-spacing:.22em;color:var(--ink2);text-transform:uppercase;}
  .panel{position:fixed;top:calc(40px + env(safe-area-inset-top));left:16px;font-size:11px;line-height:1.7;color:var(--ink);background:rgba(255,255,255,.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(26,23,18,.1);border-radius:12px;padding:12px 14px;min-width:176px;}
  .panel b{color:var(--ink2);font-weight:400;text-transform:uppercase;letter-spacing:.06em;font-size:9px;display:inline-block;width:74px;}
  .panel .tier{font-size:12px;letter-spacing:.1em;margin-top:6px;}
  .hud{position:fixed;left:0;right:0;bottom:0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;gap:14px;}
  .nav{width:44px;height:44px;border-radius:50%;border:1px solid rgba(26,23,18,.18);background:rgba(255,255,255,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:var(--ink);font-size:19px;line-height:42px;text-align:center;cursor:pointer;}
  .nav:active{transform:scale(.9);}
  .meta{min-width:120px;text-align:center;}
  .meta input{width:64px;background:transparent;border:0;border-bottom:1px solid rgba(26,23,18,.25);color:var(--ink);font:inherit;font-size:14px;text-align:center;}
  .meta .of{font-size:11px;color:var(--ink2);}
  .btn{position:fixed;cursor:pointer;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);background:rgba(255,255,255,.4);border:1px solid rgba(26,23,18,.1);border-radius:20px;padding:8px 12px;backdrop-filter:blur(6px);}
  #rand{top:calc(40px + env(safe-area-inset-top));right:16px;}
  #stats{top:calc(82px + env(safe-area-inset-top));right:16px;}
  .sheet{position:fixed;inset:0;background:rgba(255,255,255,.96);backdrop-filter:blur(4px);overflow:auto;padding:34px 22px 60px;display:none;}
  .sheet.on{display:block;}
  .sheet h2{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink2);margin:18px 0 8px;}
  .sheet h1{font-size:13px;letter-spacing:.2em;text-transform:uppercase;}
  .bar{display:flex;align-items:center;gap:8px;font-size:11px;margin:3px 0;}
  .bar .lbl{width:120px;}.bar .track{flex:1;height:8px;background:rgba(26,23,18,.08);border-radius:5px;overflow:hidden;}
  .bar .fill{height:100%;background:var(--ink);opacity:.55;}.bar .n{width:54px;text-align:right;color:var(--ink2);}
  .close{position:fixed;top:18px;right:18px;font-size:22px;cursor:pointer;}
  .load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:12px;letter-spacing:.18em;}
  /* token mode (animation_url): just the biom, nothing else */
  body.bare .tag,body.bare .panel,body.bare .hud,body.bare .btn,body.bare .sheet{display:none!important;}
</style>

<body>
<canvas id="c"></canvas>
<div class="tag">luoms · 500</div>
<div class="panel" id="traits"></div>

<div class="hud">
  <div class="nav" id="prev">‹</div>
  <div class="meta"><input id="jump" type="number" min="1" max="500" value="1"> <span class="of">/ 500</span></div>
  <div class="nav" id="next">›</div>
</div>
<div class="sheet" id="sheet"><div class="close" id="close">×</div><h1>Trait distribution · 500</h1><div id="dist"></div></div>
<div class="load" id="load">loading glass…</div>

<script type="importmap">{ "imports": { "three": "/vendor/three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';
const TOTAL=500;
function mb(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function wpick(rng,tab){let s=0;for(const[,w]of tab)s+=w;let r=rng()*s;for(const[v,w]of tab){if((r-=w)<0)return v;}return tab[0][0];}

// ---------- TRAITS ----------
const T={
  form:[['Coccus',16],['Morula',12],['Bacilli',12],['Staphylo',11],['Strepto',10],['Acanthar',10],['Nassella',9],['Lattice',8],['Coral',7],['Discus',5]],
  surface:[['Smooth',38],['Bumpy',26],['Porous',20],['Ribbed',16]],
  spines:[['None',50],['Few',28],['Crown',16],['Halo',6]],
  appendage:[['None',42],['Cilia',22],['Flagella',16],['Tendrils',13],['Pods',7]],
  pattern:[['Solid',50],['Gradient',26],['Duotone',15],['Marble',9]],
  shells:[['1',62],['2',28],['3',10]],
  stain:[['nile_blue',15],['congo_red',14],['malachite',13],['eosin',12],['safranin',11],['methylene',10],['fuchsia',8],['gold',6],['plasma',4],['aurora',4],['void',2],['iridescent',1]],
  irid:[['None',26],['Faint',38],['Vivid',26],['Spectral',10]],
  nucleus:[['Single',48],['Cluster',26],['Hollow',15],['Golden',8],['Living',3]],
  anomaly:[['None',89],['Twin',3],['Supernova',2],['Spectral core',2],['Frost',2],['Albino',2]],
  light:[['Studio',34],['Dawn',24],['Boreal',20],['Duo',16],['Eclipse',6]],
};
// vivid, saturated glass hues
const TINT={nile_blue:0x1f8ae0,congo_red:0xff4f22,malachite:0x06cf8c,eosin:0xff5f52,safranin:0xff5f97,methylene:0x4458f0,fuchsia:0xff3fd0,gold:0xffba2e,plasma:0xa64bff,aurora:0x2fe6c4,void:0x141d3a,iridescent:0xaee6ee};
// hand-picked accent companions per stain (light kin / deep kin / contrast pop)
const ACC={nile_blue:[0x9fe8ff,0x0a3f9e,0xff9a3d],congo_red:[0xffd27a,0x8c1000,0x3aa0ff],
  malachite:[0xd8ffe8,0x036f4d,0xffd23f],eosin:[0xffe0d0,0xa11414,0x7f7fff],
  safranin:[0xffd5e8,0xb01050,0x35d8c0],methylene:[0xa8c4ff,0x101d8a,0xff7ac8],
  fuchsia:[0xffc4ee,0x8f0f78,0x40e0d0],gold:[0xfff0b0,0xa06000,0x9040ff],
  plasma:[0xe0c0ff,0x5a0dc0,0x2fe6c4],aurora:[0xccfff2,0x0a8f78,0xff5f97],
  void:[0x3a4a8a,0x0a0e20,0x8f6fff],iridescent:[0xffffff,0x88c8d8,0xffb0e0]};
const RARE=new Set(['3','Lattice','Coral','Discus','Crown','Halo','gold','plasma','aurora','void','iridescent','Spectral','Golden','Living','Flagella','Tendrils','Pods','Marble','Eclipse']);

function traitsFor(id){
  const r=mb(((id*2654435761)>>>0)^0x9e37);
  const t={form:wpick(r,T.form),surface:wpick(r,T.surface),spines:wpick(r,T.spines),shells:wpick(r,T.shells),
    appendage:wpick(r,T.appendage),pattern:wpick(r,T.pattern),
    stain:wpick(r,T.stain),irid:wpick(r,T.irid),nucleus:wpick(r,T.nucleus),anomaly:wpick(r,T.anomaly),_r:r};
  t.light=wpick(r,T.light);
  if(t.form==='Acanthar'&&t.spines==='None')t.spines='Crown';
  if(t.anomaly==='Supernova')t.spines='Halo';
  if(t.anomaly==='Spectral core')t.irid='Spectral';
  if(t.anomaly==='Albino')t.stain='iridescent';
  // colours: base = stain; accent = a curated companion (kin or pop), always set
  t.patA=TINT[t.stain];
  t.patB=ACC[t.stain][(r()*ACC[t.stain].length)|0];
  let sc=0;for(const k of['shells','spines','appendage','pattern','stain','irid','nucleus','form','light'])if(RARE.has(t[k]))sc++;
  if(t.anomaly!=='None')sc+=2;
  t.tier=sc>=4?'Mythic':sc===3?'Epic':sc===2?'Rare':sc===1?'Uncommon':'Common';
  return t;
}

// ---------- renderer ----------
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.12;renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
// white with a whisper of a vignette, baked into the canvas so captures keep it
function makeBgTex(){const s=1024,cv=document.createElement('canvas');cv.width=cv.height=s;const g=cv.getContext('2d');
  g.fillStyle='#ffffff';g.fillRect(0,0,s,s);
  const rg=g.createRadialGradient(s/2,s*0.47,s*0.28,s/2,s*0.5,s*0.78);
  rg.addColorStop(0,'rgba(255,255,255,0)');rg.addColorStop(1,'rgba(214,209,198,0.42)');
  g.fillStyle=rg;g.fillRect(0,0,s,s);return new THREE.CanvasTexture(cv);}
// ?flat=1 — TRUE white background for seamless embeds on white pages.
// A texture background goes through ACES tone mapping (white lands ~#eaeaea);
// a plain Color background is a clear-color, which skips tone mapping.
scene.background=new URLSearchParams(location.search).has('flat')
  ? new THREE.Color(0xffffff) : makeBgTex();
const camera=new THREE.PerspectiveCamera(34,1,0.1,100);camera.position.set(0,0,7.6);

function makeEnv(){
  const s=512,cv=document.createElement('canvas');cv.width=cv.height=s;const g=cv.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,s);grd.addColorStop(0,'#ffffff');grd.addColorStop(.45,'#f3efe6');grd.addColorStop(.5,'#ece9e0');grd.addColorStop(1,'#bdb8aa');
  g.fillStyle=grd;g.fillRect(0,0,s,s);
  for(const[x,y,rr,a]of[[.3,.26,.24,1],[.74,.4,.16,.7],[.5,.84,.32,.5]]){const rg=g.createRadialGradient(x*s,y*s,0,x*s,y*s,rr*s);rg.addColorStop(0,`rgba(255,255,255,${a})`);rg.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=rg;g.fillRect(0,0,s,s);}
  const tex=new THREE.CanvasTexture(cv);tex.mapping=THREE.EquirectangularReflectionMapping;
  const p=new THREE.PMREMGenerator(renderer);const env=p.fromEquirectangular(tex).texture;tex.dispose();p.dispose();return env;
}
const envMap=makeEnv();scene.environment=envMap;
const keyL=new THREE.DirectionalLight(0xffffff,1.0);keyL.position.set(3,4,5);scene.add(keyL);
const tintL=new THREE.PointLight(0xffffff,40,40);tintL.position.set(-3.5,1,3);scene.add(tintL);   // colored, per-token
const rimL=new THREE.PointLight(0xffffff,0,40);rimL.position.set(3.5,-1,3);scene.add(rimL);      // second rim, used by some scenarios
const fillL=new THREE.DirectionalLight(0xffffff,0.5);fillL.position.set(-4,-3,-2);scene.add(fillL);
scene.add(new THREE.AmbientLight(0xffffff,0.22));

// lighting scenarios — a trait, so the set has moods instead of one studio preset
const LIGHTS={
  Studio:t=>{keyL.color.set(0xffffff);keyL.intensity=1.0;keyL.position.set(3,4,5);
    fillL.color.set(0xffffff);fillL.intensity=0.5;
    tintL.color.set(TINT[t.stain]);tintL.intensity=t.stain==='void'?60:42;tintL.position.set(-3.5,1,3);rimL.intensity=0;},
  Dawn:t=>{keyL.color.set(0xffdfba);keyL.intensity=1.2;keyL.position.set(4.5,2.2,3.5);
    fillL.color.set(0xbfccff);fillL.intensity=0.4;
    tintL.color.set(TINT[t.stain]);tintL.intensity=34;tintL.position.set(-4,0.5,2.5);rimL.intensity=0;},
  Boreal:t=>{keyL.color.set(0xffffff);keyL.intensity=0.8;keyL.position.set(2.5,4.5,4.5);
    fillL.color.set(0xdfe8ff);fillL.intensity=0.3;
    tintL.color.set(0x9fd2ff);tintL.intensity=50;tintL.position.set(-4,2.4,1.5);
    rimL.color.set(TINT[t.stain]);rimL.intensity=26;rimL.position.set(4,-2,2);},
  Duo:t=>{keyL.color.set(0xffffff);keyL.intensity=0.75;keyL.position.set(0,5,5);
    fillL.color.set(0xffffff);fillL.intensity=0.25;
    tintL.color.set(TINT[t.stain]);tintL.intensity=52;tintL.position.set(-4.4,1.2,2.6);
    rimL.color.set(t.patB);rimL.intensity=48;rimL.position.set(4.4,-0.8,2.6);},
  Eclipse:t=>{keyL.color.set(0xffffff);keyL.intensity=0.5;keyL.position.set(0,2,6);
    fillL.color.set(0xffffff);fillL.intensity=0.15;
    tintL.color.set(TINT[t.stain]);tintL.intensity=30;tintL.position.set(-3,1,3);
    rimL.color.set(0xffffff);rimL.intensity=90;rimL.position.set(0,1.5,-5);},
};

// ---------- surface bump textures ----------
// every biom now carries a fine frosted grain; the surface trait layers its own
// pattern on top of that base.
const bumpCache={};
function bumpTex(type){
  if(bumpCache[type])return bumpCache[type];
  const s=512,cv=document.createElement('canvas');cv.width=cv.height=s;const g=cv.getContext('2d');
  g.fillStyle='#808080';g.fillRect(0,0,s,s);
  // base, on EVERY biom: fine grain + light mottled pitting → the frosted "shershavy" surface
  const img=g.getImageData(0,0,s,s),d=img.data;
  for(let i=0;i<d.length;i+=4){const v=128+(Math.random()*2-1)*64;d[i]=d[i+1]=d[i+2]=v;}
  g.putImageData(img,0,0);
  for(let i=0;i<320;i++){const x=Math.random()*s,y=Math.random()*s,rr=2+Math.random()*4;g.fillStyle=Math.random()<0.5?'rgba(40,40,40,0.7)':'rgba(235,235,235,0.7)';g.beginPath();g.arc(x,y,rr,0,7);g.fill();}
  if(type==='Bumpy'){for(let i=0;i<260;i++){const x=Math.random()*s,y=Math.random()*s,rr=6+Math.random()*10;const rg=g.createRadialGradient(x,y,0,x,y,rr);rg.addColorStop(0,'#fff');rg.addColorStop(1,'rgba(128,128,128,0)');g.fillStyle=rg;g.beginPath();g.arc(x,y,rr,0,7);g.fill();}}
  else if(type==='Porous'){g.fillStyle='#1a1a1a';for(let i=0;i<420;i++){g.beginPath();g.arc(Math.random()*s,Math.random()*s,3+Math.random()*5,0,7);g.fill();}}
  else if(type==='Ribbed'){g.fillStyle='#1a1a1a';for(let x=0;x<s;x+=16)g.fillRect(x,0,7,s);}
  const tex=new THREE.CanvasTexture(cv);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(3,3);bumpCache[type]=tex;return tex;
}

function fib(i,n){const phi=Math.acos(1-2*(i+0.5)/n),th=Math.PI*(1+Math.sqrt(5))*(i+0.5);return new THREE.Vector3(Math.sin(phi)*Math.cos(th),Math.cos(phi),Math.sin(phi)*Math.sin(th));}

const uTime={value:0}; // shared clock driving the living motion in every shader
// perfect-loop clock: everything periodic uses whole cycles per LOOP seconds,
// so t=0 and t=LOOP render identically → seamless mp4 loops.
const LOOP=6, W=2*Math.PI/LOOP; const uW={value:W};  // 6s cycle — calm rock, tight clip

const PAT={Solid:0,Gradient:1,Duotone:2,Stripes:3,Dots:4,Marble:5};

// living wave for every body; `pat` (on accent-overlay meshes only) also cuts
// the mesh down to the pattern's shape via discard, so an accent-coloured glass
// layer shows through only as dots / stripes / halves / ombre / marble.
function animate(m,thin,pat){
  m.onBeforeCompile=(sh)=>{
    sh.uniforms.uTime=uTime;sh.uniforms.uW=uW;sh.uniforms.uBody={value:thin?0.0:1.0};sh.uniforms.uTip={value:thin?0.10:0.05};
    sh.vertexShader='uniform float uTime;uniform float uW;uniform float uBody;uniform float uTip;varying vec3 vOP;\n'+
      sh.vertexShader.replace('#include <begin_vertex>',
        '#include <begin_vertex>\nvOP=position;\n'+
        'float A=uTime*uW;float dd=length(position);float ww=smoothstep(0.5,1.8,dd);\n'+
        'transformed.x+=sin(A+dd*2.2)*uTip*ww;transformed.z+=cos(A+dd*2.2)*uTip*ww;\n'+
        'transformed+=normal*sin(A*2.0+position.y*3.0)*0.02*uBody;');
    if(pat){
      sh.uniforms.uPat={value:pat};
      sh.fragmentShader='uniform int uPat;varying vec3 vOP;\n'+
        'float nz(vec3 p){return fract(sin(dot(p,vec3(12.99,78.23,37.71)))*43758.5453);}\n'+
        sh.fragmentShader.replace('#include <clipping_planes_fragment>',
          '#include <clipping_planes_fragment>\n'+
          'vec3 pp=vOP/1.6;float keep=1.0;\n'+
          'if(uPat==1){keep=step(pp.y,0.06*sin(pp.x*4.0+pp.z*3.0)+0.02);}\n'+                           // gradient: liquid fill w/ wavy meniscus
          'else if(uPat==2){keep=smoothstep(-0.05,0.05,pp.x*0.8+pp.y*0.4);}\n'+                          // duotone half
          'else if(uPat==3){keep=step(0.5,fract(pp.y*3.2));}\n'+                                          // stripes
          'else if(uPat==4){vec3 gg=fract(pp*2.3)-0.5;keep=step(length(gg),0.3);}\n'+                    // dots
          'else{keep=step(0.78,abs(sin(pp.x*5.0+sin(pp.y*4.0)*1.6+sin(pp.z*3.0)*1.3)));}\n'+            // marble: curved veins
          'if(keep<0.5)discard;');
    }
  };
  return m;
}

// ---------- material ----------
function glass(t,opts){
  opts=opts||{};
  const iridV={None:0.05,Faint:0.4,Vivid:0.72,Spectral:1.0}[t.irid];
  const tint=new THREE.Color(TINT[t.stain]);
  const rough=t.anomaly==='Frost'?0.4:0.04;
  // DoubleSide + clear, thin-walled glass → you see straight through the front
  // membrane to the BACK wall and the organelles refracted inside
  const m=new THREE.MeshPhysicalMaterial({
    color:0xffffff,metalness:0,roughness:rough,side:THREE.DoubleSide,
    transmission:1,thickness:opts.thin?0.8:1.9,ior:opts.core?1.4:1.5,
    attenuationColor:tint,attenuationDistance:opts.core?0.5:(t.stain==='iridescent'?3.2:1.5),
    iridescence:iridV,iridescenceIOR:1.32,iridescenceThicknessRange:[110,560],
    clearcoat:1,clearcoatRoughness:0.1,envMap,envMapIntensity:1.35,
  });
  if(!opts.core){m.bumpMap=bumpTex(t.surface);m.bumpScale=t.surface==='Porous'?0.32:t.surface==='Ribbed'?0.24:t.surface==='Bumpy'?0.22:0.12;}
  return animate(m,!!opts.thin,opts.discard||null);
}
// accent-coloured glass, cut to the pattern's shape — overlaid on the body
function accentGlass(t){
  const m=new THREE.MeshPhysicalMaterial({
    color:0xffffff,metalness:0,roughness:0.05,side:THREE.DoubleSide,
    transmission:1,thickness:1.6,ior:1.5,
    attenuationColor:new THREE.Color(t.patB),attenuationDistance:0.6,
    clearcoat:1,clearcoatRoughness:0.1,envMap,envMapIntensity:1.35,
  });
  m.polygonOffset=true;m.polygonOffsetFactor=-1;
  return animate(m,false,PAT[t.pattern]);
}
// clone every solid body mesh already in G into an accent overlay
function addPattern(G,t){
  if(!t.pattern||t.pattern==='Solid')return;
  const am=accentGlass(t);
  G.children.slice().forEach(o=>{if(!o.isMesh)return;
    const c=new THREE.Mesh(o.geometry,am);c.userData.thin=true;
    c.position.copy(o.position);c.quaternion.copy(o.quaternion);c.scale.copy(o.scale).multiplyScalar(1.006);G.add(c);});
}

// IcosahedronGeometry is non-indexed, so computeVertexNormals() yields flat
// per-face normals → faceted look. Average normals across shared positions to
// get true smooth shading while keeping the original UVs (bump maps need them).
function smooth(geo){
  geo.computeVertexNormals();
  const p=geo.attributes.position,nrm=geo.attributes.normal,acc=new Map();
  const key=(x,y,z)=>Math.round(x*800)+','+Math.round(y*800)+','+Math.round(z*800);
  for(let i=0;i<p.count;i++){const k=key(p.getX(i),p.getY(i),p.getZ(i));let a=acc.get(k);if(!a){a=[0,0,0,[]];acc.set(k,a);}a[0]+=nrm.getX(i);a[1]+=nrm.getY(i);a[2]+=nrm.getZ(i);a[3].push(i);}
  const v=new THREE.Vector3();
  acc.forEach(a=>{v.set(a[0],a[1],a[2]).normalize();for(const i of a[3])nrm.setXYZ(i,v.x,v.y,v.z);});
  nrm.needsUpdate=true;return geo;
}
// ---------- a smooth blob geometry ----------
function blob(r,detail,amp,fq,seed){
  const geo=new THREE.IcosahedronGeometry(r,detail);
  const pos=geo.attributes.position,v=new THREE.Vector3();
  for(let i=0;i<pos.count;i++){v.fromBufferAttribute(pos,i);
    const n=Math.sin(v.x*fq*3+seed)*Math.cos(v.y*fq*2.3)*Math.sin(v.z*fq*2.7+1.3);
    v.multiplyScalar(1+amp*n);pos.setXYZ(i,v.x,v.y,v.z);}
  return smooth(geo);
}
// fenestrated geodesic skeleton — the real radiolaria "wow": a glass lattice
// cage (tubes along an icosphere's edges + nodes) you can see straight through.
function latticeCage(r,detail,amp,seed,tubeR,mat){
  const geo=new THREE.IcosahedronGeometry(r,detail),pos=geo.attributes.position;
  const g=new THREE.Group(),seen=new Set(),nodes=new Map();
  const vk=v=>Math.round(v.x*90)+','+Math.round(v.y*90)+','+Math.round(v.z*90);
  const disp=v=>{const n=Math.sin(v.x*1.6*3+seed)*Math.cos(v.y*1.6*2.3)*Math.sin(v.z*1.6*2.7+1.3);return v.multiplyScalar(1+amp*n);};
  const a=new THREE.Vector3(),b=new THREE.Vector3(),c=new THREE.Vector3(),tri=[a,b,c];
  for(let i=0;i<pos.count;i+=3){for(let k=0;k<3;k++){tri[k].fromBufferAttribute(pos,i+k);disp(tri[k]);}
    for(let e=0;e<3;e++){const p1=tri[e],p2=tri[(e+1)%3],k1=vk(p1),k2=vk(p2);
      nodes.set(k1,p1.clone());nodes.set(k2,p2.clone());
      const ek=k1<k2?k1+'|'+k2:k2+'|'+k1;if(seen.has(ek))continue;seen.add(ek);
      const dir=p2.clone().sub(p1),len=dir.length();
      const cyl=new THREE.Mesh(new THREE.CylinderGeometry(tubeR,tubeR,len,5),mat);
      cyl.position.copy(p1).add(p2).multiplyScalar(0.5);
      cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());g.add(cyl);}}
  nodes.forEach(v=>{const s=new THREE.Mesh(new THREE.SphereGeometry(tubeR*1.7,7,7),mat);s.position.copy(v);g.add(s);});
  return g;
}
// spines are raycast onto the actual built surface so they grow OUT of the
// form (whatever its shape) instead of floating on a fixed-radius sphere.
function addSpines(group,t,mat,count,len){
  const S=bodySamples(group);if(!S.length)return;const used=new Set();
  for(let i=0;i<count;i++){const s=support(S,fib(i,count),used);if(!s)break;const o=outward(s);
    const sl=len*(0.7+t._r()*0.6);
    const cone=new THREE.Mesh(new THREE.ConeGeometry(0.05,sl,6),mat);cone.userData.thin=true;
    cone.position.copy(s.p).add(o.clone().multiplyScalar(sl*0.42));
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),o);group.add(cone);}
}

// Sample real surface points (world-space pos + normal) from every body mesh.
// Spines/appendages anchor to THESE, so they always grow from actual matter —
// no raycast from the centre that can miss a branch and fall to a phantom shell.
function bodySamples(group){
  group.updateMatrixWorld(true);const out=[];const v=new THREE.Vector3(),nv=new THREE.Vector3(),nm=new THREE.Matrix3();
  group.traverse(o=>{if(!o.isMesh||o.userData.thin)return;const g=o.geometry;if(!g.attributes.normal)g.computeVertexNormals();
    const pos=g.attributes.position,nor=g.attributes.normal;nm.getNormalMatrix(o.matrixWorld);
    const stride=Math.max(1,Math.floor(pos.count/48));
    for(let i=0;i<pos.count;i+=stride){v.fromBufferAttribute(pos,i).applyMatrix4(o.matrixWorld);
      nv.fromBufferAttribute(nor,i).applyMatrix3(nm).normalize();out.push({p:v.clone(),n:nv.clone()});}});
  return out;
}
// support point: the bit of real surface that sticks out furthest along `dir`
// (the convex-hull point) — that's exactly where a growth should emerge.
function support(S,dir,used){let best=-1,bd=-1e9;for(let k=0;k<S.length;k++){if(used.has(k))continue;const d=S[k].p.dot(dir);if(d>bd){bd=d;best=k;}}if(best<0)return null;used.add(best);return S[best];}
function outward(s){const o=s.n.clone();if(o.dot(s.p)<0)o.negate();return o.lerp(s.p.clone().normalize(),0.35).normalize();}

// a soft wavy tube growing from `start` along `dir` — used for flagella/tendrils
function wavyTube(start,dir,len,rad,curl,segs,seed){
  const up=Math.abs(dir.y)<0.9?new THREE.Vector3(0,1,0):new THREE.Vector3(1,0,0);
  const sx=new THREE.Vector3().crossVectors(dir,up).normalize();
  const sy=new THREE.Vector3().crossVectors(dir,sx).normalize();const pts=[];
  for(let i=0;i<=segs;i++){const f=i/segs;const p=start.clone().add(dir.clone().multiplyScalar(len*f));
    p.add(sx.clone().multiplyScalar(Math.sin(f*Math.PI*curl+seed)*len*0.16*f));
    p.add(sy.clone().multiplyScalar(Math.cos(f*Math.PI*curl*0.7+seed)*len*0.11*f));pts.push(p);}
  return new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),segs*2,rad,8,false);
}

// extra organic growths beyond the rigid spines
function addAppendages(G,t,mat){
  const type=t.appendage;if(type==='None')return;const r=t._r,S=bodySamples(G);if(!S.length)return;const used=new Set();
  const down=()=>new THREE.Vector3((r()-.5)*1.3,-0.5-r()*0.8,(r()-.5)*1.3).normalize();
  const tag=o=>{o.userData.thin=true;return o;};
  if(type==='Cilia'){const n=Math.min(54,S.length);for(let i=0;i<n;i++){const s=support(S,fib(i,n),used);if(!s)break;const o=outward(s),sl=0.26+r()*0.16;
    const c=new THREE.Mesh(new THREE.ConeGeometry(0.022,sl,5),mat);c.position.copy(s.p).add(o.clone().multiplyScalar(sl*0.42));
    c.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),o);G.add(tag(c));}}
  else if(type==='Flagella'){const n=2+((r()*2)|0);for(let i=0;i<n;i++){const s=support(S,down(),used);if(!s)break;const o=outward(s);
    G.add(tag(new THREE.Mesh(wavyTube(s.p,o,2.3+r()*0.8,0.05,2.4,40,r()*6),mat)));}}
  else if(type==='Tendrils'){const n=4+((r()*3)|0);for(let i=0;i<n;i++){const s=support(S,fib(i,n),used);if(!s)break;const o=outward(s);
    G.add(tag(new THREE.Mesh(wavyTube(s.p,o,1.2+r()*0.5,0.06,3.2,34,r()*6),mat)));}}
  else if(type==='Pods'){const n=7+((r()*4)|0);for(let i=0;i<n;i++){const s=support(S,down(),used);if(!s)break;const o=outward(s),pr=0.16+r()*0.12;
    const m=new THREE.Mesh(new THREE.SphereGeometry(pr,14,14),mat);m.position.copy(s.p).add(o.clone().multiplyScalar(pr*0.4));G.add(tag(m));}}
}

const UP=new THREE.Vector3(0,1,0);
function hoop(R,tube,mat){const h=new THREE.Mesh(new THREE.TorusGeometry(R,tube,10,72),mat);h.rotation.x=Math.PI/2;h.userData.thin=true;return h;}
// per-form idle behaviour (wc/rc = whole cycles per loop → stays seamless)
const MOT={Discus:{tilt:0.5,wc:1,wa:0.13,rc:1,ra:0.1},Bacilli:{wc:1,wa:0.28,rc:2,ra:0.2},
  Strepto:{rc:1,ra:0.15},Coral:{wc:1,wa:0.06},Nassella:{tilt:0.25,wc:1,wa:0.12}};

let current=null;
function build(id){
  const t=traitsFor(id),r=t._r;const G=new THREE.Group();
  const mat=glass(t);
  const D=t.form;

  if(D==='Coccus'){ // sphere held by meridian hoops (armillary cell)
    G.add(new THREE.Mesh(blob(1.5,5,0.07,1.6,id),mat));
    const hm=glass(t,{thin:true});
    for(const y of[-0.62,0,0.62]){const R=Math.sqrt(Math.max(0.2,1.55*1.55-y*y))*1.04;
      const h=hoop(R,0.035,hm);h.position.y=y;G.add(h);} }
  else if(D==='Morula'){ // papillae budding off a core, each on its own neck
    const core=new THREE.Mesh(blob(1.0,4,0.04,1.4,id),mat);G.add(core);
    const k=22+((r()*16)|0);for(let i=0;i<k;i++){const dir=fib(i,k);const pr=0.34+r()*0.22;
      const m=new THREE.Mesh(new THREE.SphereGeometry(pr,16,16),mat);m.position.copy(dir.clone().multiplyScalar(1.0+pr*0.4));G.add(m);
      const neck=new THREE.Mesh(new THREE.CylinderGeometry(pr*0.42,pr*0.58,0.5,10),mat);
      neck.position.copy(dir.clone().multiplyScalar(0.86));neck.quaternion.setFromUnitVectors(UP,dir);G.add(neck);} }
  else if(D==='Bacilli'){ // rods with division septa (banding rings)
    const k=4+((r()*4)|0);for(let i=0;i<k;i++){const L=1.5+r()*0.7;
      const cap=new THREE.Mesh(new THREE.CapsuleGeometry(0.32,L,8,16),mat);
      const a=(i/k)*Math.PI*2;cap.position.set(Math.cos(a)*0.5,(r()-.5)*0.5,Math.sin(a)*0.5);
      cap.rotation.z=(r()-.5)*0.5;cap.rotation.x=(r()-.5)*0.5;G.add(cap);
      const bm=glass(t,{thin:true});
      for(const f of[-0.3,0.02,0.32]){const h=new THREE.Mesh(new THREE.TorusGeometry(0.345,0.022,8,40),bm);
        h.rotation.x=Math.PI/2;h.position.y=f*L;h.userData.thin=true;cap.add(h);} } }
  else if(D==='Staphylo'){ // grape clump fused by bridges between close berries
    const k=9+((r()*7)|0),cs=[];
    for(let i=0;i<k;i++){const rr=0.5+r()*0.45;const p=new THREE.Vector3((r()-.5)*1.7,(r()-.5)*1.7,(r()-.5)*1.7);
      const m=new THREE.Mesh(new THREE.SphereGeometry(rr,18,18),mat);m.position.copy(p);G.add(m);cs.push({p,rr});}
    for(let a=0;a<cs.length;a++)for(let b=a+1;b<cs.length;b++){
      const d=cs[a].p.distanceTo(cs[b].p),sum=cs[a].rr+cs[b].rr;
      if(d<sum*1.25&&d>sum*0.55){const dir=cs[b].p.clone().sub(cs[a].p);
        const w=Math.min(cs[a].rr,cs[b].rr)*0.42;
        const cyl=new THREE.Mesh(new THREE.CylinderGeometry(w,w,d,10),mat);
        cyl.position.copy(cs[a].p).add(cs[b].p).multiplyScalar(0.5);
        cyl.quaternion.setFromUnitVectors(UP,dir.normalize());G.add(cyl);} } }
  else if(D==='Strepto'){ // a real chain: beads joined by necks, sizes breathing
    const k=6+((r()*4)|0);let prev=null;
    for(let i=0;i<k;i++){const a=(i/(k-1)-0.5)*2.6;const rr=0.5+0.1*Math.sin(i*1.7)+r()*0.06;
      const pos=new THREE.Vector3(a*0.9,Math.sin(a)*0.5,0);
      const m=new THREE.Mesh(new THREE.SphereGeometry(rr,18,18),mat);m.position.copy(pos);G.add(m);
      if(prev){const dir=pos.clone().sub(prev);
        const cyl=new THREE.Mesh(new THREE.CylinderGeometry(rr*0.5,rr*0.5,dir.length(),10),mat);
        cyl.position.copy(prev).add(pos).multiplyScalar(0.5);
        cyl.quaternion.setFromUnitVectors(UP,dir.clone().normalize());G.add(cyl);}
      prev=pos;} }
  else if(D==='Acanthar'){ // sphere pierced by internal radial spicules (true acantharia)
    G.add(new THREE.Mesh(blob(0.95,5,0.05,1.5,id),mat));
    const sm2=glass(t,{core:true});
    for(let i=0;i<12;i++){const d=fib(i,12);
      const rod=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,2.0,6),sm2);
      rod.quaternion.setFromUnitVectors(UP,d);rod.userData.thin=true;G.add(rod);} }
  else if(D==='Nassella'){ // helmet wrapped in a helical ridge, open rim
    const geo=blob(1.2,5,0.05,1.4,id);const p=geo.attributes.position,v=new THREE.Vector3();
    for(let i=0;i<p.count;i++){v.fromBufferAttribute(p,i);const yy=(v.y+1.2)/2.4;v.x*=(0.35+yy*0.9);v.z*=(0.35+yy*0.9);v.y*=1.35;p.setXYZ(i,v.x,v.y,v.z);}
    smooth(geo);G.add(new THREE.Mesh(geo,mat));
    const hm=glass(t,{thin:true});const pts=[];
    for(let i=0;i<=80;i++){const f=i/80;const y=-1.5+3.0*f;
      const Rn=1.2*(0.35+0.9*((y/1.35+1.2)/2.4))*1.06;const a2=f*Math.PI*5;
      pts.push(new THREE.Vector3(Math.cos(a2)*Rn,y,Math.sin(a2)*Rn));}
    const spiral=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),120,0.032,7,false),hm);
    spiral.userData.thin=true;G.add(spiral);
    const rim=hoop(1.49,0.045,hm);rim.position.y=1.5;G.add(rim); }
  else if(D==='Lattice'){ // fenestrated glass skeleton (radiolaria cage)
    G.add(latticeCage(1.5,2,0.05,id,0.045,mat));
    G.add(latticeCage(0.95,1,0.04,id+5,0.05,glass(t,{thin:true}))); }
  else if(D==='Coral'){ // branching capsules with polyp tips
    const grow=(p,dir,len,depth)=>{if(depth<=0)return;const cap=new THREE.Mesh(new THREE.CapsuleGeometry(0.12*depth,len,6,12),mat);
      const mid=p.clone().add(dir.clone().multiplyScalar(len*0.5));cap.position.copy(mid);cap.quaternion.setFromUnitVectors(UP,dir);G.add(cap);
      const np=p.clone().add(dir.clone().multiplyScalar(len));
      if(depth===1){const tip=new THREE.Mesh(new THREE.SphereGeometry(0.16,12,12),mat);tip.position.copy(np);G.add(tip);}
      const br=2+((r()*2)|0);
      for(let i=0;i<br;i++){const nd=dir.clone().add(new THREE.Vector3((r()-.5)*1.4,(r()-.5)*1.4,(r()-.5)*1.4)).normalize();grow(np,nd,len*0.72,depth-1);}};
    for(let i=0;i<4;i++){const d=fib(i,4);grow(new THREE.Vector3(0,0,0),d,1.0,3);}
    G.add(new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),mat)); }
  else if(D==='Discus'){ // disc with a full ring system + hub spokes
    const geo=blob(1.6,5,0.05,1.5,id);geo.scale(1,0.42,1);smooth(geo);
    G.add(new THREE.Mesh(geo,mat));
    const tor=new THREE.Mesh(new THREE.TorusGeometry(1.5,0.18,16,48),mat);tor.rotation.x=Math.PI/2;G.add(tor);
    const rm=glass(t,{thin:true});
    G.add(hoop(1.16,0.05,rm));G.add(hoop(0.86,0.04,rm));
    for(let i=0;i<10;i++){const a2=i/10*Math.PI*2;const dir=new THREE.Vector3(Math.cos(a2),0,Math.sin(a2));
      const sp=new THREE.Mesh(new THREE.CylinderGeometry(0.026,0.026,1.1,6),rm);
      sp.position.copy(dir.clone().multiplyScalar(0.9));sp.quaternion.setFromUnitVectors(UP,dir);sp.userData.thin=true;G.add(sp);} }

  // accent pattern overlay on the body (before shells/nucleus/spines)
  if(D!=='Lattice')addPattern(G,t);

  // shells (extra nested for non-cluster forms)
  if(['Coccus','Acanthar','Nassella'].includes(D)){
    const n=parseInt(t.shells,10);for(let L=1;L<n;L++){const g2=blob(1.5*(1+L*0.16),5,0.05,1.6,id+L*7);const m2=glass(t,{thin:true});G.add(new THREE.Mesh(g2,m2));}
  }
  // nucleus — the interior is a scene of its own: singles pulse, clusters orbit
  if(t.nucleus!=='Hollow'&&!['Staphylo','Strepto','Bacilli','Coral'].includes(D)){
    const nm=glass(t,{core:true});if(t.nucleus==='Golden'){nm.attenuationColor=new THREE.Color(0xffba2e);}
    if(t.nucleus==='Cluster'||t.nucleus==='Living'){
      const ng=new THREE.Group();const k=t.nucleus==='Living'?5:3;
      for(let i=0;i<k;i++){const nn=new THREE.Mesh(new THREE.SphereGeometry(0.26+r()*0.14,16,16),nm);
        nn.position.set((r()-.5)*0.7,(r()-.5)*0.7,(r()-.5)*0.7);nn.userData.pulse=r()*6;ng.add(nn);}
      ng.userData.orbit=t.nucleus==='Living'?2:1;G.add(ng);}
    else{const nn=new THREE.Mesh(new THREE.SphereGeometry(0.55,18,18),nm);nn.userData.pulse=r()*6;G.add(nn);}
  }
  // spines first — anchored to the main body only (appendages don't exist yet,
  // so spines can never land on a thin tendril/flagellum)
  const spN={None:0,Few:10,Crown:20,Halo:40}[t.spines];
  if(spN){const sm=glass(t,{thin:true});addSpines(G,t,sm,t.anomaly==='Supernova'?56:spN,t.anomaly==='Supernova'?2.0:1.0);}
  // then organic appendages — also anchored to the body (spines are tagged thin)
  addAppendages(G,t,glass(t,{thin:true}));

  // tier is readable at a glance: Epic wears a tilted halo ring,
  // Mythic carries orbiting satellite cells on a ring
  const bR=(()=>{const b=new THREE.Box3();G.traverse(o=>{if(o.isMesh&&!o.userData.thin)b.expandByObject(o);});return b.getBoundingSphere(new THREE.Sphere()).radius||1.6;})();
  if(t.tier==='Mythic'){
    const orb=new THREE.Group();const R=bR*1.3;
    const ring=new THREE.Mesh(new THREE.TorusGeometry(R,0.018,8,90),glass(t,{thin:true}));
    ring.rotation.x=Math.PI/2;ring.userData.thin=true;ring.userData.noframe=true;orb.add(ring);
    for(let i=0;i<3;i++){const a2=i/3*Math.PI*2;
      const s=new THREE.Mesh(new THREE.SphereGeometry(0.1+r()*0.05,12,12),glass(t,{core:true}));
      s.position.set(Math.cos(a2)*R,0,Math.sin(a2)*R);s.userData.thin=true;s.userData.noframe=true;orb.add(s);}
    orb.rotation.z=0.42;orb.userData.orbit=1;G.add(orb);
  }else if(t.tier==='Epic'){
    const ring=new THREE.Mesh(new THREE.TorusGeometry(bR*1.22,0.02,8,90),glass(t,{thin:true}));
    ring.rotation.x=Math.PI/2-0.4;ring.userData.thin=true;ring.userData.noframe=true;G.add(ring);
  }

  G.userData.motion=MOT[D]||null;G.userData.swing=0.4+r()*0.24;
  if(t.anomaly==='Twin'){const c=G.clone();G.scale.setScalar(0.74);G.position.x=-0.75;c.position.x=0.75;c.scale.setScalar(0.74);const w=new THREE.Group();w.add(G);w.add(c);w.userData.swing=0.45;w.userData.motion=MOT[D]||null;return{node:w,t};}
  return{node:G,t};
}

function show(id){
  state.id=((id-1+TOTAL)%TOTAL)+1;
  if(current){scene.remove(current);current.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material){(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose());}});}
  const {node,t}=build(state.id);current=node;scene.add(current);
  (LIGHTS[t.light]||LIGHTS.Studio)(t);
  // auto-frame. token mode frames the BODY (thin spines/appendages may spill
  // past the edge) so the mass fills the cell tightly; browse mode fits it all.
  current.updateMatrixWorld(true);
  // FIT (full=1): frame body + spines + appendages, but ignore the tier
  // markers (orbit ring / halo) so a Mythic's wide orbit doesn't shrink it.
  const box=new THREE.Box3();current.traverse(o=>{if(o.isMesh&&!o.userData.noframe&&!(TOKEN&&!FIT&&o.userData.thin))box.expandByObject(o);});
  const sph=box.getBoundingSphere(new THREE.Sphere());
  const fov=camera.fov*Math.PI/180;
  // composition: each token gets its own slight viewpoint (azimuth + elevation)
  const cr=mb((state.id*48271)^0x2c1);
  const az=(cr()-0.5)*0.55*(TOKEN?0.7:1),el=0.06+cr()*0.26;
  baseDist=(sph.radius/Math.sin(fov/2))*(TOKEN?(FIT?1.1:1.12):1.18);
  camDir.set(Math.sin(az)*Math.cos(el),Math.sin(el),Math.cos(az)*Math.cos(el));
  applyZoom();
  document.getElementById('jump').value=state.id;const cap=s=>String(s).replace(/_/g,' ');
  document.getElementById('traits').innerHTML=`<div><b>#</b>${state.id}</div>`+
    [['Form','form'],['Surface','surface'],['Pattern','pattern'],['Appendage','appendage'],['Spines','spines'],['Shells','shells'],['Stain','stain'],['Light','light'],['Iridescence','irid'],['Nucleus','nucleus'],['Anomaly','anomaly']]
    .map(([L,k])=>`<div><b>${L}</b>${cap(t[k])}</div>`).join('')+`<div class="tier"><b>tier</b>${t.tier}</div>`;
}

function buildDist(){
  const cats=['form','surface','pattern','appendage','spines','shells','stain','light','irid','nucleus','anomaly','tier'];const tally={};cats.forEach(c=>tally[c]={});
  for(let id=1;id<=TOTAL;id++){const t=traitsFor(id);for(const c of cats){const v=String(t[c]);tally[c][v]=(tally[c][v]||0)+1;}}
  const el=document.getElementById('dist');el.innerHTML='';
  for(const c of cats){const h=document.createElement('h2');h.textContent=c;el.appendChild(h);
    const en=Object.entries(tally[c]).sort((a,b)=>b[1]-a[1]);const mx=Math.max(...en.map(e=>e[1]));
    for(const[v,n]of en){const row=document.createElement('div');row.className='bar';
      row.innerHTML=`<div class="lbl">${v.replace(/_/g,' ')}</div><div class="track"><div class="fill" style="width:${(n/mx*100)|0}%"></div></div><div class="n">${n} · ${(n/TOTAL*100).toFixed(1)}%</div>`;el.appendChild(row);}}
}

// ---- token mode: /glass-500.html?id=N&token=1 renders ONE biom full-bleed,
// no UI, deterministic — this is what an animation_url points at ----
const Q=new URLSearchParams(location.search);
const TOKEN=Q.has('token')||Q.has('bare');
const FIT=Q.has('full');   // fit ALL geometry (incl. thin spines) into frame — nothing clipped
const START=Math.min(TOTAL,Math.max(1,parseInt(Q.get('id'),10)||1));
if(TOKEN)document.body.classList.add('bare');

const state={id:1};
// zoom: 1.0 = framed default (far limit), 1.5 = 50% closer (near limit)
const ZMAX=1.8;let zoom=Q.has('z')?Math.min(ZMAX,Math.max(0.9,parseFloat(Q.get('z')))):ZMAX;  // default = zoomed in; ?z= overrides (mp4 export frames wider)
let baseDist=7.6;const camDir=new THREE.Vector3(0,0,1);
function applyZoom(){camera.position.copy(camDir).multiplyScalar(baseDist/zoom);camera.lookAt(0,0,0);}
function setZoom(z){zoom=Math.min(ZMAX,Math.max(1,z));applyZoom();}
addEventListener('wheel',e=>{e.preventDefault();setZoom(zoom*(e.deltaY<0?1.08:1/1.08));},{passive:false});
let pinch0=0;
addEventListener('touchstart',e=>{if(e.touches.length===2)pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)/zoom;},{passive:true});
addEventListener('touchmove',e=>{if(e.touches.length===2&&pinch0){setZoom(Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)/pinch0);}},{passive:true});

document.getElementById('prev').onclick=()=>show(state.id-1);
document.getElementById('next').onclick=()=>show(state.id+1);
document.getElementById('rand').onclick=()=>show(1+((Math.random()*TOTAL)|0));
document.getElementById('jump').onchange=e=>show(parseInt(e.target.value,10)||1);
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(state.id-1);if(e.key==='ArrowRight')show(state.id+1);});
let tx=0,swipe=false;addEventListener('touchstart',e=>{swipe=e.touches.length===1;if(swipe)tx=e.touches[0].clientX;},{passive:true});
addEventListener('touchend',e=>{if(!swipe||e.touches.length)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)show(state.id+(dx<0?1:-1));},{passive:true});
document.getElementById('stats').onclick=()=>{buildDist();document.getElementById('sheet').classList.add('on');};
document.getElementById('close').onclick=()=>document.getElementById('sheet').classList.remove('on');
function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
addEventListener('resize',resize);resize();
let t0=performance.now(),firstFrame=true;
// per-form idle + interior life (orbits, pulses), deterministic in t
function applyMotion(t){
  if(!current)return;
  const A=t*W;                                   // loop angle: 0..2π across LOOP
  const M=current.userData.motion||{};const sw=current.userData.swing||0.6;
  current.rotation.y=Math.sin(A)*sw;             // calm rock, not a full spin
  current.rotation.x=(M.tilt||0)+Math.sin(A*(M.wc||1)+1.7)*(M.wa||0.08);
  current.rotation.z=M.rc?Math.sin(A*M.rc)*M.ra:0;
  current.scale.setScalar(1+Math.sin(A)*0.012);
  current.traverse(o=>{const u=o.userData;
    if(u.orbit)o.rotation.y=A*u.orbit;
    if(u.pulse!==undefined)o.scale.setScalar(1+Math.sin(A*2.0+u.pulse)*0.07);});
}
function loop(){const t=(performance.now()-t0)/1000;uTime.value=t;applyMotion(t);renderer.render(scene,camera);
  if(firstFrame){firstFrame=false;document.getElementById('load').style.display='none';window.__biomReady=true;}
  requestAnimationFrame(loop);}
// deterministic frame seek for offline capture (mp4/still): freezes motion at time t
window.__seek=function(t){uTime.value=t;applyMotion(t);renderer.render(scene,camera);};
window.__LOOP=LOOP;  // loop period (s) — render frames over [0,LOOP) for a seamless mp4
window.__tierOf=id=>traitsFor(id).tier;  // for rarity ranking (grid page)
window.__traitOf=id=>{const t=traitsFor(id);return{form:t.form,stain:t.stain,tier:t.tier,pattern:t.pattern,appendage:t.appendage};};
show(START);
if(Q.has('still')){window.__seek(0);document.getElementById('load').style.display='none';window.__biomReady=true;}
else loop();
</script>
