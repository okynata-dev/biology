<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Glass · prototypes</title>
<style>
  :root{ --bg:#ECE9E0; --ink:#1a1712; --ink2:#6b645a; }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,Menlo,monospace;overflow:hidden;-webkit-user-select:none;user-select:none;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;}
  .hud{position:fixed;left:0;right:0;bottom:0;padding:18px 20px calc(18px + env(safe-area-inset-bottom));
    display:flex;align-items:center;justify-content:center;gap:18px;pointer-events:none;}
  .nav{pointer-events:auto;width:46px;height:46px;border-radius:50%;border:1px solid rgba(26,23,18,.18);
    background:rgba(255,255,255,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:var(--ink);font-size:20px;line-height:44px;text-align:center;cursor:pointer;transition:transform .12s ease, background .2s;}
  .nav:active{transform:scale(.9);}
  .meta{pointer-events:none;min-width:150px;text-align:center;}
  .meta .idx{font-size:13px;letter-spacing:.08em;}
  .meta .name{font-size:11px;color:var(--ink2);margin-top:3px;text-transform:uppercase;letter-spacing:.14em;}
  .dots{position:fixed;top:calc(16px + env(safe-area-inset-top));left:0;right:0;display:flex;justify-content:center;gap:7px;}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(26,23,18,.18);transition:background .2s,transform .2s;}
  .dot.on{background:var(--ink);transform:scale(1.25);}
  .tag{position:fixed;top:calc(34px + env(safe-area-inset-top));left:0;right:0;text-align:center;
    font-size:10px;letter-spacing:.22em;color:var(--ink2);text-transform:uppercase;}
  .load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:12px;letter-spacing:.18em;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="tag">bioms · glass study</div>
<div class="dots" id="dots"></div>
<div class="hud">
  <div class="nav" id="prev">‹</div>
  <div class="meta"><div class="idx" id="idx">01 / 10</div><div class="name" id="name"></div></div>
  <div class="nav" id="next">›</div>
</div>
<div class="load" id="load">loading glass…</div>

<script type="importmap">
{ "imports": { "three": "/vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ---------- deterministic RNG ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ---------- 10 curated prototypes (seed + character) ----------
// attenuationColor tints the glass from within (Bioms palette hues).
const PROTOS = [
  { seed: 7,   name:'aurora',     tint:0x9fd8c8, irid:0.85, spines:24, rough:0.05, ior:1.52 },
  { seed: 13,  name:'nile',       tint:0x6fa8c8, irid:0.25, spines:32, rough:0.04, ior:1.48 },
  { seed: 21,  name:'congo',      tint:0xe79a78, irid:0.15, spines:16, rough:0.07, ior:1.50 },
  { seed: 34,  name:'malachite',  tint:0x73c89e, irid:0.30, spines:40, rough:0.05, ior:1.49 },
  { seed: 42,  name:'fuchsia',    tint:0xe487bf, irid:0.55, spines:20, rough:0.04, ior:1.53 },
  { seed: 58,  name:'plasma',     tint:0xc79af0, irid:0.95, spines:28, rough:0.03, ior:1.55 },
  { seed: 71,  name:'gold',       tint:0xe6c27a, irid:0.20, spines:12, rough:0.10, ior:1.47 },
  { seed: 88,  name:'void',       tint:0x2b3550, irid:0.65, spines:36, rough:0.04, ior:1.54 },
  { seed: 95,  name:'safranin',   tint:0xe6a6ad, irid:0.18, spines:22, rough:0.06, ior:1.49 },
  { seed: 111, name:'iridescent', tint:0xbfe0e8, irid:1.0,  spines:30, rough:0.03, ior:1.56 },
];

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const CREAM = new THREE.Color('#ECE9E0');
scene.background = CREAM;

const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
camera.position.set(0, 0, 7.2);

// ---------- environment (studio gradient → PMREM) so the glass refracts
// soft light instead of flat nothing ----------
function makeEnv(){
  const s = 512;
  const cv = document.createElement('canvas'); cv.width = cv.height = s;
  const g = cv.getContext('2d');
  const grd = g.createLinearGradient(0,0,0,s);
  grd.addColorStop(0,'#ffffff'); grd.addColorStop(0.45,'#f3efe6'); grd.addColorStop(0.5,'#ece9e0'); grd.addColorStop(1,'#c9c4b8');
  g.fillStyle = grd; g.fillRect(0,0,s,s);
  // a couple of soft highlights for specular life
  for (const [x,y,r,a] of [[0.32,0.28,0.22,0.9],[0.72,0.4,0.16,0.6],[0.5,0.82,0.3,0.4]]){
    const rg = g.createRadialGradient(x*s,y*s,0, x*s,y*s,r*s);
    rg.addColorStop(0,`rgba(255,255,255,${a})`); rg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle = rg; g.fillRect(0,0,s,s);
  }
  const tex = new THREE.CanvasTexture(cv); tex.mapping = THREE.EquirectangularReflectionMapping;
  const pmrem = new THREE.PMREMGenerator(renderer);
  const env = pmrem.fromEquirectangular(tex).texture;
  tex.dispose(); pmrem.dispose();
  return env;
}
const envMap = makeEnv();
scene.environment = envMap;

// gentle key + rim lights add sparkle on the glass edges
const key = new THREE.DirectionalLight(0xffffff, 1.1); key.position.set(3,4,5); scene.add(key);
const rim = new THREE.DirectionalLight(0xfff2dd, 0.7); rim.position.set(-4,-2,-3); scene.add(rim);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

// ---------- build one radiolaria (glass) from a proto ----------
let current = null;

function fib(i, n){ // fibonacci sphere direction
  const phi = Math.acos(1 - 2*(i+0.5)/n);
  const theta = Math.PI*(1+Math.sqrt(5))*(i+0.5);
  return new THREE.Vector3(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
}

function buildRadiolaria(proto){
  const rnd = mulberry32((proto.seed*2654435761)>>>0);
  const group = new THREE.Group();

  const glass = new THREE.MeshPhysicalMaterial({
    color: 0xffffff, metalness: 0, roughness: proto.rough,
    transmission: 1, thickness: 1.4, ior: proto.ior,
    attenuationColor: new THREE.Color(proto.tint), attenuationDistance: 1.6,
    iridescence: proto.irid, iridescenceIOR: 1.3, iridescenceThicknessRange:[120,500],
    clearcoat: 1, clearcoatRoughness: 0.12, envMap, envMapIntensity: 1.25,
    specularIntensity: 1.0,
  });

  // core shell — icosphere with organic displacement
  const coreR = 1.35;
  const coreGeo = new THREE.IcosahedronGeometry(coreR, 5);
  const pos = coreGeo.attributes.position; const v = new THREE.Vector3();
  const amp = 0.10 + rnd()*0.10, fq = 1.4 + rnd()*1.6;
  for (let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i);
    const n = Math.sin(v.x*fq*3+proto.seed)*Math.cos(v.y*fq*2.3)*Math.sin(v.z*fq*2.7+1.3);
    const k = 1 + amp*n;
    v.multiplyScalar(k); pos.setXYZ(i, v.x, v.y, v.z);
  }
  coreGeo.computeVertexNormals();
  group.add(new THREE.Mesh(coreGeo, glass));

  // inner nucleus — smaller, denser tint
  const nucMat = glass.clone(); nucMat.attenuationDistance = 0.5; nucMat.thickness = 0.8; nucMat.iridescence = Math.min(1, proto.irid+0.2);
  const nuc = new THREE.Mesh(new THREE.IcosahedronGeometry(0.55+rnd()*0.2, 3), nucMat);
  group.add(nuc);

  // radial spines (spicules)
  const sMat = glass.clone(); sMat.thickness = 0.6; sMat.roughness = Math.max(0.02, proto.rough-0.02);
  const N = proto.spines, len = 0.7 + rnd()*0.9;
  for (let i=0;i<N;i++){
    const dir = fib(i, N);
    const sl = len*(0.7+rnd()*0.6);
    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.055+rnd()*0.03, sl, 6), sMat);
    const mid = dir.clone().multiplyScalar(coreR + sl*0.5*0.92);
    cone.position.copy(mid);
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    group.add(cone);
  }

  group.userData.spin = 0.18 + rnd()*0.14;
  return group;
}

function show(idx){
  state.idx = (idx + PROTOS.length) % PROTOS.length;
  const p = PROTOS[state.idx];
  if (current){ scene.remove(current); current.traverse(o=>{ if(o.geometry)o.geometry.dispose(); }); }
  current = buildRadiolaria(p);
  scene.add(current);
  document.getElementById('idx').textContent = String(state.idx+1).padStart(2,'0')+' / '+PROTOS.length;
  document.getElementById('name').textContent = p.name;
  [...document.getElementById('dots').children].forEach((d,i)=>d.classList.toggle('on', i===state.idx));
}

// ---------- HUD ----------
const dots = document.getElementById('dots');
PROTOS.forEach((_,i)=>{ const d=document.createElement('div'); d.className='dot'; d.onclick=()=>show(i); dots.appendChild(d); });
const state = { idx:0 };
document.getElementById('prev').onclick = ()=>show(state.idx-1);
document.getElementById('next').onclick = ()=>show(state.idx+1);
addEventListener('keydown', e=>{ if(e.key==='ArrowLeft')show(state.idx-1); if(e.key==='ArrowRight')show(state.idx+1); });
let tx=0; addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50) show(state.idx+(dx<0?1:-1)); },{passive:true});

// ---------- resize + loop ----------
function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();

let t0 = performance.now();
function loop(){
  const t = (performance.now()-t0)/1000;
  if (current){
    current.rotation.y = t*current.userData.spin;
    current.rotation.x = Math.sin(t*0.3)*0.12;
    const s = 1 + Math.sin(t*0.8)*0.012; current.scale.setScalar(s);
  }
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
show(0);
document.getElementById('load').style.display='none';
loop();
</script>
</body>
</html>
